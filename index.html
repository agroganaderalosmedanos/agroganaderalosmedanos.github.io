<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Agroganadera Los Médanos</title>
<style>
:root {
  --bg: #F7F3E8; --bg2: #F0EAD8; --bg3: #3a5020;
  --text: #4A2E1A; --text2: #7a5c3a; --text3: #a8896a;
  --border2: rgba(74,46,26,0.22);
  --green: #3F5A2A;
  --bordeaux: #631627; --bordeaux-dark: #4a1020;
  --serif: 'Aptos', 'Calibri', 'Segoe UI', -apple-system, sans-serif;
  --sans:  'Aptos', 'Calibri', 'Segoe UI', -apple-system, sans-serif;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: var(--sans);
  background: var(--bg3);
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 40px 20px;
  text-align: center;
}
#main-shell img { width: 120px; display: block; margin: 0 auto 20px; }
.brand-sub { font-size: 11px; font-weight: 700; letter-spacing: .14em; text-transform: uppercase; color: rgba(255,255,255,0.5); margin-bottom: 6px; }
.brand-name { font-size: 38px; font-weight: 700; color: #fff; letter-spacing: -.5px; line-height: 1.1; margin-bottom: 10px; }
.brand-desc { font-size: 14px; color: rgba(255,255,255,0.5); margin-bottom: 48px; }
.btn-enter {
  display: inline-block; background: var(--bordeaux); color: #fff;
  font-family: var(--sans); font-size: 15px; font-weight: 700;
  padding: 13px 38px; border-radius: 40px; text-decoration: none;
  transition: background .15s, transform .1s;
}
.btn-enter:hover { background: var(--bordeaux-dark); transform: translateY(-2px); }
footer { margin-top: 52px; font-size: 11px; letter-spacing: .06em; color: rgba(255,255,255,0.3); }
.login-user-badge {
  display: inline-flex; align-items: center; gap: 6px;
  font-size: 12px; color: rgba(255,255,255,0.4); padding: 4px 10px;
  border: 1px solid rgba(255,255,255,0.2); border-radius: 20px;
  cursor: pointer; background: none; font-family: var(--sans);
  margin-top: 12px; transition: all .15s;
}
.login-user-badge:hover { color: #fff; border-color: rgba(255,255,255,0.5); }

/* LOGIN */
.login-overlay {
  position: fixed; inset: 0; background: var(--bg3);
  display: flex; align-items: center; justify-content: center;
  z-index: 9999;
}
.login-box {
  background: var(--bg); border: 1px solid var(--border2);
  border-radius: 18px; padding: 40px 36px; width: 100%; max-width: 380px;
  box-shadow: 0 8px 32px rgba(43,38,31,0.10); text-align: left;
}
.login-icon { font-size: 32px; margin-bottom: 10px; }
.login-title { font-family: var(--serif); font-size: 22px; font-weight: 700; margin-bottom: 4px; color: var(--text); }
.login-sub { font-size: 13px; color: var(--text2); margin-bottom: 28px; }
.login-field { margin-bottom: 14px; }
.login-field label { display: block; font-size: 12px; font-weight: 600; color: var(--text2); margin-bottom: 5px; }
.login-field input {
  width: 100%; padding: 10px 13px; border: 1px solid var(--border2);
  border-radius: 9px; font-size: 14px; font-family: var(--sans);
  background: var(--bg2); color: var(--text); outline: none;
  transition: border-color .15s;
}
.login-field input:focus { border-color: var(--green); background: var(--bg); }
.login-btn {
  width: 100%; padding: 11px; background: var(--bordeaux); color: #fff;
  border: none; border-radius: 9px; font-size: 14px; font-weight: 700;
  font-family: var(--sans); cursor: pointer; margin-top: 6px;
  transition: background .15s;
}
.login-btn:hover { background: var(--bordeaux-dark); }
.login-btn:disabled { opacity: .6; cursor: default; }
.login-error { font-size: 12.5px; color: #b3261e; margin-top: 10px; text-align: center; min-height: 18px; }
</style>
</head>
<body>

<div id="main-shell" style="display:none">
  <img src="https://agroganaderalosmedanos.github.io/isologo.png" alt="Logo">
  <div class="brand-sub">Agroganadera</div>
  <div class="brand-name">Los Médanos</div>
  <div class="brand-desc">Sistema de gestión del ciclo ganadero completo</div>
  <a href="https://agroganaderalosmedanos.github.io/cria/" class="btn-enter">Ingresar al sistema →</a>
  <footer id="footer-area">El Cencerro · El Misterio · El Clavo Chico</footer>
</div>

<script>
const LOGIN_API_URL = 'https://script.google.com/macros/s/AKfycbz-ahGdifI9FykD0r6hz47fjPZ6H5TwKWMOsCfW5f_M41oXneTffMk7CKz0svOgezSD_w/exec';
const LOGIN_TOKEN   = 'LosMedanos2026Cria';

function loginGetSession() { try { return JSON.parse(localStorage.getItem('lm_session') || 'null'); } catch(e) { return null; } }
function loginSetSession(data) { localStorage.setItem('lm_session', JSON.stringify(data)); }
function loginClear() { localStorage.removeItem('lm_session'); location.reload(); }

function showLoginScreen(onSuccess) {
  const overlay = document.createElement('div');
  overlay.className = 'login-overlay';
  overlay.innerHTML = `
    <div class="login-box">
      <div class="login-icon">🐄</div>
      <div class="login-title">Agroganadera Los Médanos</div>
      <div class="login-sub">Ingresá tus credenciales para continuar</div>
      <div class="login-field"><label>Usuario</label>
        <input type="text" id="li-user" placeholder="tu usuario" autocomplete="username">
      </div>
      <div class="login-field"><label>Contraseña</label>
        <input type="password" id="li-pass" placeholder="••••••••" autocomplete="current-password">
      </div>
      <button class="login-btn" id="li-btn">Ingresar</button>
      <div class="login-error" id="li-err"></div>
    </div>`;
  document.body.appendChild(overlay);
  const btn = document.getElementById('li-btn');
  const userEl = document.getElementById('li-user');
  const passEl = document.getElementById('li-pass');
  const errEl  = document.getElementById('li-err');
  async function doLogin() {
    const usuario = userEl.value.trim();
    const password = passEl.value;
    if (!usuario || !password) { errEl.textContent = 'Completá usuario y contraseña.'; return; }
    btn.disabled = true; btn.textContent = 'Verificando…'; errEl.textContent = '';
    try {
      const url = LOGIN_API_URL + '?action=login&token=' + encodeURIComponent(LOGIN_TOKEN);
      const res = await fetch(url, { method: 'POST',
        headers: { 'Content-Type': 'text/plain;charset=utf-8' },
        body: JSON.stringify({ usuario, password }) });
      const json = await res.json();
      if (!json.ok) throw new Error(json.error || 'Error al conectar');
      loginSetSession(json.data);
      overlay.remove();
      onSuccess(json.data);
    } catch(err) {
      errEl.textContent = err.message;
      btn.disabled = false; btn.textContent = 'Ingresar';
    }
  }
  btn.onclick = doLogin;
  passEl.onkeydown = e => { if (e.key === 'Enter') doLogin(); };
  userEl.onkeydown = e => { if (e.key === 'Enter') passEl.focus(); };
  setTimeout(() => userEl.focus(), 100);
}

function showShell(session) {
  document.getElementById('main-shell').style.display = '';
  const footer = document.getElementById('footer-area');
  footer.insertAdjacentHTML('beforeend',
    '<div style="margin-top:12px"><button class="login-user-badge" onclick="loginClear()">👤 ' + session.nombre + ' &nbsp;·&nbsp; Cerrar sesión</button></div>');
}

window.addEventListener('DOMContentLoaded', () => {
  const session = loginGetSession();
  if (session) {
    showShell(session);
  } else {
    showLoginScreen(session => showShell(session));
  }
});
</script>
</body>
</html>
