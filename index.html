    <div style="display:flex;gap:8px;margin-top:8px;flex-wrap:wrap">
      ${criaTabs.map(t => `<button class="radio-pill${S.page===t.k?' selected':''}" onclick="goto('${t.k}')">${t.icon} ${t.label}</button>`).join('')}
      <button onclick="S.criaMoneda=S.criaMoneda==='USD'?'ARS':'USD';render()"
        style="margin-left:auto;padding:6px 14px;border-radius:20px;border:none;cursor:pointer;font-size:13px;font-weight:600;background:var(--blue);color:#fff;display:flex;align-items:center;gap:6px">
        💵 ${(S.criaMoneda||'ARS')==='USD'?'Ver en ARS':'Ver en U$S'}
      </button>
    </div>
  </div>`;

  // ── Selector de campaña ─────────────────────────────────────────────
  h += `<div style="display:flex;align-items:center;gap:16px;margin-bottom:16px;flex-wrap:wrap">
    <div style="display:flex;align-items:center;gap:8px">
      <label style="font-size:13px;font-weight:600;white-space:nowrap">Campaña:</label>
      ${campanas.length
        ? `<select style="font-size:13px;padding:6px 10px;border-radius:8px;border:1px solid var(--border);background:var(--bg);color:var(--text);min-width:140px"
            onchange="S._dashCampana=this.value;render()">
            ${campanas.map(c=>`<option value="${c}" ${c===campSelec?'selected':''}>${c}</option>`).join('')}
          </select>`
        : '<span style="font-size:13px;color:var(--text3)">Sin campañas — asigná campaña en ventas y compras</span>'
      }
    </div>
    <div style="display:flex;align-items:center;gap:8px">
      <label style="font-size:13px;font-weight:600;white-space:nowrap">Campo:</label>
      <select style="font-size:13px;padding:6px 10px;border-radius:8px;border:1px solid var(--border);background:var(--bg);color:var(--text);min-width:160px"
        onchange="S._dashCampo=this.value;render()">
        <option value="">Todos los campos</option>
        ${campos.map(c=>`<option value="${c.campo_id}" ${String(c.campo_id)===String(campSelecField)?'selected':''}>${c.nombre}</option>`).join('')}
      </select>
    </div>
  </div>`;

  if (!campSelec) {
    h += `<div class="empty-state"><span class="ico">📊</span><div class="msg">Cargá campañas en ventas y compras para ver el dashboard.</div></div>`;
    return h;
  }

  // Selector de campo integrado arriba

  // Advertencia si faltan precios de valorización
  const precios = preciosValGet_();
  const haPrecios = Object.values(precios).some(v => v > 0);
  if (!haPrecios) {
    h += `<div style="background:var(--gold-bg);border:1px solid var(--gold);border-radius:8px;padding:12px 16px;margin-bottom:16px;display:flex;gap:10px;align-items:center">
      <span style="font-size:20px">⚠️</span>
      <div>
        <div style="font-weight:600;color:var(--gold-text)">Sin precios de valorización</div>
        <div style="font-size:12px;color:var(--text2);margin-top:2px">Cargá los precios en <button class="btn btn-ghost btn-sm" onclick="goto('precios_valorizacion')" style="font-size:12px;padding:0 4px">💲 Precios de valorización</button> para ver el stock valorizado.</div>
      </div>
    </div>`;
  }

  // ── INGRESOS ────────────────────────────────────────────────────────
  // Filtrar rodeos de Cría por campo si hay selección
  const rodeosCriaFilt = campSelecField
    ? rodeosCria.filter(r => String(r.campo_id) === String(campSelecField))
    : rodeosCria;
  // 1. Ventas de la campaña (rodeos de Cría)
  const rodeosCriaIds = new Set(rodeosCriaFilt.map(r=>String(r.rodeo_id)));
  const ventasCria = ventas.filter(v => rodeosCriaIds.has(String(v.rodeo_id)));
  const totalVentas = ventasCria.reduce((s,v) => s + (Number(v.importe_liq)||(Number(v.precio_pactado)*(Number(v.peso_campo_kg)||Number(v.cant_animales)))||0), 0);

  // 2. Cesiones a Recría/Engorde (movimientos de traslado desde rodeos Cría a Recría/Engorde)
  const rodeosPorId = Object.fromEntries(rodeos.map(r=>[String(r.rodeo_id),r]));
  const cesiones = movs.filter(m => {
    if (m.tipo !== 'Traslado en bloque' && m.tipo !== 'Traslado individual') return false;
    const origen  = rodeosPorId[String(m.rodeo_origen_id)];
    const destino = rodeosPorId[String(m.rodeo_destino_id)];
    return origen && (origen.actividad==='Cría'||origen.actividad==='Cria') &&
           destino && (destino.actividad==='Recría'||destino.actividad==='Engorde');
  });
  // Valorizar cesiones con precio de cesión acordado (precio_cabeza = $/kg en cesiones)
  const totalCesiones = cesiones.reduce((s,m) => {
    const cant     = Number(m.cantidad)||0;
    const precioKg = Number(m.precio_cabeza)||0;
    const peso     = Number(m.peso_prom_kg)||0;
    if (precioKg && peso) {
      // Precio de cesión cargado manualmente
      return s + cant * peso * precioKg;
    } else {
      // Fallback: valorizar con precios de stock si no tiene precio de cesión
      const rodeo = rodeosPorId[String(m.rodeo_origen_id)];
      const cat = (rodeo?.categoria||'').toLowerCase().trim();
      const pesadasRodeo = pesadas.filter(p=>String(p.rodeo_id)===String(m.rodeo_origen_id)).sort((a,b)=>String(b.fecha).localeCompare(String(a.fecha)));
      const pesoP = pesadasRodeo[0] ? Number(pesadasRodeo[0].peso_prom_kg)||0 : 0;
      return s + valorizarRodeo_(rodeo||{categoria:cat}, cant, pesoP);
    }
  }, 0);

  // 3. Stock valorizado actual (rodeos Cría)
  const stockPorRodeo = {};
  movs.forEach(m => {
    const cant = Number(m.cantidad)||0;
    if (m.tipo==='Saldo inicial') {
      stockPorRodeo[String(m.rodeo_destino_id)] = (stockPorRodeo[String(m.rodeo_destino_id)]||0) + cant;
    } else if (m.tipo==='Traslado en bloque'||m.tipo==='Traslado individual') {
      if (m.rodeo_origen_id)  stockPorRodeo[String(m.rodeo_origen_id)]  = (stockPorRodeo[String(m.rodeo_origen_id)] ||0) - cant;
      if (m.rodeo_destino_id) stockPorRodeo[String(m.rodeo_destino_id)] = (stockPorRodeo[String(m.rodeo_destino_id)]||0) + cant;
    }
  });
  ventas.forEach(v => {
    stockPorRodeo[String(v.rodeo_id)] = (stockPorRodeo[String(v.rodeo_id)]||0) - (Number(v.cant_animales)||0);
  });

  let stockValCria = 0;
  const stockDetalleRows = [];
  rodeosCriaFilt.forEach(r => {
    const stock = Math.max(0, stockPorRodeo[String(r.rodeo_id)]||0);
    if (!stock) return;
    const pesadasR = pesadas.filter(p=>String(p.rodeo_id)===String(r.rodeo_id)).sort((a,b)=>String(b.fecha).localeCompare(String(a.fecha)));
    const pesoP = pesadasR[0] ? Number(pesadasR[0].peso_prom_kg)||0 : 0;
    const val = valorizarRodeo_(r, stock, pesoP);
    stockValCria += val;
    if (val > 0 || stock > 0) stockDetalleRows.push({ rodeo: r, stock, pesoP, val });
  });

  const totalIngresos = totalVentas + totalCesiones + stockValCria;

  // ── EGRESOS ─────────────────────────────────────────────────────────
  // 1. Stock inicial (saldos iniciales de rodeos Cría, filtrado por campo)
  const saldosIniciales = movs.filter(m => {
    if (m.tipo !== 'Saldo inicial') return false;
    if (!rodeosCriaIds.has(String(m.rodeo_destino_id))) return false;
    if (campSelecField && String(m.campo_destino_id) !== String(campSelecField)) return false;
    return true;
  });
  const totalSaldoInicial = saldosIniciales.reduce((s,m) => s + (Number(m.cantidad)||0)*(Number(m.precio_cabeza)||0), 0);

  // 2. Compras hacienda de la campaña (rodeos Cría)
  const comprasCria = comprasH.filter(c => c.campana===campSelec && (!campSelecField || String(c.campo_id)===String(campSelecField)));
  const totalCompras = comprasCria.reduce((s,c) => s+(Number(c.importe_total)||0), 0);

  // 3. Insumos consumidos campaña (alimentación y veterinaria) en rodeos Cría
  const prodPorId = Object.fromEntries((productos||[]).map(p=>[String(p.producto_id),p]));
  const consumosCria = consumos.filter(c => c.campana===campSelec && rodeosCriaIds.has(String(c.rodeo_id)) && (!campSelecField || String(c.campo_id)===String(campSelecField)));
  let totalAlim = 0, totalVeter = 0, totalOtrosIns = 0;
  consumosCria.forEach(c => {
    const prod = prodPorId[String(c.producto_id)];
    const cat = (prod?.categoria||'').toLowerCase();
    // Costo = cantidad × precio del producto (necesitamos compras_insumos para el costo unitario)
    // Por ahora sumamos cantidad como referencia — mejorar cuando tengamos precio unitario en consumos
    const cant = Number(c.cantidad)||0;
    if (cat.includes('aliment')) totalAlim += cant;
    else if (cat.includes('veterin')||cat.includes('sanid')) totalVeter += cant;
    else totalOtrosIns += cant;
  });

  // 4. Sueldos imputados a Cría (filtrado por campo si corresponde)
  const totalSueldosCria = campSelecField
    ? sueldoTotalActividad_('cria', s => String(s.campo_id) === String(campSelecField))
    : sueldoTotalActividad_('cria');

  const totalEgresos = totalSaldoInicial + totalCompras + totalSueldosCria;
  const margen = totalIngresos - totalEgresos;

  // ── RENDER ──────────────────────────────────────────────────────────
  // Panel ingresos/egresos
  h += `<div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:20px">

    <!-- INGRESOS -->
    <div class="panel" style="margin-bottom:0">
      <div class="panel-title" style="color:var(--green-text)">📈 Ingresos — Campaña ${campSelec}${campSelecField ? ' · '+campoNombre(campSelecField) : ''}</div>
      <div style="display:flex;flex-direction:column;gap:8px">
        <div style="display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid var(--border)">
          <div>
            <div style="font-weight:600">💰 Ventas de hacienda</div>
            <div style="font-size:11px;color:var(--text3)">${ventasCria.length} ventas liquidadas</div>
          </div>
          <div style="font-size:18px;font-weight:700;color:var(--green)">${fmCria_(totalVentas)}</div>
        </div>
        <div style="display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid var(--border)">
          <div>
            <div style="font-weight:600">🔄 Cesiones a Recría/Engorde</div>
            <div style="font-size:11px;color:var(--text3)">${cesiones.length} traslados valorizados</div>
          </div>
          <div style="font-size:18px;font-weight:700;color:var(--green)">${fmCria_(totalCesiones)}</div>
        </div>
        <div style="display:flex;justify-content:space-between;align-items:center;padding:8px 0">
          <div>
            <div style="font-weight:600">📦 Stock valorizado actual</div>
            <div style="font-size:11px;color:var(--text3)">${haPrecios ? (stockDetalleRows.length + ' rodeos') : '⚠ Sin precios configurados'}</div>
          </div>
          <div style="font-size:18px;font-weight:700;color:var(--green)">${fmCria_(stockValCria)}</div>
        </div>
        <div style="display:flex;justify-content:space-between;align-items:center;padding:10px;background:var(--green-bg);border-radius:8px;margin-top:4px">
          <div style="font-weight:700;font-size:14px">TOTAL INGRESOS</div>
          <div style="font-size:22px;font-weight:800;color:var(--green)">${fmCria_(totalIngresos)}</div>
        </div>
      </div>
    </div>

    <!-- EGRESOS -->
    <div class="panel" style="margin-bottom:0">
      <div class="panel-title" style="color:var(--clay-text)">📉 Egresos — Campaña ${campSelec}${campSelecField ? ' · '+campoNombre(campSelecField) : ''}</div>
      <div style="display:flex;flex-direction:column;gap:8px">
        <div style="display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid var(--border)">
          <div>
            <div style="font-weight:600">🐄 Stock inicial</div>
            <div style="font-size:11px;color:var(--text3)">${saldosIniciales.length} rodeos — precio/cabeza cargado</div>
          </div>
          <div style="font-size:18px;font-weight:700;color:var(--clay)">${fmCria_(totalSaldoInicial)}</div>
        </div>
        <div style="display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid var(--border)">
          <div>
            <div style="font-weight:600">🛒 Compras de hacienda</div>
            <div style="font-size:11px;color:var(--text3)">${comprasCria.length} compras campaña ${campSelec}</div>
          </div>
          <div style="font-size:18px;font-weight:700;color:var(--clay)">${fmCria_(totalCompras)}</div>
        </div>
        <div style="display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid var(--border)">
          <div>
            <div style="font-weight:600">🌿 Alimentación e insumos</div>
            <div style="font-size:11px;color:var(--text3)">${consumosCria.length} consumos — importe pendiente de configurar</div>
          </div>
          <div style="font-size:18px;font-weight:700;color:var(--clay)">—</div>
        </div>
        <div style="display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid var(--border)">
          <div>
            <div style="font-weight:600">👤 Sueldos imputados a Cría</div>
            <div style="font-size:11px;color:var(--text3)">histórico total de sueldos × % Cría</div>
          </div>
          <div style="font-size:18px;font-weight:700;color:var(--clay)">${fmCria_(totalSueldosCria)}</div>
        </div>
        <div style="display:flex;justify-content:space-between;align-items:center;padding:10px;background:var(--clay-bg);border-radius:8px;margin-top:4px">
          <div style="font-weight:700;font-size:14px">TOTAL EGRESOS</div>
          <div style="font-size:22px;font-weight:800;color:var(--clay)">${fmCria_(totalEgresos)}</div>
        </div>
      </div>
    </div>
  </div>`;

  // ── MARGEN ──────────────────────────────────────────────────────────
  const margenColor = margen >= 0 ? 'var(--green)' : 'var(--red)';
  const margenBg    = margen >= 0 ? 'var(--green-bg)' : 'rgba(220,50,50,0.08)';
  h += `<div style="background:${margenBg};border-radius:10px;padding:16px 20px;display:flex;justify-content:space-between;align-items:center;margin-bottom:20px">
    <div>
      <div style="font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:${margenColor}">Margen Bruto — Cría ${campSelec}</div>
      <div style="font-size:11px;color:var(--text2);margin-top:3px">Ingresos − Egresos (excluye insumos por configurar)</div>
    </div>
    <div style="font-size:32px;font-weight:800;color:${margenColor}">${margen>=0?'':'-'}${fmCria_(Math.abs(margen))}</div>
  </div>`;

  // ── Detalle stock valorizado ─────────────────────────────────────────
  if (stockDetalleRows.length) {
    h += `<div class="panel">
      <div class="panel-title">📦 Detalle stock valorizado por rodeo</div>
      <div class="tw"><table class="dt"><thead><tr>
        <th>Rodeo</th><th>Campo</th><th>Categoría</th>
        <th class="tc">Stock</th><th class="tr">Peso prom.</th>
        <th class="tr">Método</th><th class="tr">Valor total</th>
      </tr></thead><tbody>`;
    stockDetalleRows.forEach(row => {
      const cat = (row.rodeo.categoria||'').toLowerCase().trim();
      const metodo = metodoValorizacion_(row.rodeo, row.pesoP);
      h += `<tr>
        <td><strong>${row.rodeo.nombre}</strong></td>
        <td>${campoNombre(row.rodeo.campo_id)}</td>
        <td>${row.rodeo.categoria||'—'}</td>
        <td class="tc">${fn(row.stock)}</td>
        <td class="tr">${row.pesoP ? fn(row.pesoP)+' kg' : '—'}</td>
        <td class="tr" style="font-size:11px;color:var(--text3)">${metodo}</td>
        <td class="tr"><strong>${fmCria_(row.val)}</strong></td>
      </tr>`;
    });
    h += '</tbody></table></div></div>';
  }

  return h;
}

function attachDashboardEvents() {
  document.querySelectorAll('[data-campo]').forEach(el => el.onclick = () => {
    S.selectedCampoId = el.dataset.campo || null;
    S.selectedRodeoId = null;
    render();
  });
  document.querySelectorAll('[data-rodeo]').forEach(el => el.onclick = () => {
    S.selectedRodeoId = el.dataset.rodeo || null;
    render();
  });
}

function buildServicios() {  const _criaTabs = [
    { k: 'dashboard', icon: '◈', label: 'Dashboard' },
    { k: 'indices_reproduccion', icon: '📈', label: 'Índices de Reproducción' },
    { k: 'compras_hacienda', icon: '🛒', label: 'Compras de hacienda' },
    { k: 'servicios', icon: '⚭', label: 'Servicios' },
    { k: 'tactos', icon: '◔', label: 'Tactos' },
    { k: 'abortos', icon: '⊘', label: 'Abortos' },
    { k: 'pariciones', icon: '✦', label: 'Pariciones' },
    { k: 'destetes', icon: '⊞', label: 'Destetes' },
  ];
  const _criaTabsHtml = `<div class="page-header"><div class="page-title">Cría</div><div style="display:flex;gap:8px;margin-top:8px;flex-wrap:wrap">${_criaTabs.map(t=>`<button class="radio-pill${S.page===t.k?' selected':''}" onclick="goto('${t.k}')">${t.icon} ${t.label}</button>`).join('')}</div></div>`;
  let h = _criaTabsHtml;
  const items = S.cache.servicios || [];
  const campos = (S.catalogs && S.catalogs.campos) || [];
  const rodeosAptos = rodeosCriaPorCampo(campos[0]?.campo_id);
  h += `<div class="panel">
    <div class="panel-title">Registrar servicio</div>
    <div class="fgrid">
      <div class="fg" style="min-width:200px">
        <label>Tipo de servicio</label>
        <div class="radio-group" id="sv-tipo-group">
          <div class="radio-pill selected" data-tipo="IATF">IATF</div>
          <div class="radio-pill" data-tipo="Toros a campo">Toros a campo</div>
        </div>
      </div>
      <div class="fg"><label>Campo</label>
        <select id="sv-campo" onchange="document.getElementById('sv-rodeo').innerHTML = rodeoOptionsHtml(rodeosCriaPorCampo(this.value))">${campos.map(c => `<option value="${c.campo_id}">${c.nombre}</option>`).join('')}</select>
      </div>
      <div class="fg"><label>Rodeo</label>
        <select id="sv-rodeo">${rodeoOptionsHtml(rodeosAptos)}</select>
      </div>
      <div class="fg"><label>Fecha inicio</label><input type="date" id="sv-fecha-ini" value="${today()}"></div>
      <div class="fg"><label>Fecha fin <span class="opt">(opcional)</span></label><input type="date" id="sv-fecha-fin"></div>
    </div>

    <!-- IATF: múltiples toros con cantidad -->
    <div id="sv-iatf-wrap">
      <div style="margin:12px 0 6px;font-size:13px;font-weight:600;color:var(--text)">
        Toros / semen utilizado
        <span class="opt" style="font-weight:400;margin-left:6px">Cargá uno o más toros con su cantidad de vacas</span>
      </div>
      <div id="sv-toros-list">
        <div class="sv-toro-row" data-idx="0" style="display:flex;gap:8px;align-items:center;margin-bottom:8px">
          <input type="number" class="sv-cant" placeholder="Cant. vacas" min="1" style="width:120px;padding:7px 10px;border:1px solid var(--border2);border-radius:8px;font-size:13px;background:var(--bg)">
          <input type="text" class="sv-toro-id" placeholder="Identificación toro (nombre o caravana)" style="flex:1;padding:7px 10px;border:1px solid var(--border2);border-radius:8px;font-size:13px;background:var(--bg)">
        </div>
      </div>
      <div style="display:flex;align-items:center;gap:14px;margin-top:4px">
        <button class="btn" id="sv-add-toro" style="padding:5px 14px;font-size:12px;background:var(--bg2);color:var(--text)">+ Agregar otro toro</button>
        <span id="sv-total-label" style="font-size:12.5px;color:var(--text2)"></span>
      </div>
    </div>

    <!-- Toros a campo: un solo toro, sin cantidad -->
    <div id="sv-toro-wrap" style="display:none;margin-top:12px">
      <div class="fg"><label>Identificación del toro <span class="opt">(nombre o caravana)</span></label>
        <input type="text" id="sv-toro" placeholder="Ej: Don Pedro / 982000...">
      </div>
    </div>

    <div class="fg" style="margin-top:12px;max-width:400px">
      <label>Observación <span class="opt">(opcional)</span></label>
      <input type="text" id="sv-obs" placeholder="Opcional">
    </div>
    <button class="btn btn-primary" id="sv-save" style="margin-top:10px">Registrar servicio</button>
  </div>`;

  // Historial — agrupar filas IATF del mismo rodeo/fecha para mostrarlas juntas
  const grupos = [];
  const vistos = new Set();
  items.forEach(item => {
    if (item.tipo === 'IATF') {
      const key = item.rodeo_id + '|' + item.fecha_inicio;
      if (!vistos.has(key)) {
        vistos.add(key);
        const grupo = items.filter(i => i.tipo === 'IATF' && i.rodeo_id === item.rodeo_id && i.fecha_inicio === item.fecha_inicio);
        grupos.push({ ...item, _toros: grupo.map(g => `${g.identificacion_toro || '—'}${g.cantidad ? ' ('+g.cantidad+' vacas)' : ''}`).join(' / ') });
      }
    } else {
      grupos.push({ ...item, _toros: item.identificacion_toro || '—' });
    }
  });

  h += buildEntityTable(grupos, [
    { key: 'fecha_inicio', label: 'Inicio', render: v => fd(v) },

function attachServiciosEvents() {
  // Guard: si los elementos no están en el DOM no hacer nada
  if (!document.getElementById('sv-save')) return;

  // Toggle IATF vs Toros a campo
  document.querySelectorAll('#sv-tipo-group .radio-pill').forEach(p => p.onclick = () => {
    document.querySelectorAll('#sv-tipo-group .radio-pill').forEach(x => x.classList.remove('selected'));
    p.classList.add('selected');
    const esIATF = p.dataset.tipo === 'IATF';
    const iatfWrap = document.getElementById('sv-iatf-wrap');
    const toroWrap = document.getElementById('sv-toro-wrap');
    if (iatfWrap) iatfWrap.style.display = esIATF ? 'block' : 'none';
    if (toroWrap) toroWrap.style.display = esIATF ? 'none' : 'block';
  });

  // Actualizar total de vacas IATF
  function actualizarTotal() {
    const filas = document.querySelectorAll('.sv-cant');
    let total = 0;
    filas.forEach(f => { const v = parseInt(f.value); if (!isNaN(v) && v > 0) total += v; });
    const lbl = document.getElementById('sv-total-label');
    if (lbl) lbl.textContent = total > 0 ? `Total: ${total} vacas` : '';
  }

  // Agregar fila de toro
  const addToroBtn = document.getElementById('sv-add-toro');
  if (addToroBtn) addToroBtn.onclick = () => {
    const list = document.getElementById('sv-toros-list');
    if (!list) return;
    const div = document.createElement('div');
    div.className = 'sv-toro-row';
    div.style.cssText = 'display:flex;gap:8px;align-items:center;margin-bottom:8px';
    div.innerHTML = `
      <input type="number" class="sv-cant" placeholder="Cant. vacas" min="1" style="width:120px;padding:7px 10px;border:1px solid var(--border2);border-radius:8px;font-size:13px;background:var(--bg)">
      <input type="text" class="sv-toro-id" placeholder="Identificación toro" style="flex:1;padding:7px 10px;border:1px solid var(--border2);border-radius:8px;font-size:13px;background:var(--bg)">
      <button class="sv-del-row btn" style="padding:5px 10px;font-size:12px;background:var(--bg2);color:var(--red)" title="Quitar fila">✕</button>`;
    div.querySelector('.sv-del-row').onclick = () => { div.remove(); actualizarTotal(); };
    div.querySelector('.sv-cant').oninput = actualizarTotal;
    list.appendChild(div);
    div.querySelector('.sv-cant').focus();
  };

  // Escuchar cambios en la primera fila de cantidad
  document.querySelectorAll('.sv-cant').forEach(el => el.oninput = actualizarTotal);

  // Guardar
  const save = document.getElementById('sv-save');
  save.onclick = async () => {
    const tipoEl = document.querySelector('#sv-tipo-group .selected');
    if (!tipoEl) return;
    const tipo = tipoEl.dataset.tipo;
    const rodeoEl = document.getElementById('sv-rodeo');
    const fechaIniEl = document.getElementById('sv-fecha-ini');
    const fechaFinEl = document.getElementById('sv-fecha-fin');
    const obsEl = document.getElementById('sv-obs');
    const rodeo_id = rodeoEl ? rodeoEl.value : '';
    const fecha_inicio = fechaIniEl ? fechaIniEl.value : '';
    const fecha_fin = fechaFinEl ? fechaFinEl.value : '';
    const observacion = obsEl ? obsEl.value.trim() : '';
    if (!fecha_inicio || !rodeo_id) { toast('Completá fecha y rodeo.', 'err'); return; }

    if (tipo === 'IATF') {
      const filas = [];
      document.querySelectorAll('.sv-toro-row').forEach(row => {
        const cantEl = row.querySelector('.sv-cant');
        const toroEl = row.querySelector('.sv-toro-id');
        if (!cantEl || !toroEl) return;
        const cant = parseInt(cantEl.value);
        const toro = toroEl.value.trim();
        if (toro && cant > 0) filas.push({ cantidad: cant, identificacion_toro: toro });
      });
      if (filas.length === 0) { toast('Completá al menos un toro con cantidad.', 'err'); return; }
      save.disabled = true;
      try {
        for (const fila of filas) {
          await apiCall('create', { body: { entity: 'servicios', data: {
            tipo, rodeo_id, fecha_inicio, fecha_fin, observacion,
            identificacion_toro: fila.identificacion_toro,
            cantidad: fila.cantidad,
          }}});
        }
        invalidateCache('servicios');
        toast(`Servicio IATF registrado — ${filas.length} toro${filas.length > 1 ? 's' : ''}`, 'ok');
        await loadEntity('servicios', true);
        render();
      } catch (err) { toast(err.message, 'err'); } finally { save.disabled = false; }

    } else {
      const toroEl = document.getElementById('sv-toro');
      const data = {
        tipo, rodeo_id, fecha_inicio, fecha_fin, observacion,
        identificacion_toro: toroEl ? toroEl.value.trim() : '',
      };
      save.disabled = true;
      try {
        await apiCall('create', { body: { entity: 'servicios', data } });
        invalidateCache('servicios');
        toast('Servicio registrado', 'ok');
        await loadEntity('servicios', true);
        render();
      } catch (err) { toast(err.message, 'err'); } finally { save.disabled = false; }
    }
  };

  attachTableDeleteEvents('servicios', 'servicio_id');
}

window.updateTactoCalc = function() {
  const total = Number(document.getElementById('tc-total') && document.getElementById('tc-total').value) || 0;
  const pren = Number(document.getElementById('tc-prenadas') && document.getElementById('tc-prenadas').value) || 0;
  const calcEl = document.getElementById('tc-calc');
  if (!calcEl) return;
  if (total > 0) {
    const vacias = total - pren;
    if (vacias < 0) { calcEl.innerHTML = '<div class="live-calc red">Las preñadas no pueden superar el total tacteadas.</div>'; return; }
    const indice = (pren / total * 100).toFixed(1);
    calcEl.innerHTML = '<div class="live-calc green">→ Vacías: ' + vacias + ' · Índice de preñez de este tacto: ' + indice + '%</div>';
  } else { calcEl.innerHTML = ''; }
};

  const mapa = {
    'vaca': 'Cría',
    'vacas': 'Cría',
    'vaca venta': 'Venta',
    'vacas venta': 'Venta',
    'vaquillona': 'Cría',
    'vaquillonas': 'Cría',
    'vaquillona próximo servicio': 'Recría',
    'vaquillonas próximo servicio': 'Recría',
    'vaquillona venta': 'Venta',
    'vaquillonas venta': 'Venta',
    'vaquillona para venta': 'Venta',
    'vaquillonas para venta': 'Venta',
    'novillito': 'Recría',
    'novillitos': 'Recría',
    'vaquilloncita': 'Recría',
    'vaquilloncitas': 'Recría',
    'ternero': 'Recría',
    'terneros': 'Recría',
    'ternera': 'Recría',
    'terneras': 'Recría',
    'novillo': 'Engorde',
    'novillos': 'Engorde',
  };

}

function buildStockTable_(stockList, campoFiltro, categoriaFiltro) {
  let filtrado = campoFiltro ? stockList.filter(s => String(s.campo_id) === String(campoFiltro)) : stockList;
  if (categoriaFiltro) filtrado = filtrado.filter(s => s.categoria === categoriaFiltro);
  if (!stockList.length) {
    return `<div class="empty-state"><span class="ico">◌</span><div class="msg">Cargando stock…</div></div>`;
  }
  const incluirCorralesPorCategoria = !categoriaFiltro || categoriaFiltro === 'engorde (Corrales)';
  const corralesDisponible = S.corralesStock && typeof S.corralesStock === 'object' && incluirCorralesPorCategoria;
  const corralesPorCampo = corralesDisponible ? corralesStockPorCampoNombre_() : {};
  const nombreCampoFiltro = campoFiltro ? campoNombre(campoFiltro) : null;
  const corralesEnEsteFiltro = corralesDisponible
    ? (campoFiltro ? (corralesPorCampo[nombreCampoFiltro] || 0) : Object.values(corralesPorCampo).reduce((s, x) => s + x, 0))
    : 0;
  const corralesFilas = corralesDisponible
    ? Object.entries(S.corralesStock)
        .map(([cid, stock]) => ({
          nombre: `Corral ${cid} (Corrales)`,
          campo: CORRAL_CAMPO_NOMBRE_[cid] || 'Sin campo asignado',
          categoria: 'engorde (Corrales)',
          stock,
        }))
        .filter(c => !campoFiltro || c.campo === nombreCampoFiltro)
    : [];

  const totalGeneral = filtrado.reduce((s, x) => s + (Number(x.stock) || 0), 0) + corralesEnEsteFiltro;
  const porCategoria = {};
  filtrado.forEach(s => { porCategoria[s.categoria] = (porCategoria[s.categoria] || 0) + (Number(s.stock) || 0); });
  const porCampo = {};
  filtrado.forEach(s => {
    const nombreCampo = campoNombre(s.campo_id);
    porCampo[nombreCampo] = (porCampo[nombreCampo] || 0) + (Number(s.stock) || 0);
  });
  if (!campoFiltro && corralesDisponible) {
    Object.entries(corralesPorCampo).forEach(([campo, tot]) => {
      porCampo[campo] = (porCampo[campo] || 0) + tot;
    });
  }
  const ordenActividad = ['Cría', 'Recría', 'Engorde', 'Venta', 'Otra'];
  const porActividad = {};
  filtrado.forEach(s => {
    const act = actividadPorCategoria_(s.categoria);
    porActividad[act] = (porActividad[act] || 0) + (Number(s.stock) || 0);
  });
  if (corralesDisponible) {
    porActividad['Engorde'] = (porActividad['Engorde'] || 0) + corralesEnEsteFiltro;
  }
  const porActividadOrdenado = ordenActividad.filter(a => porActividad[a]);
  const notaCorrales = !incluirCorralesPorCategoria ? '' : (S.corralesStock === undefined
    ? '<div style="font-size:12.5px;color:var(--text2);margin-bottom:8px">Cargando stock de Corrales…</div>'
    : (S.corralesStock === null
      ? '<div style="font-size:12.5px;color:var(--clay-text);margin-bottom:8px">⚠ No se pudo traer el stock de Corrales en este momento.</div>'
      : (corralesDisponible ? `<div style="font-size:12.5px;color:var(--text2);margin-bottom:8px">El total y Engorde incluyen ${fn(corralesEnEsteFiltro)} animales de Corrales (dato en vivo)${campoFiltro ? ' en este campo' : ''}.</div>` : '')));

  let h = `<div style="margin-bottom:16px">
    ${notaCorrales}
    <div style="display:flex;flex-wrap:wrap;gap:8px;margin-bottom:8px">
      <div style="background:var(--green-bg);color:var(--green-text);border-radius:9px;padding:8px 15px;font-size:14.5px;font-weight:700;white-space:nowrap">
        ⛭ Total: ${fn(totalGeneral)}
      </div>
      ${porActividadOrdenado.map(act => `
        <div style="background:var(--gold-bg, var(--bg2));color:var(--gold-text, var(--text2));border-radius:9px;padding:8px 15px;font-size:14.5px;font-weight:700;white-space:nowrap">
          ${act}: <strong>${fn(porActividad[act])}</strong>
        </div>
      `).join('')}
    </div>
    <div style="display:flex;flex-wrap:wrap;gap:8px;margin-bottom:8px">
      ${Object.entries(porCategoria).filter(([cat, tot]) => tot).map(([cat, tot]) => `
        <div style="background:var(--bg2);color:var(--text2);border-radius:9px;padding:8px 15px;font-size:14.5px;font-weight:600;white-space:nowrap">
          ${cat}: <strong style="color:var(--text)">${fn(tot)}</strong>
        </div>
      `).join('')}
    </div>
    ${!campoFiltro ? `<div style="display:flex;flex-wrap:wrap;gap:8px;margin-bottom:8px">
      ${Object.entries(porCampo).filter(([campo, tot]) => tot).map(([campo, tot]) => `
        <div style="background:var(--bg2);color:var(--text2);border-radius:9px;padding:8px 15px;font-size:14.5px;font-weight:600;white-space:nowrap">
          📍 ${campo}: <strong style="color:var(--text)">${fn(tot)}</strong>
        </div>
      `).join('')}
    </div>` : ''}
    ${corralesFilas.filter(c => c.stock).length ? `<div style="display:flex;flex-wrap:wrap;gap:8px">
      ${corralesFilas.filter(c => c.stock).map(c => `
        <div style="background:var(--gold-bg);color:var(--gold-text);border-radius:9px;padding:8px 15px;font-size:14.5px;font-weight:600;white-space:nowrap">
          🐂 ${c.nombre}: <strong>${fn(c.stock)}</strong>
        </div>
      `).join('')}
    </div>` : ''}
  </div>`;
  let filasStock = [
    ...filtrado.filter(s => (Number(s.stock) || 0) !== 0).map(s => ({ nombre: s.nombre, campo: campoNombre(s.campo_id), categoria: s.categoria, stock: Number(s.stock) || 0, esCorral: false })),
    ...corralesFilas.filter(c => (Number(c.stock) || 0) !== 0).map(c => ({ nombre: c.nombre, campo: c.campo, categoria: c.categoria, stock: Number(c.stock) || 0, esCorral: true })),
  ];
  if (!S.sort) S.sort = {};
  const sortStateStock = S.sort.stockRodeos || { key: 'stock', dir: 'desc' };
  filasStock = [...filasStock].sort((a, b) => {
    let va = a[sortStateStock.key], vb = b[sortStateStock.key];
    if (va == null) va = ''; if (vb == null) vb = '';
    const na = Number(va), nb = Number(vb);
    const numeric = va !== '' && vb !== '' && !isNaN(na) && !isNaN(nb);
    const cmp = numeric ? (na - nb) : String(va).localeCompare(String(vb), 'es', { sensitivity: 'base' });
    return sortStateStock.dir === 'asc' ? cmp : -cmp;
  });
  const colsStock = [{ key: 'nombre', label: 'Rodeo' }, { key: 'campo', label: 'Campo' }, { key: 'categoria', label: 'Categoría' }, { key: 'stock', label: 'Stock' }];
  h += `<div class="tw"><table class="dt"><thead><tr>`;
  colsStock.forEach(c => {
    const activo = sortStateStock.key === c.key;
    const flecha = activo ? (sortStateStock.dir === 'asc' ? ' ▲' : ' ▼') : '';
    h += `<th class="sortable-th${c.key === 'stock' ? ' tc' : ''}" style="cursor:pointer;user-select:none" onclick="sortStockRodeos('${c.key}')" title="Ordenar por ${c.label}">${c.label}${flecha}</th>`;
  });
  h += `</tr></thead><tbody>`;
  filasStock.forEach(s => {
    h += `<tr><td><strong>${s.nombre}</strong></td><td style="color:var(--text2)">${s.campo}</td>
      <td><span class="pill ${s.esCorral ? 'pill-gold' : 'pill-gray'}">${s.categoria}</span></td>
      <td class="tc"><strong>${fn(s.stock)}</strong></td></tr>`;
  });
  h += `</tbody></table></div>`;
  return h;
}
window.sortStockRodeos = function(key) {
  if (!S.sort) S.sort = {};
  const current = S.sort.stockRodeos;
  if (current && current.key === key) { current.dir = current.dir === 'asc' ? 'desc' : 'asc'; }
  else { S.sort.stockRodeos = { key, dir: 'asc' }; }
  window.renderStockFiltrado ? window.renderStockFiltrado() : render();
};

};

function buildMovimientosHistorial_(movimientos, ventas, corralesVentas, campoId, rodeoId) {
  let movsF = movimientos;
  if (campoId) movsF = movsF.filter(m => String(m.campo_origen_id) === String(campoId) || String(m.campo_destino_id) === String(campoId));
  if (rodeoId) movsF = movsF.filter(m => String(m.rodeo_origen_id) === String(rodeoId) || String(m.rodeo_destino_id) === String(rodeoId));

  let ventasF = ventas || [];
  if (campoId) ventasF = ventasF.filter(v => String(v.campo_id) === String(campoId));
  if (rodeoId) ventasF = ventasF.filter(v => String(v.rodeo_id) === String(rodeoId));

  // Ventas/bajas cargadas en la app de Corrales (novillos en engorde) — no tienen rodeo de Cría, así que se excluyen si hay filtro de rodeo
  const norm_ = s => String(s || '').trim().toLowerCase();
  let corralesF = corralesVentas || [];
  const nombreCampoSeleccionado = campoId ? norm_(campoNombre(campoId)) : '';
  if (rodeoId) corralesF = [];
  else if (campoId) corralesF = corralesF.filter(v => norm_(CORRAL_CAMPO_NOMBRE_[String(v.cid)]) === nombreCampoSeleccionado);

  // Normalizamos las 3 fuentes a una misma forma de fila, así se pueden ordenar todas juntas por cualquier columna
  let filas = [
    ...movsF.map(m => ({
      fecha: m.fecha || '',
      tipoLabel: m.tipo, tipoClass: m.tipo === 'Saldo inicial' ? 'pill-gold' : m.tipo === 'Traslado individual' ? 'pill-clay' : 'pill-green',
      caravana: m.caravana || '—',
      campoOrigen: m.campo_origen_id ? campoNombre(m.campo_origen_id) : '—',
      rodeoOrigen: m.rodeo_origen_id ? rodeoNombre(m.rodeo_origen_id) : '—',
      campoDestino: campoNombre(m.campo_destino_id), rodeoDestino: rodeoNombre(m.rodeo_destino_id),
      cantidad: Number(m.cantidad) || 0, obs: m.observaciones || '—',
      precio_cabeza: Number(m.precio_cabeza) || 0,
      entity: 'movimientos', idCol: 'movimiento_id', id: m.movimiento_id, editable: true,
    })),
    ...ventasF.map(v => ({
      fecha: v.fecha_salida || '',
      tipoLabel: 'Venta', tipoClass: 'pill-red',
      caravana: '—',
      campoOrigen: v.campo_id ? campoNombre(v.campo_id) : '—', rodeoOrigen: v.rodeo_id ? rodeoNombre(v.rodeo_id) : '—',
      campoDestino: '—', rodeoDestino: '—',
      cantidad: Number(v.cant_animales) || 0, obs: v.comprador ? 'Venta a ' + v.comprador : (v.observaciones || '—'),
      precio_cabeza: 0,
      entity: 'ventas', idCol: 'venta_id', id: v.venta_id, editable: true,
    })),
    ...corralesF.map(v => {
      const esBaja = !!v.baja;
      return {
        fecha: v.fecha || '',
        tipoLabel: (esBaja ? 'Baja' : 'Venta') + ' (Corrales)', tipoClass: esBaja ? 'pill-clay' : 'pill-red',
        caravana: '—',
        campoOrigen: CORRAL_CAMPO_NOMBRE_[String(v.cid)] || 'Sin campo asignado', rodeoOrigen: 'Corral ' + v.cid,
        campoDestino: '—', rodeoDestino: '—',
        cantidad: Number(v.cant) || 0, obs: esBaja ? 'Baja registrada en Corrales' : (v.precio ? `Venta en Corrales — $${fn(v.precio)}/kg` : 'Venta en Corrales'),
        precio_cabeza: 0,
        entity: null, idCol: null, id: null, editable: false,
      };
    }),
  ];

  if (!filas.length) {
    return '<div class="empty-state"><span class="ico">◌</span><div class="msg">Todavía no hay registros. Cargá el primero arriba.</div></div>';
  }

  if (!S.sort) S.sort = {};
  const sortState = S.sort.historialMov || { key: 'fecha', dir: 'desc' };
  filas = [...filas].sort((a, b) => {
    let va = a[sortState.key], vb = b[sortState.key];
    if (va == null) va = ''; if (vb == null) vb = '';
    const na = Number(va), nb = Number(vb);
    const numeric = va !== '' && vb !== '' && !isNaN(na) && !isNaN(nb);
    const cmp = numeric ? (na - nb) : String(va).localeCompare(String(vb), 'es', { sensitivity: 'base' });
    return sortState.dir === 'asc' ? cmp : -cmp;
  });

  const cols = [
    { key: 'fecha', label: 'Fecha' }, { key: 'tipoLabel', label: 'Tipo' }, { key: 'caravana', label: 'Caravana' },
    { key: 'campoOrigen', label: 'Campo origen' }, { key: 'rodeoOrigen', label: 'Rodeo origen' },
    { key: 'campoDestino', label: 'Campo destino' }, { key: 'rodeoDestino', label: 'Rodeo destino' },
    { key: 'cantidad', label: 'Cant.' }, { key: 'precio_cabeza', label: 'Precio/cab.' }, { key: 'obs', label: 'Obs.' },
  ];

  let h = `<div class="section-label">Historial <span class="count-badge" style="margin-left:6px">${filas.length}</span></div>
  <div class="tw"><table class="dt"><thead><tr>`;
  cols.forEach(c => {
    const activo = sortState.key === c.key;
    const flecha = activo ? (sortState.dir === 'asc' ? ' ▲' : ' ▼') : '';
    h += `<th class="sortable-th" onclick="sortHistorialMov('${c.key}')" style="cursor:pointer;user-select:none" title="Ordenar por ${c.label}">${c.label}${flecha}</th>`;
  });
  h += '<th></th></tr></thead><tbody>';

  filas.forEach(f => {
    h += `<tr>
      <td>${fd(f.fecha)}</td>
      <td><span class="pill ${f.tipoClass}">${f.tipoLabel}</span></td>
      <td>${f.caravana}</td>
      <td>${f.campoOrigen}</td>
      <td>${f.rodeoOrigen}</td>
      <td>${f.campoDestino}</td>
      <td>${f.rodeoDestino}</td>
      <td class="tc">${fn(f.cantidad)}</td>
      <td class="tr">${f.precio_cabeza ? '$ '+fn(f.precio_cabeza) : '—'}</td>
      <td>${f.obs}</td>
      <td>${f.editable ? `<div class="row-actions">
        <button class="icon-btn" data-edit="${f.id}" data-entity="${f.entity}" data-idcol="${f.idCol}" title="Editar">✎</button>
        <button class="icon-btn danger" data-del="${f.id}" data-entity="${f.entity}" data-idcol="${f.idCol}" title="Eliminar">✕</button>
      </div>` : ''}</td>
    </tr>`;
  });
  h += '</tbody></table></div>';
  return h;
}

async function loadTipoCambio() {
  // Si ya tenemos cotización de hoy, no volvemos a buscar
  const hoy = today();
  const yaHoy = (S.corralesTipoCambio || []).find(t => t.fecha === hoy);
  if (yaHoy) return;
  try {
    const res = await fetch('https://dolarapi.com/v1/dolares/oficial', { cache: 'no-store' });
    if (!res.ok) throw new Error('Sin respuesta');
    const data = await res.json();
    const valor = data.venta || data.promedio || null;
    if (!valor) throw new Error('Sin valor');
    // Agregamos la cotización de hoy a la lista (mantenemos historial para cálculos anteriores)
    const lista = (S.corralesTipoCambio || []).filter(t => t.fecha !== hoy);
    lista.push({ fecha: hoy, valor: Number(valor) });
    S.corralesTipoCambio = lista;
  } catch (err) {
    // Si falla, dejamos lo que había (puede haber cotizaciones anteriores)
    if (!S.corralesTipoCambio) S.corralesTipoCambio = [];
  }
}
// Busca la cotización BNA vigente a una fecha (la última cargada en Corrales con fecha <= fecha dada)
function tipoCambioVigente_(fecha) {
  // Unificar: Sheets (catalogs.tipo_cambio) + corralesStock
  const deCatalogs = (S.catalogs && S.catalogs.tipo_cambio || []).map(t => ({ fecha: t.fecha, valor: Number(t.valor) }));
  const deCorral   = (S.corralesTipoCambio || []);
  // Merge, Sheets tiene prioridad
  const todas = [...deCatalogs];
  deCorral.forEach(t => { if (!todas.find(x => x.fecha === t.fecha)) todas.push(t); });
  const lista = todas
    .filter(t => t.fecha && String(t.fecha) <= String(fecha))
    .sort((a, b) => String(a.fecha).localeCompare(String(b.fecha)));
  return lista.length ? lista[lista.length - 1] : null;
}

}

function attachMovimientosEvents() {
  function applyTipoUI(tipo) {
    const esSaldoInicial = tipo === 'Saldo inicial';
    const esIndividual = tipo === 'Traslado individual';
    const esBloque = tipo === 'Traslado en bloque';
    document.getElementById('mv-campo-origen-wrap').style.display = (esIndividual || esBloque) ? 'flex' : 'none';
    document.getElementById('mv-origen-wrap').style.display = (esIndividual || esBloque) ? 'flex' : 'none';
    document.getElementById('mv-caravana-wrap').style.display = esIndividual ? 'flex' : 'none';
    document.getElementById('mv-cantidad-wrap').style.display = esIndividual ? 'none' : 'flex';
    document.getElementById('mv-precio-wrap').style.display = esSaldoInicial ? 'flex' : 'none';
    document.getElementById('mv-destino-label').textContent = esSaldoInicial ? 'Rodeo' : 'Rodeo destino';
  }
  document.querySelectorAll('#mv-tipo-group .radio-pill').forEach(p => p.onclick = () => {

    p.classList.add('selected');
    applyTipoUI(p.dataset.tipo);
  });
  const save = document.getElementById('mv-save');
  if (save) save.onclick = async () => {
    const tipo = document.querySelector('#mv-tipo-group .selected').dataset.tipo;
    const esIndividual = tipo === 'Traslado individual';
    const esSaldoInicial = tipo === 'Saldo inicial';
    let rodeoDestinoId = document.getElementById('mv-destino').value;
    const campoDest = document.getElementById('mv-campo-destino').value;

    // Si eligió "crear rodeo nuevo", crearlo primero
    if (rodeoDestinoId === '__nuevo__') {
      const nombre = document.getElementById('mv-nr-nombre').value.trim();
      const categoria = document.getElementById('mv-nr-categoria').value;
      const actividad = ((S.catalogs && S.catalogs.rodeos) || []).find(r => String(r.campo_id) === String(campoDest))?.actividad || 'Cría';
      if (!nombre) { toast('Escribí el nombre del rodeo nuevo.', 'err'); return; }
      try {
        const resp = await apiCall('create', { body: { entity: 'rodeos', data: {
          nombre, campo_id: campoDest, categoria, activo: true, actividad,
        }}});
        await loadCatalogs();
        await loadStock();
        const nuevos = (S.catalogs && S.catalogs.rodeos) || [];
        const creado = nuevos.find(r => r.nombre === nombre && String(r.campo_id) === String(campoDest));
        if (!creado) { toast('Error al crear el rodeo.', 'err'); return; }
        rodeoDestinoId = String(creado.rodeo_id);
        toast('Rodeo "' + nombre + '" creado.', 'ok');
      } catch (err) { toast('Error al crear rodeo: ' + err.message, 'err'); return; }
    }

    const data = {
      tipo,
      caravana: esIndividual ? document.getElementById('mv-caravana').value.trim() : '',
      fecha: document.getElementById('mv-fecha').value,
      campo_origen_id: !esSaldoInicial ? document.getElementById('mv-campo-origen').value : '',
      campo_destino_id: campoDest,
      rodeo_origen_id: !esSaldoInicial ? document.getElementById('mv-origen').value : '',
      rodeo_destino_id: rodeoDestinoId,
      cantidad: esIndividual ? 1 : (Number(document.getElementById('mv-cantidad').value) || 0),
      precio_cabeza: esSaldoInicial ? (Number(document.getElementById('mv-precio-cabeza').value) || 0) : 0,
      observaciones: document.getElementById('mv-obs').value.trim(),
    };
    if (!data.fecha || !data.rodeo_destino_id) { toast('Completá fecha y rodeo destino.', 'err'); return; }
    if (esIndividual && !data.caravana) { toast('Ingresá la caravana del animal.', 'err'); return; }
    if (!esIndividual && !data.cantidad) { toast('Ingresá la cantidad.', 'err'); return; }
    if (!esSaldoInicial && data.rodeo_origen_id === data.rodeo_destino_id) { toast('El rodeo de origen y destino no pueden ser el mismo.', 'err'); return; }
    // Validación de coherencia campo-rodeo (solo para rodeos existentes, el nuevo ya fue validado arriba)
    if (!esSaldoInicial) {
      const rodeoOrigObj = rodeosTodos().find(r => String(r.rodeo_id) === String(data.rodeo_origen_id));
      if (!rodeoOrigObj || String(rodeoOrigObj.campo_id) !== String(data.campo_origen_id)) {
        toast('El rodeo origen no corresponde al campo elegido. Volvé a seleccionar el campo y esperá que se actualice la lista de rodeos.', 'err');
        return;
      }
    }
    save.disabled = true;
    try {
      await apiCall('create', { body: { entity: 'movimientos', data } });
      invalidateCache('movimientos');
      toast('Movimiento registrado', 'ok');
      await loadEntity('movimientos', true);
      S.stock = null;
      await loadStock();
      render();
    } catch (err) { toast(err.message, 'err'); } finally { save.disabled = false; }
  };
  attachTableDeleteEvents('movimientos', 'movimiento_id');
  attachTableDeleteEvents('ventas', 'venta_id');
}

// ── RECRÍA ────────────────────────────────────────────────────────────────
function buildRecriaDashboard() {
  const rodeos    = (S.resumenRecria && S.resumenRecria.rodeos) || [];
  const campos    = (S.catalogs && S.catalogs.campos) || [];
  const rodeosAll = (S.catalogs && S.catalogs.rodeos) || [];
  const rodeosPorId = Object.fromEntries(rodeosAll.map(r=>[String(r.rodeo_id),r]));
  const fm = v => '$ ' + fn(Math.round(v||0));

  const campSelec  = S.rcDashCampo || '';
  const moneda     = S.rcDashMoneda || 'ARS';
  const fmM = v => moneda === 'USD' ? 'U$S ' + fn(Math.round(convertirAMoneda_(v, today(), 'USD'))) : fm(v);

  // Mortandad
  const mortandad = (S.cache.mortandad||[]);
  const rodeosFiltBase = rodeos.filter(r => !campSelec || String(r.campo_id) === String(campSelec));
  const rodeosIdsFilt  = new Set(rodeosFiltBase.map(r=>String(r.rodeo_id)));
  const mortFilt = mortandad.filter(m=>rodeosIdsFilt.has(String(m.rodeo_id)));
  const mortTotal = mortFilt.reduce((s,m)=>s+(Number(m.cantidad)||1),0);
  const mortPorRodeo = {};
  mortFilt.forEach(m=>{ const rid=String(m.rodeo_id); mortPorRodeo[rid]=(mortPorRodeo[rid]||0)+(Number(m.cantidad)||1); });

  let h = `<div class="page-header">
    <div class="page-title">Dashboard Recría</div>
    <div style="display:flex;gap:8px;margin-top:8px;flex-wrap:wrap">
      <button onclick="S.rcDashMoneda=S.rcDashMoneda==='USD'?'ARS':'USD';render()"
        style="margin-left:auto;padding:6px 14px;border-radius:20px;border:none;cursor:pointer;font-size:13px;font-weight:600;background:var(--blue);color:#fff">
        💵 ${moneda==='USD'?'Ver en ARS':'Ver en U$S'}
      </button>
    </div>
  </div>`;

  // Filtros
  h += `<div style="display:flex;align-items:center;gap:16px;margin-bottom:16px;flex-wrap:wrap">
    <div style="display:flex;align-items:center;gap:8px">
      <label style="font-size:13px;font-weight:600">Campo:</label>
      <select style="font-size:13px;padding:6px 10px;border-radius:8px;border:1px solid var(--border);background:var(--bg);color:var(--text)"
        onchange="S.rcDashCampo=this.value;render()">
        <option value="">Todos los campos</option>
        ${campos.map(c=>`<option value="${c.campo_id}" ${campSelec==c.campo_id?'selected':''}>${c.nombre}</option>`).join('')}
      </select>
    </div>
  </div>`;

  // Mortandad — panel rojo destacado
  if (mortTotal > 0) {
    h += `<div class="panel" style="border:2px solid var(--red);background:rgba(200,50,50,0.06);margin-bottom:16px">
      <div class="panel-title" style="color:var(--red)">💀 Mortandad en Recría</div>
      <div style="display:flex;gap:10px;flex-wrap:wrap;margin-bottom:8px">`;
    Object.entries(mortPorRodeo).forEach(([rid,cant])=>{
      const r = rodeosFiltBase.find(x=>String(x.rodeo_id)===String(rid));
      h += `<div style="background:rgba(200,50,50,0.15);border-radius:8px;padding:8px 14px;border:1px solid var(--red)">
        <div style="font-size:11px;font-weight:700;color:var(--red);text-transform:uppercase">${r?.nombre||'Rodeo '+rid}</div>
        <div style="font-size:22px;font-weight:800;color:var(--red)">${cant} <span style="font-size:13px">baja${cant>1?'s':''}</span></div>
      </div>`;
    });
    h += `<div style="background:rgba(200,50,50,0.25);border-radius:8px;padding:8px 14px;border:2px solid var(--red)">
      <div style="font-size:11px;font-weight:700;color:var(--red);text-transform:uppercase">Total</div>
      <div style="font-size:26px;font-weight:800;color:var(--red)">${mortTotal} <span style="font-size:13px">bajas</span></div>
    </div></div>
      <div style="font-size:12px;color:var(--red)">⚠ La mortandad no se suma como egreso — su impacto ya está reflejado en el menor stock al cierre.</div>
    </div>`;
  }

  // ── CALCULAR INGRESOS Y EGRESOS ───────────────────────────────────────
  const ventas     = (S.cache.ventas||[]).filter(v=>rodeosIdsFilt.has(String(v.rodeo_id)));
  const consumos   = (S.cache.consumos_insumos||[]).filter(c=>rodeosIdsFilt.has(String(c.rodeo_id)));
  const movs       = (S.cache.movimientos||[]);
  const destetes   = (S.cache.destetes||[]);
  const egresos    = (S.cache.egresos_recria||[]).filter(e=>rodeosIdsFilt.has(String(e.rodeo_id)));
  const precios    = (S.cache.precios_internos||[]).slice().sort((a,b)=>String(b.fecha_desde||'').localeCompare(String(a.fecha_desde||'')));
  const productos  = (S.catalogs&&S.catalogs.productos)||[];

  function precioInternoEn(fecha) {
    const v = precios.filter(p=>p.fecha_desde<=fecha);
    return v.length ? v[0] : null;
  }

  // INGRESOS
  // 1. Ventas directas de Recría
  let ingVentas = 0;
  const detalleVentas = [];
  ventas.forEach(v=>{
    const imp = Number(v.importe_liq)||(Number(v.precio_pactado)*(Number(v.peso_campo_kg)||Number(v.cant_animales)))||0;
    ingVentas += imp;
    detalleVentas.push({ fecha: v.fecha_salida, rodeo: rodeoNombre(v.rodeo_id), cant: Number(v.cant_animales)||0, importe: imp });
  });

  // 2. Cesiones a Terminación (egresos con destino Engorde, con precio_kg_cesion)
  let ingCesionEng = 0;
  const detalleCesEng = [];
  egresos.filter(e=>e.destino==='Engorde').forEach(e=>{
    const cant=Number(e.cant_animales)||0, peso=Number(e.peso_prom_kg)||0, precioKg=Number(e.precio_kg_cesion)||0;
    const kgTot = cant*peso;
    const imp = kgTot*precioKg;
    ingCesionEng += imp;
    detalleCesEng.push({ fecha: e.fecha, rodeo: rodeoNombre(e.rodeo_id), cant, kg: kgTot, importe: imp, sinPrecio: !precioKg });
  });

  // 3. Stock valorizado actual
  let stockValRecria = 0;
  const preciosVal = preciosValGet_();
  rodeosFiltBase.forEach(r=>{
    const stock = Math.max(0, r.stock||0);
    if (!stock) return;
    const pesoP = r.ultima_pesada ? Number(r.ultima_pesada.peso_prom_kg)||0 : 0;
    stockValRecria += valorizarRodeo_(rodeosAll.find(x=>String(x.rodeo_id)===String(r.rodeo_id))||{}, stock, pesoP);
  });

  const totalIngresos = ingVentas + ingCesionEng + stockValRecria;

  // EGRESOS
  // 1. Cesión desde Cría — traslados de Cría a rodeos de Recría con precio/kg
  let egCesionCria = 0;
  const detalleCesCria = [];
  const rodeosAllMap = Object.fromEntries((S.catalogs&&S.catalogs.rodeos||[]).map(r=>[String(r.rodeo_id),r]));
  movs.filter(m=>{
    if(m.tipo!=='Traslado en bloque'&&m.tipo!=='Traslado individual') return false;
    const or = rodeosAllMap[String(m.rodeo_origen_id)];
    const de = rodeosAllMap[String(m.rodeo_destino_id)];
    return or&&(or.actividad==='Cría'||or.actividad==='Cria')&&de&&de.actividad==='Recría'&&rodeosIdsFilt.has(String(m.rodeo_destino_id));
  }).forEach(m=>{
    const cant=Number(m.cantidad)||0, peso=Number(m.peso_prom_kg)||0, precioKg=Number(m.precio_cabeza)||0;
    const imp = cant*peso*precioKg;
    egCesionCria += imp;
    detalleCesCria.push({ fecha: m.fecha, rodeo: rodeoNombre(m.rodeo_destino_id), total: cant, kg: cant*peso, importe: imp });
  });

  // 2. Compra externa (movimientos hacia rodeos de recría con precio)
  let egCompraExterna = 0;
  movs.filter(m=>rodeosIdsFilt.has(String(m.rodeo_destino_id))&&m.tipo!=='Saldo inicial'&&m.tipo!=='Traslado en bloque'&&m.tipo!=='Traslado individual').forEach(m=>{
    egCompraExterna += (Number(m.cantidad)||0)*(Number(m.precio_cabeza)||0);
  });

  // 3. Alimentación y veterinaria
  let egAlim = 0, egVet = 0;
  consumos.forEach(c=>{
    const prod = productos.find(p=>String(p.producto_id)===String(c.producto_id));
    const costo = (Number(c.cantidad)||0)*egCostoPromProducto_(c.producto_id);
    if (prod&&prod.categoria==='Veterinaria') egVet += costo;
    else egAlim += costo;
  });

  // 4. Sueldos prorrateados a Recría
  let egSueldos = 0;
  (S.cache.sueldos||[]).forEach(s=>{ egSueldos += (Number(s.monto)||0)*(Number(s.dist_recria)||0)/100; });

  // 5. Stock inicial (EI) — saldos iniciales de rodeos de Recría
  const egEI = movs
    .filter(m => m.tipo==='Saldo inicial' && rodeosIdsFilt.has(String(m.rodeo_destino_id)))
    .reduce((s,m) => s+(Number(m.cantidad)||0)*(Number(m.precio_cabeza)||0), 0);

  const totalEgresos  = egEI + egCesionCria + egCompraExterna + egAlim + egVet + egSueldos;
  const margen = totalIngresos - totalEgresos;
  const mc = margen>=0?'var(--green)':'var(--red)';
  const mb = margen>=0?'var(--green-bg)':'rgba(220,50,50,0.08)';

  // KPIs producción
  const pesadas = (S.cache.pesadas||[]).filter(p=>rodeosIdsFilt.has(String(p.rodeo_id)));
  let kgGanadoTotal = 0, cabezasConPesada = 0;
  rodeosIdsFilt.forEach(rid=>{
    const pesR = pesadas.filter(p=>String(p.rodeo_id)===String(rid)).sort((a,b)=>String(a.fecha).localeCompare(String(b.fecha)));
    if (pesR.length>=2) {
      const cab = Number(pesR[pesR.length-1].cantidad)||0;
      kgGanadoTotal += cab*((Number(pesR[pesR.length-1].peso_prom_kg)||0)-(Number(pesR[0].peso_prom_kg)||0));
      cabezasConPesada += cab;
    }
  });
  const costoPorKg  = kgGanadoTotal>0 ? totalEgresos/kgGanadoTotal : null;
  const margenPorKg = kgGanadoTotal>0 ? margen/kgGanadoTotal : null;

  // ── LAYOUT DOS COLUMNAS ───────────────────────────────────────────────
  h += `<div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:20px">

    <!-- INGRESOS -->
    <div class="panel" style="margin-bottom:0">
      <div class="panel-title" style="color:var(--green-text)">📈 Ingresos</div>
      <table class="dt" style="margin-bottom:12px"><tbody>
        <tr><td>💵 Ventas directas</td><td class="tr"><strong>${fmM(ingVentas)}</strong></td></tr>
        <tr><td>➡ Cesión a Terminación</td><td class="tr"><strong>${fmM(ingCesionEng)}</strong></td></tr>
        <tr><td>📦 Stock valorizado actual</td><td class="tr"><strong>${fmM(stockValRecria)}</strong></td></tr>
        <tr style="background:var(--green-bg);font-weight:700"><td><strong>Total ingresos</strong></td><td class="tr" style="color:var(--green)"><strong>${fmM(totalIngresos)}</strong></td></tr>
      </tbody></table>
      ${detalleVentas.length ? `<div style="font-size:11px;color:var(--text2);margin-top:8px"><strong>Ventas:</strong> ${detalleVentas.map(v=>`${fd(v.fecha)} — ${v.rodeo} (${fn(v.cant)} cab.) ${fmM(v.importe)}`).join('<br>')}</div>` : ''}
      ${detalleCesEng.length ? `<div style="font-size:11px;color:var(--text2);margin-top:6px"><strong>Cesiones a Terminación:</strong> ${detalleCesEng.map(e=>`${fd(e.fecha)} — ${e.rodeo} ${fn(e.cant)} cab. · ${fn(Math.round(e.kg))} kg ${e.sinPrecio?'<span style="color:var(--red)">⚠ sin precio interno</span>':fmM(e.importe)}`).join('<br>')}</div>` : ''}
    </div>

    <!-- EGRESOS -->
    <div class="panel" style="margin-bottom:0">
      <div class="panel-title" style="color:var(--red)">📉 Egresos</div>
      <table class="dt" style="margin-bottom:12px"><tbody>
        <tr><td>📦 Stock inicial (EI)</td><td class="tr"><strong>${fmM(egEI)}</strong></td></tr>
        <tr><td>⬅ Cesión desde Cría</td><td class="tr"><strong>${fmM(egCesionCria)}</strong></td></tr>
        ${egCompraExterna>0?`<tr><td>🛒 Compra externa</td><td class="tr"><strong>${fmM(egCompraExterna)}</strong></td></tr>`:''}
        <tr><td>🌿 Alimentación</td><td class="tr"><strong>${fmM(egAlim)}</strong></td></tr>
        <tr><td>💉 Veterinaria</td><td class="tr"><strong>${fmM(egVet)}</strong></td></tr>
        <tr><td>👷 Sueldos</td><td class="tr"><strong>${fmM(egSueldos)}</strong></td></tr>
        <tr style="background:rgba(220,50,50,0.08);font-weight:700"><td><strong>Total egresos</strong></td><td class="tr" style="color:var(--red)"><strong>${fmM(totalEgresos)}</strong></td></tr>
      </tbody></table>
    </div>
  </div>`;

  // Margen
  h += `<div class="panel" style="background:${mb};border:2px solid ${mc};margin-bottom:16px">
    <div style="display:flex;justify-content:space-between;align-items:center">
      <div>
        <div style="font-size:13px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:${mc}">Margen bruto Recría</div>
        ${margenPorKg!==null?`<div style="font-size:12px;color:${mc};margin-top:2px">${fmM(margenPorKg)}/kg ganado</div>`:''}
      </div>
      <div style="font-size:32px;font-weight:800;color:${mc}">${margen>=0?'':'-'}${fmM(Math.abs(margen))}</div>
    </div>
  </div>`;

  // Mortandad — DESPUÉS del resultado, destacada en rojo
  if (mortTotal > 0) {
    h += `<div class="panel" style="border:2px solid var(--red);background:rgba(200,50,50,0.06);margin-bottom:16px">
      <div class="panel-title" style="color:var(--red)">💀 Mortandad en Recría</div>
      <div style="display:flex;gap:10px;flex-wrap:wrap;margin-bottom:8px">`;
    Object.entries(mortPorRodeo).forEach(([rid,cant])=>{
      const r = rodeosFiltBase.find(x=>String(x.rodeo_id)===String(rid));
      h += `<div style="background:rgba(200,50,50,0.15);border-radius:8px;padding:10px 16px;border:1px solid var(--red)">
        <div style="font-size:11px;font-weight:700;color:var(--red);text-transform:uppercase">${r?.nombre||'Rodeo '+rid}</div>
        <div style="font-size:26px;font-weight:800;color:var(--red)">${cant} <span style="font-size:13px">baja${cant>1?'s':''}</span></div>
      </div>`;
    });
    h += `<div style="background:rgba(200,50,50,0.25);border-radius:8px;padding:10px 16px;border:2px solid var(--red)">
      <div style="font-size:11px;font-weight:700;color:var(--red);text-transform:uppercase">Total</div>
      <div style="font-size:30px;font-weight:800;color:var(--red)">${mortTotal} <span style="font-size:13px">bajas</span></div>
    </div></div>
      <div style="font-size:12px;color:var(--red)">⚠ La mortandad no se contabiliza como egreso — su impacto está reflejado en el menor stock al cierre.</div>
    </div>`;
  }

  // KPIs producción
  h += `<div class="panel">
    <div class="panel-title">📊 KPIs de producción</div>
    <div class="kpi-grid">
      <div class="kpi"><div class="kpi-icon">🐄</div><div class="kpi-label">Rodeos activos</div><div class="kpi-val">${rodeosIdsFilt.size}</div></div>
      <div class="kpi"><div class="kpi-icon">⚖</div><div class="kpi-label">Kg ganado total</div><div class="kpi-val">${kgGanadoTotal>0?fn(Math.round(kgGanadoTotal))+' kg':'—'}</div><div class="kpi-sub">${cabezasConPesada>0?fn(cabezasConPesada)+' cab. con 2+ pesadas':''}</div></div>
      ${costoPorKg!==null?`<div class="kpi"><div class="kpi-icon">💲</div><div class="kpi-label">Costo/kg ganado</div><div class="kpi-val">${fmM(costoPorKg)}</div></div>`:''}
      ${margenPorKg!==null?`<div class="kpi"><div class="kpi-icon">${margenPorKg>=0?'📈':'📉'}</div><div class="kpi-label">Margen/kg ganado</div><div class="kpi-val ${margenPorKg>=0?'kpi-pos':'kpi-neg'}">${fmM(margenPorKg)}</div></div>`:''}
    </div>
  </div>`;

  // Sueldos KPI
  h += buildSueldoKpiPanel_('recria');

  // Stock por rodeo — formato tabla/líneas, solo stock > 0
  h += `<div class="panel"><div class="panel-title">🐄 Stock actual por rodeo</div>
    <div class="tw"><table class="dt"><thead><tr>
      <th>Rodeo</th><th>Campo</th><th class="tc">Animales</th><th class="tc">Última pesada</th><th class="tc">Bajas</th>
    </tr></thead><tbody>`;
  const rodeoConStock = rodeosFiltBase.filter(r => (r.stock||0) > 0);
  if (!rodeoConStock.length) {
    h += `<tr><td colspan="5" class="tc" style="color:var(--muted)">Sin stock activo</td></tr>`;
  } else {
    rodeoConStock.forEach(r=>{
      const up = r.ultima_pesada;
      const mort = mortPorRodeo[String(r.rodeo_id)]||0;
      h += `<tr style="${mort>0?'background:rgba(200,50,50,0.04)':''}">
        <td><strong>${r.nombre}</strong></td>
        <td style="color:var(--text2)">${r.campo_nombre||'—'}</td>
        <td class="tc"><span style="font-size:18px;font-weight:800;color:var(--gold-text)">${fn(r.stock)}</span></td>
        <td class="tc" style="color:var(--text2)">${up?`${fn(up.peso_prom_kg)} kg (${fd(up.fecha)})`:'—'}</td>
        <td class="tc">${mort>0?`<span style="font-size:16px;font-weight:800;color:var(--red)">💀 ${mort}</span>`:'<span style="color:var(--muted)">—</span>'}</td>
      </tr>`;
    });
  }
  h += `</tbody></table></div></div>`;

  return h;
}

function buildCesionesCria() {
  const rodeos    = (S.catalogs && S.catalogs.rodeos) || [];
  const campos    = (S.catalogs && S.catalogs.campos) || [];
  const movs      = S.cache.movimientos || [];
  const pesadas   = S.cache.pesadas || [];
  const rodeosPorId = Object.fromEntries(rodeos.map(r=>[String(r.rodeo_id),r]));

  // Rodeos de Cría categoria ternero/ternera como origen
  const rodeosCria = rodeos.filter(r=>r.actividad==='Cría'&&(r.activo===true||String(r.activo).toUpperCase()==='TRUE')&&
    (r.categoria==='ternero'||r.categoria==='ternera'));
  // Rodeos de Recría como destino
  const rodeosRec  = rodeos.filter(r=>r.actividad==='Recría'&&(r.activo===true||String(r.activo).toUpperCase()==='TRUE'));

  // Cesiones existentes — traslados de Cría a Recría con precio cargado
  const cesiones = movs.filter(m=>{
    if (m.tipo!=='Traslado en bloque'&&m.tipo!=='Traslado individual') return false;
    const or = rodeosPorId[String(m.rodeo_origen_id)];
    const de = rodeosPorId[String(m.rodeo_destino_id)];
    return or&&(or.actividad==='Cría'||or.actividad==='Cria')&&de&&(de.actividad==='Recría');
  }).sort((a,b)=>String(b.fecha).localeCompare(String(a.fecha)));

  let h = `<div class="page-header">
    <div class="page-title">Cesiones — Cría a Recría</div>
    <div class="page-sub">Registrá el traspaso de animales de Cría a Recría con precio de cesión $/kg</div>
  </div>`;

  h += `<div class="panel">
    <div class="panel-title">➕ Nueva cesión</div>
    <div class="fgrid">
      <div class="fg"><label>Fecha</label><input type="date" id="ces-c-fecha" value="${today()}"></div>
      <div class="fg"><label>Rodeo origen (Cría)</label>
        <select id="ces-c-origen">
          <option value="">— Seleccioná —</option>
          ${rodeosCria.map(r=>`<option value="${r.rodeo_id}">${r.nombre} (${campoNombre(r.campo_id)})</option>`).join('')}
        </select>
      </div>
      <div class="fg"><label>Rodeo destino (Recría)</label>
        <select id="ces-c-destino">
          <option value="">— Seleccioná —</option>
          ${rodeosRec.map(r=>`<option value="${r.rodeo_id}">${r.nombre} (${campoNombre(r.campo_id)})</option>`).join('')}
        </select>
      </div>
      <div class="fg"><label>Categoría</label>
        <select id="ces-c-cat">
          <option value="ternero">Ternero</option>
          <option value="ternera">Ternera</option>
        </select>
      </div>
      <div class="fg"><label>Cantidad</label><input type="number" id="ces-c-cant" min="1" placeholder="Ej: 150"></div>
      <div class="fg"><label>Peso promedio (kg)</label><input type="number" id="ces-c-peso" min="0" step="0.1" placeholder="Ej: 180"></div>
      <div class="fg"><label>Precio cesión ($/kg)</label><input type="number" id="ces-c-precio" min="0" step="1" placeholder="Ej: 2500" oninput="cesCriaCalcTotal_()"></div>
      <div class="fg"><label>Total estimado</label><div id="ces-c-total" style="font-size:15px;font-weight:700;color:var(--green);padding:9px 0">—</div></div>
      <div class="fg" style="min-width:200px"><label>Observaciones</label><input type="text" id="ces-c-obs" placeholder="Opcional"></div>
    </div>
    <button class="btn btn-primary" id="ces-c-save" style="margin-top:8px">💾 Registrar cesión</button>
  </div>`;

  // Historial
  h += `<div class="section-label">Historial de cesiones Cría → Recría</div>`;
  if (!cesiones.length) {
    h += `<div class="empty-state"><span class="ico">◌</span><div class="msg">Sin cesiones registradas aún.</div></div>`;
  } else {
    h += `<div class="tw"><table class="dt"><thead><tr>
      <th>Fecha</th><th>Origen</th><th>Destino</th>
      <th class="tc">Cant.</th><th class="tc">Peso prom.</th>
      <th class="tc">Precio $/kg</th><th class="tc">Total</th>
    </tr></thead><tbody>`;
    cesiones.forEach(m=>{
      const or = rodeosPorId[String(m.rodeo_origen_id)];
      const de = rodeosPorId[String(m.rodeo_destino_id)];
      const cant = Number(m.cantidad)||0;
      // Buscar peso de última pesada del rodeo origen
      const pesR = pesadas.filter(p=>String(p.rodeo_id)===String(m.rodeo_origen_id)).sort((a,b)=>String(b.fecha).localeCompare(String(a.fecha)));
      const peso = Number(m.peso_prom_kg)||Number(pesR[0]?.peso_prom_kg)||0;
      const precioKg = Number(m.precio_cabeza)||0; // precio/cabeza se usa como precio/kg en cesiones
      const total = cant * peso * precioKg;
      h += `<tr>
        <td>${fd(m.fecha)}</td>
        <td>${or?.nombre||'—'}</td>
        <td>${de?.nombre||'—'}</td>
        <td class="tc"><strong>${fn(cant)}</strong></td>
        <td class="tc">${peso?fn(peso)+' kg':'—'}</td>
        <td class="tc">${precioKg?'$ '+fn(precioKg)+'/kg':'<span class="pill pill-clay">sin precio</span>'}</td>
        <td class="tc"><strong>${total?'$ '+fn(Math.round(total)):'—'}</strong></td>
      </tr>`;
    });
    h += `</tbody></table></div>`;
  }
  return h;
}

function cesCriaCalcTotal_() {
  const cant  = Number(document.getElementById('ces-c-cant')?.value)||0;
  const peso  = Number(document.getElementById('ces-c-peso')?.value)||0;
  const precio= Number(document.getElementById('ces-c-precio')?.value)||0;
  const el = document.getElementById('ces-c-total');
  if (el) el.textContent = (cant&&peso&&precio) ? '$ '+fn(Math.round(cant*peso*precio)) : '—';
}

function attachCesionesCriaEvents() {
  document.getElementById('ces-c-cant')?.addEventListener('input', cesCriaCalcTotal_);
  document.getElementById('ces-c-peso')?.addEventListener('input', cesCriaCalcTotal_);
  const btn = document.getElementById('ces-c-save');
  if (!btn) return;
  btn.onclick = async () => {
    const fecha   = document.getElementById('ces-c-fecha').value;
    const origen  = document.getElementById('ces-c-origen').value;
    const destino = document.getElementById('ces-c-destino').value;
    const cant    = Number(document.getElementById('ces-c-cant').value)||0;
    const peso    = Number(document.getElementById('ces-c-peso').value)||0;
    const precio  = Number(document.getElementById('ces-c-precio').value)||0;
    const obs     = document.getElementById('ces-c-obs').value.trim();
    if (!fecha||!origen||!destino||!cant) { toast('Completá fecha, rodeos y cantidad.', 'err'); return; }
    if (!precio) { toast('Ingresá el precio de cesión ($/kg).', 'err'); return; }
    btn.disabled = true; btn.textContent = '⏳ Guardando...';
    try {
      await apiCall('create', { body: { entity: 'movimientos', data: {
        tipo: 'Traslado en bloque',
        fecha,
        rodeo_origen_id: origen,
        rodeo_destino_id: destino,
        campo_origen_id: (S.catalogs?.rodeos||[]).find(r=>String(r.rodeo_id)===String(origen))?.campo_id||'',
        campo_destino_id: (S.catalogs?.rodeos||[]).find(r=>String(r.rodeo_id)===String(destino))?.campo_id||'',
        cantidad: cant,
        peso_prom_kg: peso,
        precio_cabeza: precio, // guardamos precio/kg en precio_cabeza para cesiones
        observaciones: obs || 'Cesión Cría → Recría',
      }}});
      invalidateCache('movimientos');
      await loadEntity('movimientos', true);
      toast('Cesión registrada — '+fn(cant)+' animales · $ '+fn(precio)+'/kg', 'ok');
      render();
    } catch(err) { toast(err.message, 'err'); }
    finally { btn.disabled=false; btn.textContent='💾 Registrar cesión'; }
  };
}
