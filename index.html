function calcStockHacienda_(desde, hasta, campoFiltro, mensual) {
  const rodeos = rodeosTodos().filter(function(r){ return campoFiltro ? String(r.campo_id) === String(campoFiltro) : true; });
  const movs = (S.cache.movimientos || []);
  const ventas = (S.cache.ventas || []);
  const pariciones = (S.cache.pariciones || []);
  const mortandad = (S.cache.mortandad || []);
  const destetes = (S.cache.destetes || []);

  // Categorias en orden logico
  const CATS = ['Toro', 'Vaca', 'Vaquillona', 'Vaquillona proximo servicio', 'Vaquilloncita', 'Novillito', 'Ternero', 'Ternera', 'Novillo'];

  function getCat(r) {
    const c = String(r.categoria || '').trim();
    for (var i=0; i<CATS.length; i++) {
      if (c.toLowerCase().indexOf(CATS[i].toLowerCase()) !== -1) return CATS[i];
    }
    return c || 'Otros';
  }

  function getMonths(d1, d2) {
    var meses = [];
    // d1 y d2 pueden ser 'YYYY-MM-DD' o 'YYYY-MM' — tomar solo YYYY-MM
    var cur = new Date(d1.slice(0,7) + '-01T12:00:00');
    var end = new Date(d2.slice(0,7) + '-01T12:00:00');
    while (cur <= end) {
      meses.push(cur.getFullYear() + '-' + String(cur.getMonth()+1).padStart(2,'0'));
      cur.setMonth(cur.getMonth()+1);
    }
    return meses;
  }

  // Calcular stock inicial de cada rodeo (movs con fecha < desde)
  function stockInicial(rodeoId) {
    // El Saldo inicial es el punto de partida del sistema — no tiene fecha historica real.
    // Existencia inicial = suma de todos los Saldos iniciales del rodeo
    //   + movimientos de entrada ANTES de "desde" (excepto Saldo inicial)
    //   - movimientos de salida ANTES de "desde"
    //   + nacimientos antes de "desde"
    //   - ventas/muertes/destetes antes de "desde"
    var saldoBase = 0;
    movs.filter(function(m){ return m.tipo === 'Saldo inicial' && String(m.rodeo_destino_id) === String(rodeoId); })
      .forEach(function(m){ saldoBase += Number(m.cantidad) || 0; });

    var ajuste = 0;
    movs.filter(function(m){ return m.fecha < desde && m.tipo !== 'Saldo inicial'; }).forEach(function(m) {
      if (String(m.rodeo_destino_id) === String(rodeoId)) ajuste += Number(m.cantidad) || 0;
      if (String(m.rodeo_origen_id) === String(rodeoId)) ajuste -= Number(m.cantidad) || 0;
    });
    ventas.filter(function(v){ return v.fecha_salida < desde && String(v.rodeo_id) === String(rodeoId); })
      .forEach(function(v){ ajuste -= Number(v.cant_animales) || 0; });
    pariciones.filter(function(p){ return p.fecha < desde && String(p.rodeo_id) === String(rodeoId); })
      .forEach(function(p){ ajuste += Number(p.nacidos_vivos) || 0; });
    mortandad.filter(function(m){ return m.fecha < desde && String(m.rodeo_id) === String(rodeoId); })
      .forEach(function(m){ ajuste -= Number(m.cantidad) || 0; });
    destetes.filter(function(d){ return d.fecha < desde && String(d.rodeo_id) === String(rodeoId); })
      .forEach(function(d){ ajuste -= Number(d.cantidad) || 0; });
    return Math.max(0, saldoBase + ajuste);
  }

  function movsPeriodo(rodeoId, fDesde, fHasta) {
    var compras=0, ventas_=0, nacimientos=0, muertes=0, destetar=0, traslados_e=0, traslados_s=0, ajustes=0;
    movs.filter(function(m){ return m.fecha >= fDesde && m.fecha <= fHasta; }).forEach(function(m) {
      const cant = Number(m.cantidad) || 0;
      if (m.tipo === 'Saldo inicial') return;
      if (String(m.rodeo_destino_id) === String(rodeoId)) {
        if (m.tipo === 'Traslado en bloque' || m.tipo === 'Traslado individual') traslados_e += cant;
        else compras += cant;
      }
      if (String(m.rodeo_origen_id) === String(rodeoId)) {
        if (m.tipo === 'Traslado en bloque' || m.tipo === 'Traslado individual') traslados_s += cant;
        else ajustes += cant;
      }
    });
    ventas.filter(function(v){ return v.fecha_salida >= fDesde && v.fecha_salida <= fHasta && String(v.rodeo_id) === String(rodeoId); })
      .forEach(function(v){ ventas_ += Number(v.cant_animales) || 0; });
    pariciones.filter(function(p){ return p.fecha >= fDesde && p.fecha <= fHasta && String(p.rodeo_id) === String(rodeoId); })
      .forEach(function(p){ nacimientos += Number(p.nacidos_vivos) || 0; });
    mortandad.filter(function(m){ return m.fecha >= fDesde && m.fecha <= fHasta && String(m.rodeo_id) === String(rodeoId); })
      .forEach(function(m){ muertes += Number(m.cantidad) || 0; });
    destetes.filter(function(d){ return d.fecha >= fDesde && d.fecha <= fHasta && String(d.rodeo_id) === String(rodeoId); })
      .forEach(function(d){ destetar += Number(d.cantidad) || 0; });
    return { compras, ventas: ventas_, nacimientos, muertes, destetes: destetar, traslados_e, traslados_s, ajustes };
  }

  // Agrupar por categoria
  var result = {};
  var cats = [...new Set(rodeos.map(getCat))].sort(function(a,b){
    return CATS.indexOf(a) - CATS.indexOf(b);
  });

  var meses = mensual ? getMonths(desde, hasta) : [null];

  cats.forEach(function(cat) {
    var rodeoscat = rodeos.filter(function(r){ return getCat(r) === cat; });
    var fila = { categoria: cat, si: 0, compras:0, ventas:0, nacimientos:0, muertes:0, destetes:0, traslados_e:0, traslados_s:0, ajustes:0, sf:0 };
    if (mensual) { fila.meses = {}; meses.forEach(function(m){ fila.meses[m] = {compras:0,ventas:0,nacimientos:0,muertes:0,destetes:0,traslados_e:0,traslados_s:0}; }); }

    rodeoscat.forEach(function(r) {
      fila.si += stockInicial(r.rodeo_id);
      var mp = movsPeriodo(r.rodeo_id, desde, hasta);
      fila.compras += mp.compras; fila.ventas += mp.ventas; fila.nacimientos += mp.nacimientos;
      fila.muertes += mp.muertes; fila.destetes += mp.destetes;
      fila.traslados_e += mp.traslados_e; fila.traslados_s += mp.traslados_s; fila.ajustes += mp.ajustes;

      if (mensual) {
        meses.forEach(function(mes) {
          var fd = mes + '-01', fh = mes + '-' + new Date(mes.slice(0,4), mes.slice(5,7), 0).getDate().toString().padStart(2,'0');
          var mp2 = movsPeriodo(r.rodeo_id, fd, fh);
          fila.meses[mes].compras += mp2.compras; fila.meses[mes].ventas += mp2.ventas;
          fila.meses[mes].nacimientos += mp2.nacimientos; fila.meses[mes].muertes += mp2.muertes;
          fila.meses[mes].destetes += mp2.destetes; fila.meses[mes].traslados_e += mp2.traslados_e;
          fila.meses[mes].traslados_s += mp2.traslados_s;
        });
      }
    });
    fila.sf = fila.si + fila.compras + fila.nacimientos + fila.traslados_e - fila.ventas - fila.muertes - fila.destetes - fila.traslados_s + fila.ajustes;
    result[cat] = fila;
  });
  return { filas: result, meses };
}

function buildStockHaciendaTable_(data, desde, hasta, campoLabel, mensual) {
  const { filas, meses } = data;
  const cats = Object.keys(filas);
  if (!cats.length) return '<div class="empty-state"><span class="ico">◌</span><div class="msg">Sin datos para el periodo seleccionado.</div></div>';

  var thead = '<tr><th>Categoria</th><th class="tc">Exist. Inicial</th>';
  if (mensual) {
    meses.forEach(function(m){ thead += '<th class="tc" style="background:var(--green-bg)">Cierre ' + m + '</th>'; });
  } else {
    thead += '<th class="tc">Compras</th><th class="tc">Nacimientos</th><th class="tc">Trasl. entrada</th><th class="tc">Ventas</th><th class="tc">Muertes</th><th class="tc">Destetes</th><th class="tc">Trasl. salida</th><th class="tc">Ajustes</th>';
  }
  thead += '<th class="tc" style="background:var(--green-bg)">Exist. Final</th></tr>';

  var tbody = '';
  var totSI=0, totComp=0, totNac=0, totTE=0, totVta=0, totMu=0, totDe=0, totTS=0, totAj=0, totSF=0;
  cats.forEach(function(cat) {
    var f = filas[cat];
    tbody += '<tr><td><strong>' + cat + '</strong></td><td class="tc">' + fn(f.si,0) + '</td>';
    if (mensual) {
      // Calcular cierre de cada mes acumulando desde el inicio
      var stockAcum = f.si;
      meses.forEach(function(m){
        var mm = f.meses[m];
        stockAcum += mm.compras + mm.nacimientos + mm.traslados_e - mm.ventas - mm.muertes - mm.destetes - mm.traslados_s;
        tbody += '<td class="tc" style="font-weight:600;color:var(--green-text)">' + fn(stockAcum,0) + '</td>';
      });
    } else {
      tbody += '<td class="tc">' + (f.compras||'-') + '</td><td class="tc">' + (f.nacimientos||'-') + '</td><td class="tc">' + (f.traslados_e||'-') + '</td>';
      tbody += '<td class="tc" style="color:var(--clay-text)">' + (f.ventas||'-') + '</td><td class="tc" style="color:var(--clay-text)">' + (f.muertes||'-') + '</td><td class="tc" style="color:var(--clay-text)">' + (f.destetes||'-') + '</td><td class="tc" style="color:var(--clay-text)">' + (f.traslados_s||'-') + '</td><td class="tc">' + (f.ajustes||'-') + '</td>';
    }
    tbody += '<td class="tc" style="font-weight:700;color:var(--green-text)">' + fn(f.sf,0) + '</td></tr>';
    totSI+=f.si; totComp+=f.compras; totNac+=f.nacimientos; totTE+=f.traslados_e;
    totVta+=f.ventas; totMu+=f.muertes; totDe+=f.destetes; totTS+=f.traslados_s; totAj+=f.ajustes; totSF+=f.sf;
  });

  // Total row
  tbody += '<tr style="background:var(--bg2);font-weight:700"><td>TOTAL</td><td class="tc">' + fn(totSI,0) + '</td>';
  if (!mensual) {
    tbody += '<td class="tc">' + (totComp||'-') + '</td><td class="tc">' + (totNac||'-') + '</td><td class="tc">' + (totTE||'-') + '</td>';
    tbody += '<td class="tc">' + (totVta||'-') + '</td><td class="tc">' + (totMu||'-') + '</td><td class="tc">' + (totDe||'-') + '</td><td class="tc">' + (totTS||'-') + '</td><td class="tc">' + (totAj||'-') + '</td>';
  } else {
    // Total cierre por mes = suma de cierres de todas las categorias
    meses.forEach(function(mes) {
      var totalCierre = 0;
      cats.forEach(function(cat) {
        var f = filas[cat];
        var stockAcum = f.si;
        meses.slice(0, meses.indexOf(mes)+1).forEach(function(m) {
          var mm = f.meses[m];
          stockAcum += mm.compras + mm.nacimientos + mm.traslados_e - mm.ventas - mm.muertes - mm.destetes - mm.traslados_s;
        });
        totalCierre += stockAcum;
      });
      tbody += '<td class="tc" style="font-weight:700;color:var(--green-text)">' + fn(totalCierre,0) + '</td>';
    });
  }
  tbody += '<td class="tc" style="font-weight:700;color:var(--green-text)">' + fn(totSF,0) + '</td></tr>';

  var titulo = 'Stock de Hacienda — ' + (campoLabel || 'Todos los campos') + ' — ' + desde + ' al ' + hasta;
  return '<div class="section-label" style="margin-top:16px">' + titulo + '</div><div class="tw"><table class="dt"><thead>' + thead + '</thead><tbody>' + tbody + '</tbody></table></div>';
}

function exportStockHaciendaXLSX_(data, desde, hasta, campoLabel, mensual) {
  const { filas, meses } = data;
  const cats = Object.keys(filas);
  const XLSX = window.XLSX;
  if (!XLSX) { toast('SheetJS no disponible', 'err'); return; }

  var wb = XLSX.utils.book_new();
  var campos_ = (S.catalogs && S.catalogs.campos) || [];

  function makeSheet(data2, titulo) {
    var rows = [];
    // Titulo
    rows.push([titulo]);
    rows.push([]);
    // Header
    var hdr = ['Categoria', 'Exist. Inicial'];
    if (mensual) {
      meses.forEach(function(m){ hdr.push('Cierre ' + m); });
    } else {
      hdr = hdr.concat(['Compras','Nacimientos','Trasl. entrada','Ventas','Muertes','Destetes','Trasl. salida','Ajustes']);
    }
    hdr.push('Exist. Final');
    rows.push(hdr);

    var totSI=0,totSF=0;
    Object.keys(data2).forEach(function(cat) {
      var f = data2[cat];
      var row = [cat, f.si];
      if (mensual) {
        var stockAcumXlsx = f.si;
        meses.forEach(function(m){
          var mm = f.meses[m];
          stockAcumXlsx += mm.compras + mm.nacimientos + mm.traslados_e - mm.ventas - mm.muertes - mm.destetes - mm.traslados_s;
          row.push(stockAcumXlsx);
        });
      } else {
        row = row.concat([f.compras,f.nacimientos,f.traslados_e,f.ventas,f.muertes,f.destetes,f.traslados_s,f.ajustes]);
      }
      row.push(f.sf);
      rows.push(row);
      totSI+=f.si; totSF+=f.sf;
    });
    // Total
    var totRow = ['TOTAL', totSI];
    if (mensual) {
      meses.forEach(function(mes) {
        var totalCierreXlsx = 0;
        Object.keys(data2).forEach(function(cat) {
          var f2 = data2[cat];
          var sa = f2.si;
          meses.slice(0, meses.indexOf(mes)+1).forEach(function(m) {
            var mm = f2.meses && f2.meses[m];
            if (mm) sa += mm.compras + mm.nacimientos + mm.traslados_e - mm.ventas - mm.muertes - mm.destetes - mm.traslados_s;
          });
          totalCierreXlsx += sa;
        });
        totRow.push(totalCierreXlsx);
      });
    } else {
      var tComp=0,tNac=0,tTE=0,tVta=0,tMu=0,tDe=0,tTS=0,tAj=0;
      Object.keys(data2).forEach(function(cat){ var f=data2[cat]; tComp+=f.compras; tNac+=f.nacimientos; tTE+=f.traslados_e; tVta+=f.ventas; tMu+=f.muertes; tDe+=f.destetes; tTS+=f.traslados_s; tAj+=f.ajustes; });
      totRow=totRow.concat([tComp,tNac,tTE,tVta,tMu,tDe,tTS,tAj]);
    }
    totRow.push(totSF);
    rows.push(totRow);

    return XLSX.utils.aoa_to_sheet(rows);
  }

  // Hoja total
  var titulo = 'Stock Hacienda ' + (campoLabel || 'Todos') + ' ' + desde + ' al ' + hasta;
  var ws = makeSheet(filas, titulo);
  ws['!cols'] = [{wch:28},{wch:14},{wch:12},{wch:12},{wch:12},{wch:12},{wch:12},{wch:12},{wch:12},{wch:12},{wch:14}];
  XLSX.utils.book_append_sheet(wb, ws, 'Stock Hacienda');

  // Hoja por campo si es "todos"
  if (!campoLabel) {
    campos_.forEach(function(c) {
      var rodeosC = rodeosTodos().filter(function(r){ return String(r.campo_id) === String(c.campo_id); });
      if (!rodeosC.length) return;
      var dataC = calcStockHacienda_(desde, hasta, c.campo_id, mensual);
      if (!Object.keys(dataC.filas).length) return;
      var wsC = makeSheet(dataC.filas, 'Stock ' + c.nombre + ' ' + desde + ' al ' + hasta);
      XLSX.utils.book_append_sheet(wb, wsC, c.nombre.slice(0,28));
    });
  }

  XLSX.writeFile(wb, 'Stock_Hacienda_' + desde + '_' + hasta + '.xlsx');
  toast('Excel descargado', 'ok');
}

  function calcConFiltro_(p) {

    const data = calcConFiltro_(p);
    const el = document.getElementById('sh-resultado');
    if (el) el.innerHTML = buildStockHaciendaTable_(data, p.desde, p.hasta, campo?.nombre || '', p.mensual);

      var s = document.createElement('script');
      s.src = 'https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js';
      s.onload = function() {
        const campos_ = (S.catalogs && S.catalogs.campos) || [];

        const data = calcConFiltro_(p);
        exportStockHaciendaXLSX_(data, p.desde, p.hasta, campo?.nombre || '', p.mensual);
      };

      const campos_ = (S.catalogs && S.catalogs.campos) || [];
      const campo = campos_.find(function(c){ return String(c.campo_id) === String(p.campoId); });
      const data = calcConFiltro_(p);
      exportStockHaciendaXLSX_(data, p.desde, p.hasta, campo?.nombre || '', p.mensual);
    }
  };
}

function iaContexto_() {
  // Armar resumen de datos para pasarle a Claude
  const rodeos = rodeosTodos();
  const campos = (S.catalogs && S.catalogs.campos) || [];
  const pesadas = (S.cache.pesadas || []).slice().sort((a,b) => String(a.fecha).localeCompare(String(b.fecha)));
  const consumos = (S.cache.consumos_insumos || []);
  const compras = (S.cache.compras_insumos || []);
  const ventas = (S.cache.ventas || []);
  const movimientos = (S.cache.movimientos || []);
  const productos = (S.catalogs && S.catalogs.productos) || [];
  const rodeosEng = rodeos.filter(r => r.actividad === 'Engorde');

  // Calcular KPIs por corral de engorde
  const corralesData = rodeosEng.map(function(r) {
    const rid = r.rodeo_id;
    const pes = egPesadas_(rid);
    const ultima = pes.length ? pes[pes.length-1] : null;
    const gd = egGanDiaria_(rid);
    const fi = egFechaIngreso_(rid);
    const dias = fi ? Math.round((new Date() - new Date(fi)) / 86400000) : null;
    return {
      nombre: r.nombre,
      campo: campoNombre(r.campo_id),
      stock: egStock_(rid),
      kgIngreso: egKgIngreso_(rid),
      ultimaPesada: ultima ? { fecha: ultima.fecha, peso: ultima.peso_prom_kg } : null,
      gdp: gd,
      diasEnCorral: dias,
      kgGanados: egKgGanadosHastaPesada_(rid),
      costoAlim: egCostoAlim_(rid),
      costoCompra: egCostoCompra_(rid),
      ingVentas: egIngVentas_(rid),
    };
  });

  const ctx = {
    fecha_hoy: today(),
    campos: campos.map(function(c){ return { id: c.campo_id, nombre: c.nombre }; }),
    rodeos: rodeos.map(function(r){ return { id: r.rodeo_id, nombre: r.nombre, campo: campoNombre(r.campo_id), actividad: r.actividad }; }),
    corrales_engorde: corralesData,
    pesadas_recientes: pesadas.slice(-50).map(function(p){ return { fecha: p.fecha, rodeo: rodeoNombre(p.rodeo_id), campo: campoNombre(p.campo_id), cantidad: p.cantidad, peso_prom_kg: p.peso_prom_kg }; }),
    consumos_recientes: consumos.slice(-100).map(function(c){ const prod = productos.find(function(p){ return String(p.producto_id)===String(c.producto_id); }); return { fecha: c.fecha, producto: prod ? prod.nombre : c.producto_id, unidad: prod ? prod.unidad : '', cantidad: c.cantidad, rodeo: rodeoNombre(c.rodeo_id), campo: campoNombre(c.campo_id) }; }),
    ventas: ventas.map(function(v){ return { fecha: v.fecha_salida, rodeo: rodeoNombre(v.rodeo_id), cant_animales: v.cant_animales, kg_campo: v.peso_campo_kg, precio_kg: v.precio_pactado, importe: v.importe_liq || (v.precio_pactado * v.peso_campo_kg) }; }),
    stock_insumos: (S.stockProductos || []).map(function(p){ return { producto: p.nombre, unidad: p.unidad, stock: p.stock }; }),
  };
  return JSON.stringify(ctx, null, 1);
}

function attachIAEvents() {
  const sendBtn = document.getElementById('ia-send');
  const clearBtn = document.getElementById('ia-clear');
  const input = document.getElementById('ia-input');
  if (!S.iaMsgs) S.iaMsgs = [];

  // Enter to send
  if (input) input.onkeydown = function(e) {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendBtn && sendBtn.click(); }
  };

  if (clearBtn) clearBtn.onclick = function() {
    S.iaMsgs = [];
    render();
  };

  if (sendBtn) sendBtn.onclick = async function() {
    const txt = (input ? input.value.trim() : '');
    if (!txt) return;
    if (input) input.value = '';
    if (!S.iaMsgs) S.iaMsgs = [];

    // Add user message
    S.iaMsgs.push({ role: 'user', content: txt });
    render();

    // Scroll to bottom
    setTimeout(function() {
      const chat = document.getElementById('ia-chat');
      if (chat) chat.scrollTop = chat.scrollHeight;
    }, 100);

    // Show thinking indicator
    const thinkId = 'thinking-' + Date.now();
    S.iaMsgs.push({ role: 'assistant', id: thinkId, content: '', html: '<span style="color:var(--text3);font-size:12px">Analizando datos...</span>' });
    render();

    try {
      const contexto = iaContexto_();
      const historial = S.iaMsgs
        .filter(function(m){ return m.id !== thinkId; })
        .slice(-10)
        .map(function(m){ return { role: m.role, content: m.content || '' }; });

      const sysprompt = 'Sos un asistente de analisis ganadero para Agroganadera Los Medanos (Argentina). ' +
        'Tenes acceso a los datos en tiempo real del sistema. Responde siempre en español, de forma concisa y util. ' +
        'Si la pregunta amerita un grafico, generá el SVG directamente en tu respuesta usando elementos SVG validos (sin markdown, solo el SVG puro). ' +
        'Para graficos de linea usa path, para barras usa rect. Usa colores: verde #3F5A2A, terracota #D46A33, dorado #6A7F3F. ' +
        'Incluí titulos y etiquetas en los SVGs. Maximo 600x300 px. ' +
        'Si no hay datos suficientes para responder, decilo claramente. ' +
        'No inventes datos. Solo usa los datos del contexto.' +
        '\n\nDATOS ACTUALES DEL SISTEMA:\n' + contexto;

      const resp = await fetch('https://api.anthropic.com/v1/messages', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          model: 'claude-sonnet-4-6',
          max_tokens: 1000,
          system: sysprompt,
          messages: historial,
        })
      });

      const data = await resp.json();
      const respText = (data.content && data.content[0] && data.content[0].text) || 'Sin respuesta.';

      // Replace thinking with real response
      const idx = S.iaMsgs.findIndex(function(m){ return m.id === thinkId; });
      if (idx !== -1) {
        // Render SVG inline if present
        let html;
        if (respText.includes('<svg')) {
          // Respuesta con SVG — renderizar directamente
          html = respText;
        } else {
          // Texto plano — escapar HTML y convertir saltos de linea
          html = respText
            .replace(/&/g,'&amp;')
            .replace(/</g,'&lt;')
            .replace(/>/g,'&gt;')
            .split('\n').join('<br>');
        }
        S.iaMsgs[idx] = { role: 'assistant', id: thinkId, content: respText, html: html };
      }
      render();
      setTimeout(function() {
        const chat = document.getElementById('ia-chat');
        if (chat) chat.scrollTop = chat.scrollHeight;
      }, 100);

    } catch(err) {
      const idx = S.iaMsgs.findIndex(function(m){ return m.id === thinkId; });
      if (idx !== -1) S.iaMsgs[idx] = { role: 'assistant', id: thinkId, content: 'Error: ' + err.message, html: '<span style="color:var(--clay-text)">Error: ' + err.message + '</span>' };
      render();
    }
  };
}

function buildPesadasHistorial_(pes) {
  if (!pes.length) return '<div class="empty-state"><span class="ico">◌</span><div class="msg">No hay pesadas registradas.</div></div>';
  return buildEntityTable(pes, [
    { key: 'fecha', label: 'Fecha', render: v => fd(v) },
    { key: 'rodeo_id', label: 'Rodeo', render: v => rodeoNombre(v) },
    { key: 'campo_id', label: 'Campo', render: v => v ? campoNombre(v) : '—' },
    { key: 'cantidad', label: 'Cant.', render: v => fn(v) },
    { key: 'peso_prom_kg', label: 'Peso prom. (kg)', render: v => fn(v) },
    { key: 'observacion', label: 'Obs.', render: v => v || '—' },
  ], 'pesadas', 'pesada_id');
}

function attachPesadasEvents() {
  window.filtrarPesadas_ = function() {
    const campoId = document.getElementById('pes-filtro-campo')?.value || '';
    const rodeoId = document.getElementById('pes-filtro-rodeo')?.value || '';
    let pes = (S.cache.pesadas || []).slice().sort((a,b) => String(b.fecha).localeCompare(String(a.fecha)));
    if (campoId) pes = pes.filter(p => String(p.campo_id) === campoId);
    if (rodeoId) pes = pes.filter(p => String(p.rodeo_id) === rodeoId);
    const el = document.getElementById('pes-historial');
    if (el) {
      el.innerHTML = buildPesadasHistorial_(pes);
      attachTableDeleteEvents('pesadas', 'pesada_id');
    }
  };

  const save = document.getElementById('pes-save');
  if (save) save.onclick = async () => {
    const fecha = document.getElementById('pes-fecha').value;
    const campoId = document.getElementById('pes-campo').value;
    const rodeoId = document.getElementById('pes-rodeo').value;
    const cantidad = Number(document.getElementById('pes-cantidad').value) || 0;
    const peso = Number(document.getElementById('pes-peso').value) || 0;
    if (!fecha || !rodeoId || !cantidad || !peso) { toast('Completá todos los campos.', 'err'); return; }
    save.disabled = true;
    try {
      await apiCall('create', { body: { entity: 'pesadas', data: {
        fecha, rodeo_id: rodeoId, campo_id: campoId,
        cantidad, peso_prom_kg: peso,
        observacion: document.getElementById('pes-obs').value.trim(),
      }}});
      invalidateCache('pesadas');
      await loadEntity('pesadas', true);
      toast('Pesada registrada — ' + fn(peso) + ' kg prom.', 'ok');
      render();
    } catch(err) { toast(err.message, 'err'); } finally { save.disabled = false; }
  };
  attachTableDeleteEvents('pesadas', 'pesada_id');
}

// Estructura de datos:
// Sueldos — leen de S.cache.sueldos (Sheets) y escriben via apiCall

function sueldosGetAll_() {
  return S.cache.sueldos || [];
}

// Distribución base por campo — viene del catálogo (Sheets)
function distBaseCampoGet_(campo_id) {
  const dist = (S.catalogs && S.catalogs.sueldos_dist || [])
    .find(d => String(d.campo_id) === String(campo_id));
  if (!dist) return { cria: 0, recria: 0, engorde: 0, estructura: 0 };
  return {
    cria:       Number(dist.cria)       || 0,
    recria:     Number(dist.recria)     || 0,
    engorde:    Number(dist.engorde)    || 0,
    estructura: Number(dist.estructura) || 0,
  };
}

// Distribución efectiva de un registro de sueldo
// Los campos dist_cria etc vienen de Sheets como campos planos
function distEfectiva_(s) {
  if (s.dist_cria !== undefined && s.dist_cria !== null && s.dist_cria !== '') {
    return {
      cria:       Number(s.dist_cria)       || 0,
      recria:     Number(s.dist_recria)     || 0,
      engorde:    Number(s.dist_engorde)    || 0,
      estructura: Number(s.dist_estructura) || 0,
    };
  }
  return distBaseCampoGet_(s.campo_id);
}

// Importe imputado a una actividad para un registro
function sueldoImporteActividad_(s, actividad) {
  const monto = Number(s.monto) || 0;
  const d = distEfectiva_(s);
  return monto * (d[actividad] || 0) / 100;
}

// Total imputado a una actividad (todos los campos, todos los períodos)
function sueldoTotalActividad_(actividad, filtro) {
  return sueldosGetAll_()
    .filter(s => !filtro || filtro(s))
    .reduce((sum, s) => sum + sueldoImporteActividad_(s, actividad), 0);
}

            <strong>${campo ? campo.nombre : s.campo_id}</strong>
            ${hasOverride ? '<span style="font-size:10px;background:var(--gold-bg);color:var(--gold-text);padding:1px 5px;border-radius:10px;margin-left:4px">ajustado</span>' : ''}
            ${s.observacion ? `<div style="font-size:11px;color:var(--text3)">${s.observacion}</div>` : ''}
          </td>
          <td class="tr"><strong>$ ${fn(monto)}</strong></td>
          <td class="tr" style="color:var(--green-text)">$ ${fn(sueldoImporteActividad_(s,'cria'))}</td>
          <td class="tr" style="color:var(--gold-text)">$ ${fn(sueldoImporteActividad_(s,'recria'))}</td>
          <td class="tr" style="color:var(--clay-text)">$ ${fn(sueldoImporteActividad_(s,'engorde'))}</td>
          <td class="tr" style="color:var(--blue-text)">$ ${fn(sueldoImporteActividad_(s,'estructura'))}</td>
          <td style="font-size:11px;color:var(--text3)">${d.cria}/${d.recria}/${d.engorde}/${d.estructura}</td>
          <td style="display:flex;gap:4px">
            <button class="btn btn-secondary btn-sm" onclick="window.sueldoEditar_('${String(s.periodo).slice(0,7)}','${s.campo_id}')" title="Editar">✎</button>
            <button class="btn btn-danger btn-sm" onclick="window.sueldoEliminar_(${idx})" title="Eliminar">🗑</button>
          </td>
        </tr>`;
      });
      h += '</tbody></table></div>';
    });

  }
  h += '</div>';
  return h;
}

function attachSueldosEvents() {

  // Preview suma distribución base por campo
  window.sdPreview_ = function(campo_id) {
    const c = parseInt(document.getElementById('sd-cria-'+campo_id)?.value||0);
    const r = parseInt(document.getElementById('sd-recria-'+campo_id)?.value||0);
    const e = parseInt(document.getElementById('sd-engorde-'+campo_id)?.value||0);
    const s = parseInt(document.getElementById('sd-estructura-'+campo_id)?.value||0);
    const suma = c+r+e+s;
    const el = document.getElementById('sd-suma-'+campo_id);
    if (el) { el.textContent = suma+'%'; el.style.color = suma===100?'var(--green)':'var(--red)'; }
  };

  // Guardar distribución base de un campo
  window.sdDistGuardar_ = async function(campo_id) {
    const c = parseInt(document.getElementById('sd-cria-'+campo_id)?.value||0);
    const r = parseInt(document.getElementById('sd-recria-'+campo_id)?.value||0);
    const e = parseInt(document.getElementById('sd-engorde-'+campo_id)?.value||0);
    const s = parseInt(document.getElementById('sd-estructura-'+campo_id)?.value||0);
    const suma = c+r+e+s;
    const msg = document.getElementById('sd-msg-dist-'+campo_id);
    if (suma !== 100) { if(msg) msg.textContent='⚠ Suman '+suma+'%'; return; }
    try {
      // Buscar si ya existe registro para este campo
      const existing = (S.catalogs && S.catalogs.sueldos_dist || []).find(d => String(d.campo_id) === String(campo_id));
      if (existing) {
        await apiCall('update', { body: { entity: 'sueldos_dist', id: existing.dist_id, data: { ...existing, cria:c, recria:r, engorde:e, estructura:s } } });
      } else {
        await apiCall('create', { body: { entity: 'sueldos_dist', data: { campo_id, cria:c, recria:r, engorde:e, estructura:s } } });
      }
      await loadCatalogs();
      if(msg) { msg.textContent='✅ Guardado'; setTimeout(()=>{ if(msg) msg.textContent=''; },2500); }
      toast('Distribución guardada', 'ok');
      render();
    } catch(err) { toast('Error: '+err.message, 'err'); }
  };

  // Al cambiar campo en el form, cargar su distribución base en el preview
  window.sdLoadDist_ = function() {
    const campo_id = document.getElementById('sd-campo')?.value;
    if (!campo_id) return;
    const d = distBaseCampoGet_(campo_id);
    const preview = document.getElementById('sd-dist-preview');
    const periodo = document.getElementById('sd-periodo')?.value || '';
    // Si ya existe un registro para este período+campo, cargar sus valores
    const existing = sueldosGetAll_().find(s => s.periodo===periodo && String(s.campo_id)===String(campo_id));
    if (existing) {
      document.getElementById('sd-monto').value         = existing.monto || '';
      document.getElementById('sd-obs').value           = existing.observacion || '';
      document.getElementById('sd-ov-cria').value       = existing.dist_cria       !== '' && existing.dist_cria       != null ? existing.dist_cria       : d.cria;
      document.getElementById('sd-ov-recria').value     = existing.dist_recria     !== '' && existing.dist_recria     != null ? existing.dist_recria     : d.recria;
      document.getElementById('sd-ov-engorde').value    = existing.dist_engorde    !== '' && existing.dist_engorde    != null ? existing.dist_engorde    : d.engorde;
      document.getElementById('sd-ov-estructura').value = existing.dist_estructura !== '' && existing.dist_estructura != null ? existing.dist_estructura : d.estructura;
    } else {
      document.getElementById('sd-monto').value         = '';
      document.getElementById('sd-obs').value           = '';
      document.getElementById('sd-ov-cria').value       = d.cria||0;
      document.getElementById('sd-ov-recria').value     = d.recria||0;
      document.getElementById('sd-ov-engorde').value    = d.engorde||0;
      document.getElementById('sd-ov-estructura').value = d.estructura||0;
    }
    window.sdOvPreview_();
    if (preview) preview.style.display = 'block';
    window.sdCalcPreview_();
    window.sdMesInfo_ && window.sdMesInfo_();
  };

  // Preview de importes al escribir el monto
  window.sdCalcPreview_ = function() {
    const campo_id = document.getElementById('sd-campo')?.value;
    const monto = Number(document.getElementById('sd-monto')?.value)||0;
    if (!campo_id || !monto) return;
    const d = {
      cria:      parseInt(document.getElementById('sd-ov-cria')?.value||0),
      recria:    parseInt(document.getElementById('sd-ov-recria')?.value||0),
      engorde:   parseInt(document.getElementById('sd-ov-engorde')?.value||0),
      estructura:parseInt(document.getElementById('sd-ov-estructura')?.value||0),
    };
    const valsEl = document.getElementById('sd-dist-preview-vals');
    if (valsEl) valsEl.innerHTML =
      `<span style="color:var(--green-text)">🐄 Cría: <strong>$ ${fn(monto*d.cria/100)}</strong> (${d.cria}%)</span>` +
      `<span style="color:var(--gold-text)">🐃 Recría: <strong>$ ${fn(monto*d.recria/100)}</strong> (${d.recria}%)</span>` +
      `<span style="color:var(--clay-text)">🥩 Engorde: <strong>$ ${fn(monto*d.engorde/100)}</strong> (${d.engorde}%)</span>` +
      `<span style="color:var(--blue-text)">🏗️ Estructura: <strong>$ ${fn(monto*d.estructura/100)}</strong> (${d.estructura}%)</span>`;
  };

  // Preview suma del override
  window.sdOvPreview_ = function() {
    const c = parseInt(document.getElementById('sd-ov-cria')?.value||0);
    const r = parseInt(document.getElementById('sd-ov-recria')?.value||0);
    const e = parseInt(document.getElementById('sd-ov-engorde')?.value||0);
    const s = parseInt(document.getElementById('sd-ov-estructura')?.value||0);
    const suma = c+r+e+s;
    const el = document.getElementById('sd-ov-suma');
    if (el) { el.textContent = suma+'%'; el.style.color = suma===100?'var(--green)':'var(--red)'; }
    window.sdCalcPreview_();
  };

  // Inicializar preview al cargar la página
  setTimeout(() => {
    window.sdLoadDist_ && window.sdLoadDist_();
    window.sdMesInfo_  && window.sdMesInfo_();
  }, 50);

  // Guardar sueldo
  window.sueldoGuardar_ = async function() {
    const periodo    = document.getElementById('sd-periodo')?.value || '';
    const campo_id   = document.getElementById('sd-campo')?.value || '';
    const monto      = Number(document.getElementById('sd-monto')?.value) || 0;
    const obs        = document.getElementById('sd-obs')?.value.trim() || '';
    const msg        = document.getElementById('sd-msg');
    if (!periodo)  { if(msg) msg.textContent='⚠ Seleccioná el período.'; return; }
    if (!campo_id) { if(msg) msg.textContent='⚠ Seleccioná el campo.'; return; }
    if (!monto)    { if(msg) msg.textContent='⚠ Ingresá el monto.'; return; }
    const cria      = parseInt(document.getElementById('sd-ov-cria')?.value||0);
    const recria    = parseInt(document.getElementById('sd-ov-recria')?.value||0);
    const engorde   = parseInt(document.getElementById('sd-ov-engorde')?.value||0);
    const estructura= parseInt(document.getElementById('sd-ov-estructura')?.value||0);
    const suma = cria+recria+engorde+estructura;
    if (suma !== 100) {
      if (!confirm('⚠ Los porcentajes suman '+suma+'% (no 100%). ¿Guardás igual?')) return;
    }
    try {
      // Buscar si ya existe para este período+campo
      const existing = sueldosGetAll_().find(s => String(s.periodo).slice(0,7)===periodo && String(s.campo_id)===String(campo_id));
      const data = { periodo, campo_id, monto, observacion: obs, fecha_carga: today(),
        dist_cria: cria, dist_recria: recria, dist_engorde: engorde, dist_estructura: estructura };
      if (existing) {
        await apiCall('update', { body: { entity: 'sueldos', id: existing.sueldo_id, data: { ...existing, ...data } } });
      } else {
        await apiCall('create', { body: { entity: 'sueldos', data } });
      }
      invalidateCache('sueldos');
      await loadEntity('sueldos', true);
      if(msg) { msg.textContent='✅ Guardado'; setTimeout(()=>{ if(msg) msg.textContent=''; },2500); }
      toast('Sueldo guardado — '+periodo+' · $ '+fn(monto), 'ok');
      render(); // render re-crea el botón habilitado
    } catch(err) {
      toast('Error: '+err.message, 'err');
      const btnE = document.getElementById('sd-guardar-btn');
      if (btnE) { btnE.disabled = false; btnE.textContent = '💾 Guardar sueldo'; }
    }
  };

  window.sueldoEditar_ = function(periodo, campo_id) {
    // Normalizar período: Sheets devuelve YYYY-MM-DD, el input necesita YYYY-MM
    const periodoNorm = String(periodo).slice(0, 7);
    const el_periodo = document.getElementById('sd-periodo');
    const el_campo   = document.getElementById('sd-campo');
    if (el_periodo) el_periodo.value = periodoNorm;
    if (el_campo)   el_campo.value   = String(campo_id);
    // Esperar a que el DOM procese los valores antes de cargar la distribución
    setTimeout(() => {
      // Cargar directamente el registro sin depender del período del input
      const existing = sueldosGetAll_().find(s => String(s.periodo).slice(0,7) === periodoNorm && String(s.campo_id) === String(campo_id));
      if (existing) {
        const montoEl = document.getElementById('sd-monto');
        const obsEl   = document.getElementById('sd-obs');
        const criEl   = document.getElementById('sd-ov-cria');
        const recEl   = document.getElementById('sd-ov-recria');
        const engEl   = document.getElementById('sd-ov-engorde');
        const estrEl  = document.getElementById('sd-ov-estructura');
        const preview = document.getElementById('sd-dist-preview');
        if (montoEl) montoEl.value = existing.monto || '';
        if (obsEl)   obsEl.value   = existing.observacion || '';
        const d = distBaseCampoGet_(campo_id);
        if (criEl)  criEl.value  = existing.dist_cria       !== '' && existing.dist_cria       != null ? existing.dist_cria       : d.cria;
        if (recEl)  recEl.value  = existing.dist_recria     !== '' && existing.dist_recria     != null ? existing.dist_recria     : d.recria;
        if (engEl)  engEl.value  = existing.dist_engorde    !== '' && existing.dist_engorde    != null ? existing.dist_engorde    : d.engorde;
        if (estrEl) estrEl.value = existing.dist_estructura !== '' && existing.dist_estructura != null ? existing.dist_estructura : d.estructura;
        if (preview) preview.style.display = 'block';
        window.sdOvPreview_   && window.sdOvPreview_();
        window.sdCalcPreview_ && window.sdCalcPreview_();
        window.sdMesInfo_     && window.sdMesInfo_();
      }
      // Scroll al formulario y focus en monto
      const panel = document.getElementById('sueldo-form-panel');
      if (panel) panel.scrollIntoView({ behavior: 'smooth', block: 'start' });
      const montoEl = document.getElementById('sd-monto');
      if (montoEl) montoEl.focus();
    }, 50);
  };

  window.sueldoEliminar_ = async function(i) {
    if (!confirm('¿Eliminar este registro?')) return;
    const lista = sueldosGetAll_().sort((a,b)=>b.periodo.localeCompare(a.periodo)||String(a.campo_id).localeCompare(String(b.campo_id)));
    const reg = lista[i];
    if (!reg) return;
    try {
      await apiCall('delete', { body: { entity: 'sueldos', id: reg.sueldo_id } });
      invalidateCache('sueldos');
      await loadEntity('sueldos', true);
      toast('Registro eliminado','ok');
      render();
    } catch(err) { toast('Error: '+err.message, 'err'); }
  };
}

function attachCotizacionEvents() {

  // Guardar una cotización individual
  window.cotizGuardar_ = async function() {
    const fecha  = document.getElementById('tc-fecha')?.value || '';
    const valor  = Number(document.getElementById('tc-valor')?.value) || 0;
    const fuente = document.getElementById('tc-fuente')?.value || 'Manual';
    const btn    = document.getElementById('tc-guardar-btn');
    const resetBtn = () => { if(btn) { btn.disabled=false; btn.textContent='💾 Guardar'; } };
    if (!fecha) { resetBtn(); toast('Ingresá la fecha', 'err'); return; }
    if (!valor) { resetBtn(); toast('Ingresá el valor', 'err'); return; }
    try {
      const lista = S.catalogs && S.catalogs.tipo_cambio || [];
      const existing = lista.find(t => String(t.fecha).slice(0,10) === fecha);
      if (existing) {
        await apiCall('update', { body: { entity: 'tipo_cambio', id: existing.tc_id, data: { ...existing, fecha, valor, fuente } } });
      } else {
        await apiCall('create', { body: { entity: 'tipo_cambio', data: { fecha, valor, fuente } } });
      }
      await loadCatalogs();
      S.corralesTipoCambio = (S.catalogs.tipo_cambio||[]).map(t=>({fecha:t.fecha,valor:Number(t.valor)}));
      toast('Cotización guardada: ' + fd(fecha) + ' → $ ' + fn(valor), 'ok');
      resetBtn();
      render();
    } catch(err) { resetBtn(); toast('Error: ' + err.message, 'err'); }
  };

  // Importar múltiples cotizaciones pegadas desde Excel
  window.cotizBulkGuardar_ = async function() {
    const raw  = document.getElementById('tc-bulk')?.value || '';
    const btn  = document.getElementById('tc-bulk-btn');
    const msg  = document.getElementById('tc-msg');
    const resetBtn = () => { if(btn) { btn.disabled=false; btn.textContent='📥 Importar cotizaciones'; } };
    const lineas = raw.split('\n').map(l=>l.trim()).filter(Boolean);
    if (!lineas.length) { resetBtn(); toast('Pegá al menos una línea', 'err'); return; }
    const registros = [];
    const errores = [];
    lineas.forEach((l, i) => {
      const partes = l.split(/[	;,]/).map(p=>p.trim());
      const fecha = partes[0];
      const valor = Number(partes[1]?.replace(',','.'));
      if (!fecha || !valor || isNaN(valor)) { errores.push('Línea '+(i+1)+': formato inválido'); return; }
      // Validar formato fecha
      if (!/^[0-9]{4}-[0-9]{2}-[0-9]{2}$/.test(fecha)) { errores.push('Línea '+(i+1)+': fecha debe ser YYYY-MM-DD'); return; }
      registros.push({ fecha, valor });
    });
    if (errores.length) { resetBtn(); toast(errores[0], 'err'); return; }
    try {
      const lista = S.catalogs && S.catalogs.tipo_cambio || [];
      let guardados = 0;
      for (const r of registros) {
        const existing = lista.find(t => String(t.fecha).slice(0,10) === r.fecha);
        if (existing) {
          await apiCall('update', { body: { entity: 'tipo_cambio', id: existing.tc_id, data: { ...existing, fecha: r.fecha, valor: r.valor, fuente: 'Manual' } } });
        } else {
          await apiCall('create', { body: { entity: 'tipo_cambio', data: { fecha: r.fecha, valor: r.valor, fuente: 'Manual' } } });
        }
        guardados++;
        if (msg) msg.textContent = '⏳ Guardando ' + guardados + '/' + registros.length + '…';
      }
      await loadCatalogs();
      S.corralesTipoCambio = (S.catalogs.tipo_cambio||[]).map(t=>({fecha:t.fecha,valor:Number(t.valor)}));
      toast(guardados + ' cotizaciones guardadas', 'ok');
      if (document.getElementById('tc-bulk')) document.getElementById('tc-bulk').value = '';
      resetBtn();
      render();
    } catch(err) { resetBtn(); toast('Error: ' + err.message, 'err'); }
  };

  // Editar cotización — carga valores en el formulario
  window.cotizEditar_ = function(tc_id) {
    const lista = S.catalogs && S.catalogs.tipo_cambio || [];
    const t = lista.find(x => String(x.tc_id) === String(tc_id));
    if (!t) return;
    const fechaEl  = document.getElementById('tc-fecha');
    const valorEl  = document.getElementById('tc-valor');
    const fuenteEl = document.getElementById('tc-fuente');
    const btn      = document.getElementById('tc-guardar-btn');
    if (fechaEl)  fechaEl.value  = String(t.fecha).slice(0,10);
    if (valorEl)  valorEl.value  = t.valor;
    if (fuenteEl) fuenteEl.value = t.fuente || 'BNA';
    if (btn)      btn.textContent = '✏️ Actualizar';
    const panel = document.getElementById('tc-guardar-btn')?.closest('.panel');
    if (panel) panel.scrollIntoView({ behavior: 'smooth', block: 'start' });
    if (valorEl) valorEl.focus();
  };

  // Eliminar cotización
  window.cotizEliminar_ = async function(tc_id) {
    if (!confirm('¿Eliminar esta cotización?')) return;
    try {
      await apiCall('delete', { body: { entity: 'tipo_cambio', id: tc_id } });
      await loadCatalogs();
      S.corralesTipoCambio = (S.catalogs.tipo_cambio||[]).map(t=>({fecha:t.fecha,valor:Number(t.valor)}));
      toast('Cotización eliminada', 'ok');
      render();
    } catch(err) { toast('Error: ' + err.message, 'err'); }
  };

  // Descargar cotización de hoy automáticamente
  window.actualizarCotizacion_ = async function() {
    try {
      const res = await fetch('https://dolarapi.com/v1/dolares/oficial', { cache: 'no-store' });
      if (!res.ok) throw new Error('Sin respuesta de la API');
      const data = await res.json();
      const valor = data.venta || data.promedio || null;
      if (!valor) throw new Error('Sin valor en la respuesta');
      const hoy = today();
      const lista = S.catalogs && S.catalogs.tipo_cambio || [];
      const existing = lista.find(t => String(t.fecha).slice(0,10) === hoy);
      if (existing) {
        await apiCall('update', { body: { entity: 'tipo_cambio', id: existing.tc_id, data: { ...existing, valor: Number(valor), fuente: 'BNA' } } });
      } else {
        await apiCall('create', { body: { entity: 'tipo_cambio', data: { fecha: hoy, valor: Number(valor), fuente: 'BNA' } } });
      }
      await loadCatalogs();
      S.corralesTipoCambio = (S.catalogs.tipo_cambio||[]).map(t=>({fecha:t.fecha,valor:Number(t.valor)}));
      toast('Cotización BNA: $ ' + fn(valor) + ' / U$S — guardada', 'ok');
      render();
    } catch (err) {
      toast('No se pudo descargar: ' + err.message, 'err');
    }
  };
}


// ── Precios de valorización por actividad (localStorage) ──────────────
// Retorna los precios vigentes a una fecha dada (YYYY-MM-DD o YYYY-MM)
// Si no se pasa fecha, usa el registro más reciente
function preciosValGet_(fecha) {
  const lista = ((S.catalogs && S.catalogs.precios_valorizacion) || [])
    .filter(p => p.fecha)
    .sort((a,b) => String(b.fecha).localeCompare(String(a.fecha)));
  if (!lista.length) return {};
  let row;
  if (fecha) {
    const f = String(fecha).slice(0,7);
    row = lista.find(p => String(p.fecha).slice(0,7) <= f) || lista[0];
  } else {
    row = lista[0];
  }
  return {
    vaca:                  Number(row.vaca)                  || 0,
    toro:                  Number(row.toro)                  || 0,
    torito:                Number(row.torito)                || 0,
    ternero:               Number(row.ternero)               || 0,
    ternera:               Number(row.ternera)               || 0,
    vaquillona:            Number(row.vaquillona)            || 0,
    vaquillona_venta:      Number(row.vaquillona_venta)      || 0,
    novillito:             Number(row.novillito)             || 0,
    novillo:               Number(row.novillo)               || 0,
    vaca_venta:            Number(row.vaca_venta)            || 0,
    ternero_cab:           Number(row.ternero_cab)           || 0,
    ternera_cab:           Number(row.ternera_cab)           || 0,
    vaquillona_cab:        Number(row.vaquillona_cab)        || 0,
    vaquillona_venta_cab:  Number(row.vaquillona_venta_cab)  || 0,
    novillito_cab:         Number(row.novillito_cab)         || 0,
    novillo_cab:           Number(row.novillo_cab)           || 0,
    vaca_venta_cab:        Number(row.vaca_venta_cab)        || 0,
    _fecha: row.fecha,
  };
}

// Verifica si hay precios para un período dado, retorna null si no hay
function preciosValParaPeriodo_(periodo) {
  const lista = ((S.catalogs && S.catalogs.precios_valorizacion) || [])
    .filter(p => p.fecha)
    .sort((a,b) => String(b.fecha).localeCompare(String(a.fecha)));
  if (!lista.length) return null;
  const f = String(periodo).slice(0,7);
  return lista.find(p => String(p.fecha).slice(0,7) <= f) || null;
}

// Categorías por método de valorización
// POR CABEZA: vaca, toro, torito
// POR KG:     vaca venta, ternero, ternera, vaquillona, vaquillona venta, novillito, novillo
const CATS_POR_CABEZA_ = ['vaca', 'toro', 'torito'];
const CATS_POR_KG_     = ['vaca venta', 'ternero', 'ternera', 'vaquillona', 'vaquillona venta', 'novillito', 'novillo'];

// Devuelve el valor de un rodeo dado su stock y última pesada
function valorizarRodeo_(rodeo, stock, pesadaProm) {
  const p = preciosValGet_();
  const cat = (rodeo.categoria || '').toLowerCase().trim();
  const cant = Number(stock) || 0;
  if (!cant) return 0;
  if (CATS_POR_CABEZA_.includes(cat)) {
    const precio = cat === 'toro'   ? (p.toro   || 0)
                 : cat === 'torito' ? (p.torito || 0)
                 : (p.vaca || 0);
    return cant * precio;
  }
  // precio por kg
  const kg = Number(pesadaProm) || 0;
  const precioPorKg = cat === 'ternero'          ? (p.ternero          || 0)
                    : cat === 'ternera'          ? (p.ternera          || 0)
                    : cat === 'vaquillona'       ? (p.vaquillona       || 0)
                    : cat === 'vaquillona venta' ? (p.vaquillona_venta || 0)
                    : cat === 'novillito'        ? (p.novillito        || 0)
                    : cat === 'novillo'          ? (p.novillo          || 0)
                    : cat === 'vaca venta'       ? (p.vaca_venta       || 0)
                    : 0;
  if (kg && precioPorKg) return cant * kg * precioPorKg;

  // Fallback: precio por cabeza si no hay pesada
  const precioCab = cat === 'ternero'          ? (p.ternero_cab          || 0)
                  : cat === 'ternera'          ? (p.ternera_cab          || 0)
                  : cat === 'vaquillona'       ? (p.vaquillona_cab       || 0)
                  : cat === 'vaquillona venta' ? (p.vaquillona_venta_cab || 0)
                  : cat === 'novillito'        ? (p.novillito_cab        || 0)
                  : cat === 'novillo'          ? (p.novillo_cab          || 0)
                  : cat === 'vaca venta'       ? (p.vaca_venta_cab       || 0)
                  : 0;
  return cant * precioCab;
}

// Retorna el método de valorización usado para mostrar en tabla
function metodoValorizacion_(rodeo, pesadaProm) {
  const p = preciosValGet_();
  const cat = (rodeo.categoria || '').toLowerCase().trim();
  if (CATS_POR_CABEZA_.includes(cat)) return 'por cabeza';
  const kg = Number(pesadaProm) || 0;
  const precioPorKg = cat === 'ternero' ? p.ternero : cat === 'ternera' ? p.ternera
    : cat === 'vaquillona' ? p.vaquillona : cat === 'vaquillona venta' ? p.vaquillona_venta
    : cat === 'novillito' ? p.novillito : cat === 'novillo' ? p.novillo
    : cat === 'vaca venta' ? p.vaca_venta : 0;
  if (kg && precioPorKg) return 'por kg';
  return 'por cabeza (sin pesada)';
}

function buildEntityTable(items, cols, entity, idCol) {
  if (!items.length) {
    return '<div class="empty-state"><span class="ico">◌</span><div class="msg">Todavía no hay registros. Cargá el primero arriba.</div></div>';
  }
  if (!S.sort) S.sort = {};
  const sortState = S.sort[entity];
  let sortedItems = items;
  if (sortState) {
    sortedItems = [...items].sort((a, b) => {
      let va = a[sortState.key], vb = b[sortState.key];
      if (va == null) va = '';
      if (vb == null) vb = '';
      const na = Number(va), nb = Number(vb);
      const numeric = va !== '' && vb !== '' && !isNaN(na) && !isNaN(nb);
      const cmp = numeric ? (na - nb) : String(va).localeCompare(String(vb), 'es', { sensitivity: 'base' });
      return sortState.dir === 'asc' ? cmp : -cmp;
    });
  }
  let h = `<div class="section-label">Historial <span class="count-badge" style="margin-left:6px">${items.length}</span></div>
  <div class="tw"><table class="dt"><thead><tr>`;
  cols.forEach(c => {
    const activo = sortState && sortState.key === c.key;
    const flecha = activo ? (sortState.dir === 'asc' ? ' ▲' : ' ▼') : '';
    h += `<th class="sortable-th" onclick="sortEntityTable('${entity}','${c.key}')" style="cursor:pointer;user-select:none" title="Ordenar por ${c.label}">${c.label}${flecha}</th>`;
  });
  h += '<th></th></tr></thead><tbody>';
  sortedItems.forEach(item => {
    h += '<tr>';
    cols.forEach(c => h += `<td>${c.render ? c.render(item[c.key]) : (item[c.key] != null ? item[c.key] : '—')}</td>`);
    h += `<td><div class="row-actions">
      <button class="icon-btn" data-edit="${item[idCol]}" data-entity="${entity}" data-idcol="${idCol}" title="Editar">✎</button>
      <button class="icon-btn danger" data-del="${item[idCol]}" data-entity="${entity}" data-idcol="${idCol}" title="Eliminar">✕</button>
    </div></td>`;
    h += '</tr>';
  });
  h += '</tbody></table></div>';
  return h;
}

function sortEntityTable(entity, key) {
  if (!S.sort) S.sort = {};
  const current = S.sort[entity];
  if (current && current.key === key) {
    current.dir = current.dir === 'asc' ? 'desc' : 'asc';
  } else {
    S.sort[entity] = { key, dir: 'asc' };
  }
  render();
}
function attachTableDeleteEvents(entity, idCol) {
  document.querySelectorAll('[data-del][data-entity="' + entity + '"]').forEach(btn => {
    btn.onclick = async () => {
      if (!confirm('¿Eliminar este registro?')) return;
      try {
        await apiCall('delete', { body: { entity, id: btn.dataset.del } });
        invalidateCache(entity);
        toast('Registro eliminado', 'ok');
        await loadEntity(entity, true);
        await loadDashboard();
        if (entity === 'movimientos' || entity === 'ventas') { S.stock = null; await loadStock(); }
        if (entity === 'compras_insumos' || entity === 'consumos_insumos') { S.stockProductos = null; await loadStockProductos(); }
        if (entity === 'precios_internos' || entity === 'destetes' || entity === 'ventas') { S.margenBruto = null; }
        if (entity === 'productos') { await loadCatalogs(); S.stockProductos = null; await loadStockProductos(); }
        if (entity === 'campos' || entity === 'rodeos' || entity === 'compradores') { await loadCatalogs(); }
        render();
      } catch (err) { toast(err.message, 'err'); }
    };
  });
  document.querySelectorAll('[data-edit][data-entity="' + entity + '"]').forEach(btn => {
    btn.onclick = () => openEditModal(entity, idCol, btn.dataset.edit);
  });
}

// ── EDICIÓN GENÉRICA DE REGISTROS ───────────────────────────────────────
// Construye un modal de edición a partir del item crudo en S.cache[entity],
// infiriendo el tipo de campo por el nombre/valor de la clave.
function fieldInputType_(key, value) {
  if (key.includes('fecha')) return 'date';
  if (key === 'rodeo_id' || key === 'rodeo_origen_id' || key === 'rodeo_destino_id') return 'rodeo';
  if (key === 'campo_id' || key === 'campo_origen_id' || key === 'campo_destino_id') return 'campo';
  if (key === 'activo' || key === 'por_campo') return 'boolean';
  if (key === 'tipo' || key === 'tipo_tacto' || key === 'tipo_venta' || key === 'estado') return 'text';
  if (typeof value === 'number' || (!isNaN(value) && value !== '' && value !== null)) return 'number';
  return 'text';
}
function openEditModal(entity, idCol, id) {
  // Buscar en cache o en catalogs (para campos, rodeos, compradores)
  const catalogMap = { campos: 'campos', rodeos: 'rodeos', compradores: 'compradores' };
  const items = S.cache[entity] || (S.catalogs && catalogMap[entity] ? S.catalogs[catalogMap[entity]] : []) || [];
  const item = items.find(i => String(i[idCol]) === String(id));
  if (!item) { toast('No se encontró el registro.', 'err'); return; }
  // Para Saldo inicial: asegurarse que precio_cabeza siempre esté disponible para editar
  if (entity === 'movimientos' && item.tipo === 'Saldo inicial' && !('precio_cabeza' in item)) {
    item.precio_cabeza = 0;
  }
  const keys = Object.keys(item).filter(k => k !== idCol);
  const rodeosL = rodeosTodos();
  const camposL = (S.catalogs && S.catalogs.campos) || [];

  // Etiquetas amigables para el modal de edición
  const FIELD_LABELS_ = {
    tipo: 'Tipo', caravana: 'Caravana', fecha: 'Fecha', fecha_salida: 'Fecha salida',
    campo_origen_id: 'Campo origen', campo_destino_id: 'Campo destino',
    rodeo_origen_id: 'Rodeo origen', rodeo_destino_id: 'Rodeo destino',
    cantidad: 'Cantidad', observaciones: 'Observación', precio_cabeza: '💲 Precio por cabeza ($)',
    cant_animales: 'Cantidad animales', comprador: 'Comprador', peso_campo_kg: 'Kg campo',
    precio_pactado: '$/kg pactado', campana: 'Campaña', estado: 'Estado',
  };

  let fieldsHtml = '';
  keys.forEach(k => {
    const type = fieldInputType_(k, item[k]);
    const fid = 'edit-' + k;
    const labelText = FIELD_LABELS_[k] || k;
    if (type === 'rodeo') {
      fieldsHtml += `<div class="fg"><label>${labelText}</label>
        <select id="${fid}">${rodeosL.map(r => `<option value="${r.rodeo_id}" ${String(r.rodeo_id)===String(item[k])?'selected':''}>${r.nombre}</option>`).join('')}</select></div>`;
    } else if (type === 'campo') {
      fieldsHtml += `<div class="fg"><label>${labelText}</label>
        <select id="${fid}"><option value="">—</option>${camposL.map(c => `<option value="${c.campo_id}" ${String(c.campo_id)===String(item[k])?'selected':''}>${c.nombre}</option>`).join('')}</select></div>`;
    } else if (type === 'boolean') {
      const esTrue = esPorCampo_(item[k]);
      fieldsHtml += `<div class="fg"><label>${labelText}</label>
        <select id="${fid}"><option value="true" ${esTrue?'selected':''}>Sí</option><option value="false" ${!esTrue?'selected':''}>No</option></select></div>`;
    } else if (type === 'date') {
      fieldsHtml += `<div class="fg"><label>${labelText}</label><input type="date" id="${fid}" value="${item[k]||''}"></div>`;
    } else if (type === 'number') {
      fieldsHtml += `<div class="fg"><label>${labelText}</label><input type="number" id="${fid}" value="${item[k]!=null?item[k]:''}"></div>`;
    } else {
      fieldsHtml += `<div class="fg"><label>${labelText}</label><input type="text" id="${fid}" value="${(item[k]!=null?item[k]:'').toString().replace(/"/g,'&quot;')}"></div>`;
    }
  });

  document.body.insertAdjacentHTML('beforeend', `
    <div class="modal-overlay" id="edit-modal-overlay">
      <div class="modal">
        <div class="modal-header"><h3>Editar registro</h3><button class="modal-close" id="edit-modal-close">✕</button></div>
        <div class="modal-body"><div class="fgrid">${fieldsHtml}</div></div>
        <div class="modal-footer">
          <button class="btn btn-secondary" id="edit-modal-cancel">Cancelar</button>
          <button class="btn btn-primary" id="edit-modal-save">Guardar cambios</button>
        </div>
      </div>
    </div>`);

  const closeModal = () => document.getElementById('edit-modal-overlay')?.remove();
  document.getElementById('edit-modal-close').onclick = closeModal;
  document.getElementById('edit-modal-cancel').onclick = closeModal;
  document.getElementById('edit-modal-save').onclick = async () => {
    const data = {};
    keys.forEach(k => {
      const el = document.getElementById('edit-' + k);
      if (!el) return;
      const type = fieldInputType_(k, item[k]);
      if (type === 'boolean') { data[k] = el.value === 'true'; return; }
      data[k] = el.tagName === 'SELECT' ? el.value : (el.type === 'number' ? Number(el.value) : el.value.trim());
    });
    const saveBtn = document.getElementById('edit-modal-save');
    saveBtn.disabled = true;
    try {
      await apiCall('update', { body: { entity, id, data } });
      invalidateCache(entity);
      toast('Registro actualizado', 'ok');
      await loadEntity(entity, true);
      await loadDashboard();
      if (entity === 'movimientos') { S.stock = null; await loadStock(); }
      if (entity === 'precios_internos' || entity === 'destetes' || entity === 'ventas') { S.margenBruto = null; }
      if (entity === 'compras_insumos' || entity === 'consumos_insumos') { S.stockProductos = null; await loadStockProductos(); }
      if (entity === 'productos') { await loadCatalogs(); S.stockProductos = null; await loadStockProductos(); }
      if (entity === 'campos' || entity === 'rodeos' || entity === 'compradores') { await loadCatalogs(); }
      closeModal();
      render();
    } catch (err) { toast(err.message, 'err'); saveBtn.disabled = false; }
  };
}

          style="width:100%;padding:10px 13px;border:1px solid rgba(74,46,26,0.22);border-radius:9px;font-size:14px;font-family:inherit;background:#F0EAD8;color:#4A2E1A;outline:none">
      </div>
      <button id="li-btn" style="width:100%;padding:11px;background:#631627;color:#fff;border:none;border-radius:9px;font-size:14px;font-weight:700;font-family:inherit;cursor:pointer;margin-top:6px">Ingresar</button>
      <div id="li-err" style="font-size:12.5px;color:#b3261e;margin-top:10px;text-align:center;min-height:18px"></div>
    </div>`;
  document.body.appendChild(overlay);
  const btn = document.getElementById('li-btn');
  const userEl = document.getElementById('li-user');
  const passEl = document.getElementById('li-pass');
  const errEl  = document.getElementById('li-err');
  async function doLogin() {
    const usuario = userEl.value.trim();
    const password = passEl.value;
    if (!usuario || !password) { errEl.textContent = 'Completá usuario y contraseña.'; return; }
    btn.disabled = true; btn.textContent = 'Verificando…'; errEl.textContent = '';
    try {
      const url = LOGIN_API_URL + '?action=login&token=' + encodeURIComponent(LOGIN_TOKEN);
      const res = await fetch(url, { method: 'POST',
        headers: { 'Content-Type': 'text/plain;charset=utf-8' },
        body: JSON.stringify({ usuario, password }) });
      const json = await res.json();
      if (!json.ok) throw new Error(json.error || 'Error al conectar');
      loginSetSession(json.data);
      overlay.remove();
      onSuccess(json.data);
    } catch(err) {
      errEl.textContent = err.message;
      btn.disabled = false; btn.textContent = 'Ingresar';
    }
  }
  btn.onclick = doLogin;
  passEl.onkeydown = e => { if (e.key === 'Enter') doLogin(); }

  userEl.onkeydown = e => { if (e.key === 'Enter') passEl.focus(); }
  setTimeout(() => userEl.focus(), 100);
}
loginRequired(session => {
  window.__lmSession = session;
  window.S = S;
  window.goto = goto;
  window.render = render;
  init();
});
</script>
</body>
</html>
