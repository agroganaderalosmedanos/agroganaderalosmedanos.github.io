<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Agroganadera Los Médanos</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'Aptos', 'Calibri', 'Segoe UI', -apple-system, sans-serif;
  background: #3a5020;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 40px 20px;
  text-align: center;
}
img { width: 120px; display: block; margin: 0 auto 20px; }
.sub { font-size: 11px; font-weight: 700; letter-spacing: .14em; text-transform: uppercase; color: rgba(255,255,255,0.5); margin-bottom: 6px; }
.name { font-size: 38px; font-weight: 700; color: #fff; letter-spacing: -.5px; line-height: 1.1; margin-bottom: 10px; }
.desc { font-size: 14px; color: rgba(255,255,255,0.5); margin-bottom: 48px; }
.btn {
  display: inline-block; background: #631627; color: #fff;
  font-family: inherit; font-size: 15px; font-weight: 700;
  padding: 13px 38px; border-radius: 40px; text-decoration: none;
  transition: background .15s, transform .1s;
}
.btn:hover { background: #4a1020; transform: translateY(-2px); }
footer { margin-top: 52px; font-size: 11px; letter-spacing: .06em; color: rgba(255,255,255,0.3); }
</style>
</head>
<body>
  <img src="https://agroganaderalosmedanos.github.io/isologo.png" alt="Logo">
  <div class="sub">Agroganadera</div>
  <div class="name">Los Médanos</div>
  <div class="desc">Sistema de gestión del ciclo ganadero completo</div>
  <a href="https://agroganaderalosmedanos.github.io/cria/" class="btn" id="btn-entrar">Ingresar al sistema →</a>
  <footer>El Cencerro · El Misterio · El Clavo Chico</footer>

  <script>
    // Si ya tiene sesión, ir directo al sistema
    try {
      const session = JSON.parse(localStorage.getItem('lm_session') || 'null');
      if (session) {
        window.location.replace('https://agroganaderalosmedanos.github.io/cria/');
      }
    } catch(e) {}
  </script>
</body>
</html>
