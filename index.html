    const peso    = Number(document.getElementById('ces-r-peso').value)||0;
    const precio  = Number(document.getElementById('ces-r-precio').value)||0;
    const obs     = document.getElementById('ces-r-obs').value.trim();
    if (!fecha||!origen||!cant) { toast('Completá fecha, rodeo y cantidad.', 'err'); return; }
    if (!precio) { toast('Ingresá el precio de cesión ($/kg).', 'err'); return; }
    const rodeo = (S.catalogs?.rodeos||[]).find(r=>String(r.rodeo_id)===String(origen));
    btn.disabled=true; btn.textContent='⏳ Guardando...';
    try {
      await apiCall('create', { body: { entity: 'egresos_recria', data: {
        fecha,
        rodeo_id: origen,
        campo_id: rodeo?.campo_id||'',
        destino: 'Engorde',
        rodeo_destino_id: destino,
        cant_animales: cant,
        peso_prom_kg: peso,
        precio_kg_cesion: precio,
        observaciones: obs||'Cesión Recría → Terminación',
      }}}); 
      invalidateCache('egresos_recria');
      await loadEntity('egresos_recria', true);
      toast('Cesión registrada — '+fn(cant)+' animales · $ '+fn(precio)+'/kg', 'ok');
      render();
    } catch(err) { toast(err.message, 'err'); }
    finally { btn.disabled=false; btn.textContent='💾 Registrar cesión'; }
  };
}

function buildRecria() {
  const rodeos = (S.resumenRecria && S.resumenRecria.rodeos) || [];
  const pesadas = S.cache.pesadas || [];
  const ventasR = S.cache.ventas || [];
  const egresosR = S.cache.egresos_recria || [];
  const campos = (S.catalogs && S.catalogs.campos) || [];
  const rodeosAll = (S.catalogs && S.catalogs.rodeos) || [];
  const rodeosRecria = rodeosAll.filter(r => r.actividad === 'Recría');

  let h = '<div class="page-header"><div class="page-title">Recría</div><div class="page-sub">Pesadas, movimientos, ventas y egresos de animales en recría</div></div>';
  h += buildSueldoKpiPanel_('recria');

  // ── Tarjetas resumen por rodeo
  h += '<div class="section-label">Rodeos en Recría</div>';
  if (!rodeos.length) {
    h += '<div class="empty-state"><span class="ico">◌</span><div class="msg">No hay rodeos con actividad "Recría". Completá la columna "actividad" en la hoja Rodeos de Sheets.</div></div>';
  } else {
    h += '<div style="display:flex;flex-wrap:wrap;gap:12px;margin-bottom:20px">';
    rodeos.forEach(r => {
      const up = r.ultima_pesada;
      h += `<div style="background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:14px 18px;min-width:200px">
        <div style="font-weight:700;font-size:15px;margin-bottom:2px">${r.nombre}</div>
        <div style="font-size:12px;color:var(--muted);margin-bottom:8px">${r.campo_nombre || ''}</div>
        <div style="font-size:22px;font-weight:800;color:var(--gold-text)">${fn(r.stock)} <span style="font-size:13px;font-weight:500">animales</span></div>
        ${up ? `<div style="font-size:12px;color:var(--muted);margin-top:4px">Última pesada: <strong>${fn(up.peso_prom_kg)} kg</strong> (${fd(up.fecha)})</div>` : '<div style="font-size:12px;color:var(--muted);margin-top:4px">Sin pesadas registradas</div>'}
      </div>`;
    });
    h += '</div>';
  }

  // ── Formulario de registro
  const campoOpts = campos.map(c => `<option value="${c.campo_id}">${c.nombre}</option>`).join('');
  const rodeoOpts = rodeosRecria.map(r => `<option value="${r.rodeo_id}">${r.nombre} (${campoNombre(r.campo_id)})</option>`).join('');

  h += `<div class="section-label">Registrar</div>
  <div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px">
    ${['pesada','venta','egreso'].map(t =>
      `<button class="radio-pill${S.recriaTab === t ? ' selected' : ''}" data-rtab="${t}">${t === 'pesada' ? '⚖ Pesada' : t === 'venta' ? '$ Venta' : '→ Egreso'}</button>`
    ).join('')}
  </div>`;

  // Tab Pesada
  h += `<div id="rc-tab-pesada" style="display:${(!S.recriaTab || S.recriaTab === 'pesada') ? 'block' : 'none'}">
  <div class="panel"><div class="fgrid">
    <div class="fg"><label>Fecha</label><input type="date" id="rc-pe-fecha" value="${today()}"></div>
    <div class="fg"><label>Rodeo</label><select id="rc-pe-rodeo">${rodeoOpts}</select></div>
    <div class="fg"><label>Cantidad pesada</label><input type="number" id="rc-pe-cantidad" placeholder="Ej: 45" min="1"></div>
    <div class="fg"><label>Peso promedio (kg)</label><input type="number" id="rc-pe-peso" placeholder="Ej: 185" min="0" step="0.1"></div>
    <div class="fg"><label>Observación</label><input type="text" id="rc-pe-obs" placeholder="Opcional"></div>
  </div>
  <button class="btn btn-primary" id="rc-pe-save" style="margin-top:6px">Registrar pesada</button>
  </div></div>`;

  // Tab Venta
  h += `<div id="rc-tab-venta" style="display:${S.recriaTab === 'venta' ? 'block' : 'none'}">
  <div class="panel"><div class="fgrid">
    <div class="fg"><label>Fecha</label><input type="date" id="rc-ve-fecha" value="${today()}"></div>
    <div class="fg"><label>Rodeo</label><select id="rc-ve-rodeo">${rodeoOpts}</select></div>
    <div class="fg"><label>Comprador</label><input type="text" id="rc-ve-comprador" placeholder="Nombre del comprador" list="rc-compradores-list">
      <datalist id="rc-compradores-list">${((S.catalogs && S.catalogs.compradores) || []).map(c => `<option value="${c.nombre}">`).join('')}</datalist></div>
    <div class="fg"><label>Cantidad</label><input type="number" id="rc-ve-cantidad" placeholder="Ej: 15" min="1"></div>
    <div class="fg"><label>Peso total (kg)</label><input type="number" id="rc-ve-peso" placeholder="Ej: 3200" min="0" oninput="actualizarImporteRecria_()"></div>
    <div class="fg"><label>Precio por kg</label><input type="number" id="rc-ve-precio" placeholder="Ej: 2900" min="0" oninput="actualizarImporteRecria_()"></div>
    <div class="fg" id="rc-ve-importe-preview" style="display:none"><label>Importe total</label><div id="rc-ve-importe-val" style="font-size:17px;font-weight:700;padding:8px 0;color:var(--green-text)"></div></div>
    <div class="fg"><label>Observación</label><input type="text" id="rc-ve-obs" placeholder="Opcional"></div>
  </div>
  <button class="btn btn-primary" id="rc-ve-save" style="margin-top:6px">Registrar venta</button>
  </div></div>`;

  // Tab Egreso
  h += `<div id="rc-tab-egreso" style="display:${S.recriaTab === 'egreso' ? 'block' : 'none'}">
  <div class="panel"><div class="fgrid">
    <div class="fg"><label>Fecha</label><input type="date" id="rc-eg-fecha" value="${today()}"></div>
    <div class="fg"><label>Rodeo de origen</label><select id="rc-eg-rodeo">${rodeoOpts}</select></div>
    <div class="fg"><label>Destino</label>
      <select id="rc-eg-destino">
        <option value="Engorde">Engorde (Corrales)</option>
        <option value="Reposición">Reposición de vientres (vuelve a Cría)</option>
      </select></div>
    <div class="fg"><label>Cantidad</label><input type="number" id="rc-eg-cantidad" placeholder="Ej: 30" min="1"></div>
    <div class="fg"><label>Peso promedio (kg)</label><input type="number" id="rc-eg-peso" placeholder="Ej: 280" min="0" step="0.1"></div>
    <div class="fg"><label>Observación</label><input type="text" id="rc-eg-obs" placeholder="Opcional"></div>
  </div>
  <button class="btn btn-primary" id="rc-eg-save" style="margin-top:6px">Registrar egreso</button>
  </div></div>`;

  // ── Historial de pesadas
  h += '<div class="section-label">Historial de pesadas</div>';
  const pesSorted = [...pesadas].sort((a, b) => String(b.fecha).localeCompare(String(a.fecha)));
  if (!pesSorted.length) {
    h += '<div class="empty-state"><span class="ico">◌</span><div class="msg">No hay pesadas registradas.</div></div>';
  } else {
    h += buildEntityTable(pesSorted, [
      { key: 'fecha', label: 'Fecha', render: v => fd(v) },
      { key: 'rodeo_id', label: 'Rodeo', render: v => rodeoNombre(v) },
      { key: 'cantidad', label: 'Cant.', render: v => fn(v) },
      { key: 'peso_prom_kg', label: 'Peso prom. (kg)', render: v => fn(v) },
      { key: 'observacion', label: 'Obs.', render: v => v || '—' },
    ], 'pesadas', 'pesada_id');
  }

  // ── Historial de ventas Recría
  h += '<div class="section-label">Ventas de Recría</div>';
  const ventSorted = [...ventasR].sort((a, b) => String(b.fecha_salida).localeCompare(String(a.fecha_salida)));
  if (!ventSorted.length) {
    h += '<div class="empty-state"><span class="ico">◌</span><div class="msg">No hay ventas registradas.</div></div>';
  } else {
    h += buildEntityTable(ventSorted, [
      { key: 'fecha_salida', label: 'Fecha', render: v => fd(v) },
      { key: 'rodeo_id', label: 'Rodeo', render: v => rodeoNombre(v) },
      { key: 'comprador', label: 'Comprador', render: v => v || '—' },
      { key: 'cant_animales', label: 'Cant.', render: v => fn(v) },
      { key: 'peso_campo_kg', label: 'Peso (kg)', render: v => v ? fn(v) : '—' },
      { key: 'precio_pactado', label: '$/kg', render: v => v ? fn(v) : '—' },
      { key: 'importe_total', label: 'Importe', render: v => v ? '$ ' + fn(v) : '—' },
    ], 'ventas', 'venta_id');
  }

  // ── Historial de egresos
  h += '<div class="section-label">Egresos (a Engorde o Reposición)</div>';
  const egrSorted = [...egresosR].sort((a, b) => String(b.fecha).localeCompare(String(a.fecha)));
  if (!egrSorted.length) {
    h += '<div class="empty-state"><span class="ico">◌</span><div class="msg">No hay egresos registrados.</div></div>';
  } else {
    h += buildEntityTable(egrSorted, [
      { key: 'fecha', label: 'Fecha', render: v => fd(v) },
      { key: 'rodeo_id', label: 'Rodeo', render: v => rodeoNombre(v) },
      { key: 'destino', label: 'Destino', render: v => v === 'Engorde' ? '<span class="pill pill-blue">Engorde</span>' : '<span class="pill pill-gold">Reposición</span>' },
      { key: 'cant_animales', label: 'Cant.', render: v => fn(v) },
      { key: 'peso_prom_kg', label: 'Peso prom. (kg)', render: v => v ? fn(v) : '—' },
      { key: 'observaciones', label: 'Obs.', render: v => v || '—' },
    ], 'egresos_recria', 'egreso_id');
  }

  return h;
}

function attachRecriaEvents() {
  // Tabs
  document.querySelectorAll('[data-rtab]').forEach(btn => {
    btn.onclick = () => {
      S.recriaTab = btn.dataset.rtab;
      document.querySelectorAll('[data-rtab]').forEach(b => b.classList.remove('selected'));
      btn.classList.add('selected');
      ['pesada','venta','egreso'].forEach(t => {
        const el = document.getElementById('rc-tab-' + t);
        if (el) el.style.display = S.recriaTab === t ? 'block' : 'none';
      });
    };
  });

  // Preview importe venta
  window.actualizarImporteRecria_ = function() {
    const peso = Number(document.getElementById('rc-ve-peso')?.value) || 0;
    const precio = Number(document.getElementById('rc-ve-precio')?.value) || 0;
    const wrap = document.getElementById('rc-ve-importe-preview');
    const val = document.getElementById('rc-ve-importe-val');
    if (!wrap || !val) return;
    if (peso && precio) { wrap.style.display = 'flex'; val.textContent = '$ ' + fn(peso * precio); }
    else wrap.style.display = 'none';
  };

  // Guardar pesada
  const peSave = document.getElementById('rc-pe-save');
  if (peSave) peSave.onclick = async () => {
    const fecha = document.getElementById('rc-pe-fecha').value;
    const rodeoId = document.getElementById('rc-pe-rodeo').value;
    const cantidad = Number(document.getElementById('rc-pe-cantidad').value) || 0;
    const peso = Number(document.getElementById('rc-pe-peso').value) || 0;
    if (!fecha || !rodeoId || !cantidad || !peso) { toast('Completá fecha, rodeo, cantidad y peso.', 'err'); return; }
    const rodeo = ((S.catalogs && S.catalogs.rodeos) || []).find(r => String(r.rodeo_id) === String(rodeoId));

      await apiCall('create', { body: { entity: 'pesadas', data: {
        fecha, rodeo_id: rodeoId, campo_id: rodeo?.campo_id || '',
        cantidad, peso_prom_kg: peso, observacion: document.getElementById('rc-pe-obs').value.trim(),

      invalidateCache('pesadas'); S.resumenRecria = null;

      S.resumenRecria = await apiCall('resumenRecria');
      toast('Pesada registrada — ' + fn(peso) + ' kg prom.', 'ok');
      render();
    } catch (err) { toast(err.message, 'err'); } finally { peSave.disabled = false; }
  };

  // Guardar venta
  const veSave = document.getElementById('rc-ve-save');
  if (veSave) veSave.onclick = async () => {
    const fecha = document.getElementById('rc-ve-fecha').value;
    const rodeoId = document.getElementById('rc-ve-rodeo').value;
    const cantidad = Number(document.getElementById('rc-ve-cantidad').value) || 0;
    const peso = Number(document.getElementById('rc-ve-peso').value) || '';
    const precio = Number(document.getElementById('rc-ve-precio').value) || '';
    const importe = (peso && precio) ? peso * precio : '';
    if (!fecha || !rodeoId || !cantidad) { toast('Completá fecha, rodeo y cantidad.', 'err'); return; }
    const rodeo = ((S.catalogs && S.catalogs.rodeos) || []).find(r => String(r.rodeo_id) === String(rodeoId));
    veSave.disabled = true;
    try {
      await apiCall('create', { body: { entity: 'ventas', data: {
        fecha_salida: fecha, rodeo_id: rodeoId, campo_id: rodeo?.campo_id || '',
        comprador: document.getElementById('rc-ve-comprador').value.trim(),
        cant_animales: cantidad, peso_campo_kg: peso, precio_pactado: precio, importe_total: importe,
        observaciones: document.getElementById('rc-ve-obs').value.trim(),
      }}});
      invalidateCache('ventas'); S.resumenRecria = null;
      await loadEntity('ventas', true);
      S.resumenRecria = await apiCall('resumenRecria');
      toast('Venta registrada — ' + cantidad + ' animales', 'ok');
      render();
    } catch (err) { toast(err.message, 'err'); } finally { veSave.disabled = false; }
  };

  // Guardar egreso
  const egSave = document.getElementById('rc-eg-save');
  if (egSave) egSave.onclick = async () => {
    const fecha = document.getElementById('rc-eg-fecha').value;
    const rodeoId = document.getElementById('rc-eg-rodeo').value;
    const destino = document.getElementById('rc-eg-destino').value;
    const cantidad = Number(document.getElementById('rc-eg-cantidad').value) || 0;
    const peso = Number(document.getElementById('rc-eg-peso').value) || '';
    if (!fecha || !rodeoId || !cantidad) { toast('Completá fecha, rodeo y cantidad.', 'err'); return; }
    const rodeo = ((S.catalogs && S.catalogs.rodeos) || []).find(r => String(r.rodeo_id) === String(rodeoId));
    egSave.disabled = true;
    try {
      await apiCall('create', { body: { entity: 'egresos_recria', data: {
        fecha, rodeo_id: rodeoId, campo_id: rodeo?.campo_id || '',
        destino, cant_animales: cantidad, peso_prom_kg: peso,
        observaciones: document.getElementById('rc-eg-obs').value.trim(),
      }}});
      invalidateCache('egresos_recria'); S.resumenRecria = null;
      await loadEntity('egresos_recria', true);
      S.resumenRecria = await apiCall('resumenRecria');
      toast('Egreso registrado — ' + cantidad + ' animales a ' + destino, 'ok');
      render();
    } catch (err) { toast(err.message, 'err'); } finally { egSave.disabled = false; }
  };

  attachTableDeleteEvents('pesadas', 'pesada_id');
  attachTableDeleteEvents('ventas', 'venta_id');
  attachTableDeleteEvents('egresos_recria', 'egreso_id');
}

      const rid = btn.dataset.rodeo;

      toast('Guardado','ok'); render();

      const fi = egFechaIngreso_(rid);

      const lote = {
        id: Date.now().toString(36), rodeoId: String(rid), nombre: r.nombre,
        fechaApertura: fi||today(), fechaCierre: today(),
        animales: egCantIngresada_(rid), kgGanados: kgG, ganDiaria: gd,
        costoAlim: egCostoAlim_(rid), costoCompra: egCostoCompra_(rid),
        ingVentas: egIngVentas_(rid),
      };
      const lotes = egLotes_(); lotes.push(lote); egSaveLotes_(lotes);
      toast('Lote guardado en historial','ok'); render();
    };
  });

  // Eliminar lote
  document.querySelectorAll('[data-del-lote]').forEach(btn => {
    btn.onclick = () => {
      const id = btn.dataset.delLote;
      if (!confirm('¿Eliminar este lote del historial?')) return;
      const lotes = egLotes_().filter(l=>l.id!==id); egSaveLotes_(lotes);
      toast('Lote eliminado','ok'); render();
    };
  });

  attachTableDeleteEvents('pesadas','pesada_id');
}

// ── ENGORDE — funciones auxiliares ───────────────────────────────────────
function egGetCorralId() {
  return S.engordeCorralId || localStorage.getItem('eg_corral_sel') || '';
}
function egSetCorralId(val) {
  S.engordeCorralId = val;
  localStorage.setItem('eg_corral_sel', val);
}
function egConfig_(rodeoId) {
  try { return JSON.parse(localStorage.getItem('eg_cfg') || '{}')[rodeoId] || {}; } catch(e) { return {}; }
}
// Devuelve lista de { producto_id, fecha_baja } de productos inactivos para un corral
// Lee rodeo_productos de S.cache o catalogs (lo que esté disponible)
function egRodeoProductosTodos_() {
  return S.cache.rodeo_productos || (S.catalogs && S.catalogs.rodeo_productos) || [];
}
function egProductosInactivos_(rodeoId) {
  return egRodeoProductosTodos_()
    .filter(x => String(x.rodeo_id) === String(rodeoId) && String(x.activo).toUpperCase() !== 'TRUE');
}
// Devuelve true si el producto está activo para ese corral en la fecha indicada
function egEsProductoActivo_(rodeoId, productoId, fecha) {
  const todos = egRodeoProductosTodos_();
  const reg = todos.find(x => String(x.rodeo_id) === String(rodeoId) && String(x.producto_id) === String(productoId));
  if (!reg) return true; // no registrado → activo por defecto
  if (String(reg.activo).toUpperCase() === 'TRUE') return true; // marcado activo
  if (!reg.fecha_baja) return false; // inactivo sin fecha → siempre inactivo
  return String(fecha || today()) < String(reg.fecha_baja); // activo solo antes de la fecha de baja
}
function egSaveConfig_(rodeoId, cfg) {
  try {
    const all = JSON.parse(localStorage.getItem('eg_cfg') || '{}');
    all[rodeoId] = Object.assign({}, all[rodeoId] || {}, cfg);
    localStorage.setItem('eg_cfg', JSON.stringify(all));
  } catch(e) {}
}
function egLotes_() { try { return JSON.parse(localStorage.getItem('eg_lotes') || '[]'); } catch(e) { return []; } }
function egSaveLotes_(lotes) { try { localStorage.setItem('eg_lotes', JSON.stringify(lotes)); } catch(e) {} }

function egStock_(rodeoId) {
  const row = (S.stock || []).find(r => String(r.rodeo_id) === String(rodeoId));
  return row ? (row.stock || 0) : 0;
}
function egPesadas_(rodeoId) {
  return (S.cache.pesadas || []).filter(p => String(p.rodeo_id) === String(rodeoId))
    .sort((a, b) => String(a.fecha).localeCompare(String(b.fecha)));
}
function egVentas_(rodeoId) {
  return (S.cache.ventas || []).filter(v => String(v.rodeo_id) === String(rodeoId));
}
function egConsumos_(rodeoId, hastaFecha) {
  const todos = (S.cache.consumos_insumos || []).filter(c => String(c.rodeo_id) === String(rodeoId));
  return hastaFecha ? todos.filter(c => String(c.fecha) <= hastaFecha) : todos;
}
function egCostoPromProducto_(productoId) {
  const compras = (S.cache.compras_insumos || []).filter(c => String(c.producto_id) === String(productoId));
  const cant = compras.reduce((s, c) => s + (Number(c.cantidad) || 0), 0);
  const costo = compras.reduce((s, c) => s + (Number(c.costo_total) || 0), 0);
  return cant > 0 ? costo / cant : 0;
}
function egCostoAlim_(rodeoId, hastaFecha, categoria) {
  const productos = (S.catalogs && S.catalogs.productos) || [];
  return egConsumos_(rodeoId, hastaFecha).reduce((s, c) => {
    if (categoria) {
      const prod = productos.find(p => String(p.producto_id) === String(c.producto_id));
      if (!prod || prod.categoria !== categoria) return s;
    }
    return s + (Number(c.cantidad) || 0) * egCostoPromProducto_(c.producto_id);
  }, 0);
}
function egKgVend_(rodeoId) {
  return egVentas_(rodeoId).reduce((s, v) => s + (Number(v.peso_campo_kg) || 0), 0);
}
function egIngVentas_(rodeoId) {
  return egVentas_(rodeoId).reduce((s, v) => {
    return s + (Number(v.importe_liq) || (Number(v.precio_pactado) * (Number(v.peso_campo_kg) || 0)) || 0);
  }, 0);
}
function egFechaIngreso_(rodeoId) {
  // Solo "Saldo inicial" define la fecha de ingreso al corral.
  // Los traslados posteriores distorsionan la GDP al acortar los días.
  const movs = (S.cache.movimientos || [])
    .filter(m => String(m.rodeo_destino_id) === String(rodeoId) && m.tipo === 'Saldo inicial')
    .sort((a, b) => String(a.fecha).localeCompare(String(b.fecha)));
  if (movs.length) return movs[0].fecha;
  // Fallback: cualquier movimiento si no hay Saldo inicial
  const todos = (S.cache.movimientos || [])
    .filter(m => String(m.rodeo_destino_id) === String(rodeoId))
    .sort((a, b) => String(a.fecha).localeCompare(String(b.fecha)));
  return todos.length ? todos[0].fecha : null;
}
function egKgIngreso_(rodeoId) {
  // Primero intentamos de la config
  const cfg = egConfig_(rodeoId);
  if (cfg.kgIngreso) return Number(cfg.kgIngreso);
  // Fallback: observaciones del primer movimiento de Saldo inicial
  const movs = (S.cache.movimientos || [])
    .filter(m => String(m.rodeo_destino_id) === String(rodeoId) && m.tipo === 'Saldo inicial')
    .sort((a, b) => String(a.fecha).localeCompare(String(b.fecha)));
  const mov = movs.length ? movs[0] : (S.cache.movimientos || [])
    .filter(m => String(m.rodeo_destino_id) === String(rodeoId))
    .sort((a, b) => String(a.fecha).localeCompare(String(b.fecha)))[0];
  if (mov) {
    const match = (mov.observaciones || '').match(/(\d+)\s*kg/);
    if (match) return Number(match[1]);
  }
  return 0;
}
function egCantIngresada_(rodeoId) {
  return (S.cache.movimientos || [])
    .filter(m => String(m.rodeo_destino_id) === String(rodeoId) && m.tipo === 'Saldo inicial')
    .reduce((s, m) => s + (Number(m.cantidad) || 0), 0);
}
function egKgIngresados_(rodeoId) {
  return egCantIngresada_(rodeoId) * egKgIngreso_(rodeoId);
}
function egCostoCompra_(rodeoId) {
  const movs = S.cache.movimientos || [];
  const moneda = S.engordeMoneda || 'ARS';
  const rodeosTodosMap = Object.fromEntries(rodeosTodos().map(r=>[String(r.rodeo_id),r]));

  // Saldo inicial × precio/cabeza
  const saldos = movs.filter(m=>m.tipo==='Saldo inicial'&&String(m.rodeo_destino_id)===String(rodeoId));
  const costoSaldo = saldos.reduce((s,m)=>s+convertirAMoneda_((Number(m.cantidad)||0)*(Number(m.precio_cabeza)||0),m.fecha,moneda),0);

  // Cesiones recibidas valorizadas al precio de origen
  const cesiones = movs.filter(m=>(m.tipo==='Traslado en bloque'||m.tipo==='Traslado individual')&&String(m.rodeo_destino_id)===String(rodeoId));
  const costoCesion = cesiones.reduce((s,m)=>{
    const rodeoO = rodeosTodosMap[String(m.rodeo_origen_id)];
    const cant = Number(m.cantidad)||0;
    const pesO = (S.cache.pesadas||[]).filter(p=>String(p.rodeo_id)===String(m.rodeo_origen_id)&&String(p.fecha)<=String(m.fecha)).sort((a,b)=>String(b.fecha).localeCompare(String(a.fecha)));
    const pesoO = pesO[0]?Number(pesO[0].peso_prom_kg)||0:0;
    return s+convertirAMoneda_(valorizarRodeo_(rodeoO||{categoria:'novillo'},cant,pesoO),m.fecha,moneda);
  },0);

  return costoSaldo + costoCesion;
}
function egKgStockEstimado_(rodeoId) {
  const stk = egStock_(rodeoId);
  if (!stk) return 0;
  const pes = egPesadas_(rodeoId);
  if (pes.length) return stk * Number(pes[pes.length-1].peso_prom_kg);
  const kgIng = egKgIngreso_(rodeoId);
  return kgIng ? stk * kgIng : 0;
}
function egKgGanadosHastaPesada_(rodeoId) {
  const pes = egPesadas_(rodeoId);
  if (!pes.length) return 0;
  const ultima = pes[pes.length-1];
  const kgVendHP = egVentas_(rodeoId)
    .filter(v => String(v.fecha_salida) <= String(ultima.fecha))
    .reduce((s, v) => s + (Number(v.peso_campo_kg) || 0), 0);
  const kgStockPesada = Number(ultima.cantidad) * Number(ultima.peso_prom_kg);
  const kgIng = egKgIngresados_(rodeoId);
  return Math.max(0, kgVendHP + kgStockPesada - kgIng);
}
function egGanDiaria_(rodeoId) {
  const pes = egPesadas_(rodeoId);
  const fi = egFechaIngreso_(rodeoId);
  const kgIng = egKgIngreso_(rodeoId);
  if (!pes.length || !fi || !kgIng) return null;
  // Siempre: última pesada vs kg y fecha de ingreso al corral
  // Mide el crecimiento real desde el día 0, independiente de cuántas pesadas haya
  const last = pes[pes.length - 1];
  const dias = Math.round((new Date(last.fecha) - new Date(fi)) / 86400000);
  return dias > 0 ? (Number(last.peso_prom_kg) - kgIng) / dias : null;
}
function egFmon_(pesos, moneda) {
  if (moneda === 'USD') {
    const tc = tipoCambioVigente_(today());
    const val = tc ? Number(tc.valor || tc) : null;
    if (val && val > 0) return 'U$S ' + fn(Math.round(pesos / val), 0);
  }
  return '$ ' + fn(Math.round(pesos), 0);
}
function egPct_(a, b) { if (!b) return '—'; return (a / b * 100).toFixed(1) + '%'; }

      <div style="display:flex;align-items:center;gap:8px">

  else if (page === 'engorde_proyeccion') h += buildEngordeProyeccion_(egGetCorralId(), fm);
  else if (page === 'engorde_cierre') h += buildEngordeCierre_(egGetCorralId(), fm);

function egUltimaPesada_(rodeoId) {
  const pesadas = (S.cache.pesadas||[]).filter(p=>String(p.rodeo_id)===String(rodeoId)).sort((a,b)=>String(b.fecha).localeCompare(String(a.fecha)));
  if (!pesadas.length) return null;
  return { peso: Number(pesadas[0].peso_prom_kg)||0, fecha: pesadas[0].fecha };
}
function egDiasEngorde_(rodeoId) {
  const movs = (S.cache.movimientos||[]).filter(m=>m.tipo==='Saldo inicial'&&String(m.rodeo_destino_id)===String(rodeoId));
  if (!movs.length) return null;
  const fechaEntrada = movs.sort((a,b)=>String(a.fecha).localeCompare(String(b.fecha)))[0].fecha;
  if (!fechaEntrada) return null;
  return Math.floor((new Date(today()) - new Date(fechaEntrada)) / 86400000);
}

function buildEngordeDashboard_(rodeosEng, fm) {
  if (!rodeosEng.length) return '<div class="empty-state"><span class="ico">◌</span><div class="msg">No hay corrales de Engorde. Creá rodeos con actividad "Engorde" en la hoja Rodeos.</div></div>';
  const moneda = S.engordeMoneda || 'ARS';

  const campanas = [...new Set([
    ...(S.cache.ventas||[]).map(v=>v.campana).filter(Boolean),
    ...comprasHacGetAll_().map(c=>c.campana).filter(Boolean),
  ])].sort((a,b)=>b.localeCompare(a));
  const campSelec = S._dashEngCampana || campanas[0] || '';
  const campSelecField = S._dashEngCampo || '';
  const campos = (S.catalogs && S.catalogs.campos) || [];
  const rodeos = (S.catalogs && S.catalogs.rodeos) || [];

  let h = '';

  // ── Selectores campaña + campo ──────────────────────────────────────
  h += `<div style="display:flex;align-items:center;gap:16px;margin-bottom:16px;flex-wrap:wrap">
    <div style="display:flex;align-items:center;gap:8px">
      <label style="font-size:13px;font-weight:600;white-space:nowrap">Campaña:</label>
      ${campanas.length
        ? `<select style="font-size:13px;padding:6px 10px;border-radius:8px;border:1px solid var(--border);background:var(--bg);color:var(--text);min-width:140px"
            onchange="S._dashEngCampana=this.value;render()">
            ${campanas.map(c=>`<option value="${c}" ${c===campSelec?'selected':''}>${c}</option>`).join('')}
          </select>`
        : '<span style="font-size:13px;color:var(--text3)">Sin campañas</span>'
      }
    </div>
    <div style="display:flex;align-items:center;gap:8px">
      <label style="font-size:13px;font-weight:600;white-space:nowrap">Campo:</label>
      <select style="font-size:13px;padding:6px 10px;border-radius:8px;border:1px solid var(--border);background:var(--bg);color:var(--text);min-width:160px"
        onchange="S._dashEngCampo=this.value;render()">
        <option value="">Todos los campos</option>
        ${campos.map(c=>`<option value="${c.campo_id}" ${String(c.campo_id)===String(campSelecField)?'selected':''}>${c.nombre}</option>`).join('')}
      </select>
    </div>
  </div>`;

  // ── CÁLCULOS ECONÓMICOS ─────────────────────────────────────────────
  const rodeosEngFilt = campSelecField
    ? rodeosEng.filter(r => String(r.campo_id) === String(campSelecField))
    : rodeosEng;
  const rodeosEngIds = new Set(rodeosEngFilt.map(r=>String(r.rodeo_id)));

  // Ventas engorde campaña
  const ventasEng = (S.cache.ventas||[]).filter(v => rodeosEngIds.has(String(v.rodeo_id)));
  const totalVentas = ventasEng.reduce((s,v)=>s+(Number(v.importe_liq)||(Number(v.precio_pactado)*(Number(v.peso_campo_kg)||Number(v.cant_animales)))||0),0);

  // Stock valorizado actual
  const pesadas = S.cache.pesadas || [];
  let stockValEng = 0;
  const stockDetalleRows = [];
  rodeosEngFilt.forEach(r => {
    const stock = Math.max(0, egStock_(r.rodeo_id));
    if (!stock) return;
    const pesadasR = pesadas.filter(p=>String(p.rodeo_id)===String(r.rodeo_id)).sort((a,b)=>String(b.fecha).localeCompare(String(a.fecha)));
    const pesoP = pesadasR[0] ? Number(pesadasR[0].peso_prom_kg)||0 : 0;
    const val = valorizarRodeo_(r, stock, pesoP);
    stockValEng += val;
    stockDetalleRows.push({ rodeo: r, stock, pesoP, val });
  });

  const totalIngresos = totalVentas + stockValEng;

  // Stock inicial / Cesiones recibidas de Recría
  const movs = S.cache.movimientos || [];
  const saldosIni = movs.filter(m => m.tipo==='Saldo inicial' && rodeosEngIds.has(String(m.rodeo_destino_id)));
  // Cesiones desde Recría — leer de egresos_recria con precio_kg_cesion
  const egresosRecRaw = S.cache.egresos_recria || [];
  const cesionesRec = egresosRecRaw.filter(e => e.destino === 'Engorde' && rodeosEngIds.has(String(e.rodeo_destino_id||'')));
  // También incluir traslados directos a corrales de engorde (legacy)
  const cesionesRecTrasla = movs.filter(m => (m.tipo==='Traslado en bloque'||m.tipo==='Traslado individual') && rodeosEngIds.has(String(m.rodeo_destino_id)));
  const totalSaldoIni = saldosIni.reduce((s,m)=>s+(Number(m.cantidad)||0)*(Number(m.precio_cabeza)||0),0);
  // Cesiones desde egresos_recria con precio_kg_cesion
  const totalCesiones = cesionesRec.reduce((s,e)=>{
    return s + (Number(e.cant_animales)||0)*(Number(e.peso_prom_kg)||0)*(Number(e.precio_kg_cesion)||0);
  },0) + cesionesRecTrasla.reduce((s,m)=>{
    const rodeoOrig = rodeos.find(r=>String(r.rodeo_id)===String(m.rodeo_origen_id));
    const cant = Number(m.cantidad)||0;
    const precioKg = Number(m.precio_cabeza)||0;
    const peso = Number(m.peso_prom_kg)||0;
    if (precioKg && peso) return s + cant*peso*precioKg;
    const pesadasO = pesadas.filter(p=>String(p.rodeo_id)===String(m.rodeo_origen_id)&&String(p.fecha)<=String(m.fecha)).sort((a,b)=>String(b.fecha).localeCompare(String(a.fecha)));
    const pesoO = pesadasO[0] ? Number(pesadasO[0].peso_prom_kg)||0 : 0;
    return s + valorizarRodeo_(rodeoOrig||{categoria:'novillo'}, cant, pesoO);
  },0);

  // Compras campaña
  const comprasEng = comprasHacGetAll_().filter(c=>c.campana===campSelec&&(!campSelecField||String(c.campo_id)===String(campSelecField)));
  const totalCompras = comprasEng.reduce((s,c)=>s+(Number(c.importe_total)||0),0);

  // Insumos: precalcular costo promedio por producto una sola vez
  const comprasInsumos = S.cache.compras_insumos || [];
  const productosAll   = (S.catalogs && S.catalogs.productos) || (S.cache.productos || []);
  const prodPorId      = Object.fromEntries(productosAll.map(p=>[String(p.producto_id),p]));
  const costoProm      = {};
  comprasInsumos.forEach(c => {
    const pid = String(c.producto_id);
    if (!costoProm[pid]) costoProm[pid] = { cant: 0, costo: 0 };
    costoProm[pid].cant  += Number(c.cantidad)    || 0;
    costoProm[pid].costo += Number(c.costo_total) || 0;
  });
  const consumos = (S.cache.consumos_insumos||[]).filter(c=>rodeosEngIds.has(String(c.rodeo_id)));
  let totalAlim=0, totalVeter=0, totalOtros=0;
  consumos.forEach(c => {
    const pid = String(c.producto_id);
    const cp = costoProm[pid];
    const precioU = cp && cp.cant > 0 ? cp.costo / cp.cant : 0;
    const importe = (Number(c.cantidad)||0) * precioU;
    const cat = (prodPorId[pid]?.categoria||'').toLowerCase().normalize('NFD').replace(/[̀-ͯ]/g,'');
    if (cat.includes('aliment'))                              totalAlim  += importe;
    else if (cat.includes('veterin')||cat.includes('sanid')) totalVeter += importe;
    else                                                      totalOtros += importe;
  });

  // Sueldos
  const totalSueldosEng = sueldoTotalActividad_('engorde', campSelecField ? s=>String(s.campo_id)===String(campSelecField) : null);

  const totalEgresos = totalSaldoIni + totalCesiones + totalCompras + totalAlim + totalVeter + totalOtros + totalSueldosEng;
  const margen = totalIngresos - totalEgresos;
  const margenColor = margen>=0 ? 'var(--green)' : 'var(--red)';
  const margenBg    = margen>=0 ? 'var(--green-bg)' : 'rgba(220,50,50,0.08)';

  // ── RENDER ECONÓMICO ────────────────────────────────────────────────
  const campoLabel = campSelecField ? ' · ' + campoNombre(campSelecField) : '';

  h += `<div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:16px">
    <!-- INGRESOS -->
    <div class="panel" style="margin-bottom:0">
      <div class="panel-title" style="color:var(--green-text)">📈 Ingresos — ${campSelec}${campoLabel}</div>
      <div style="display:flex;flex-direction:column;gap:8px">
        <div style="display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid var(--border)">
          <div><div style="font-weight:600">💰 Ventas de hacienda</div><div style="font-size:11px;color:var(--text3)">${ventasEng.length} ventas liquidadas</div></div>
          <div style="font-size:18px;font-weight:700;color:var(--green)">${fm(totalVentas)}</div>
        </div>
        <div style="display:flex;justify-content:space-between;align-items:center;padding:8px 0">
          <div><div style="font-weight:600">📦 Stock valorizado actual</div><div style="font-size:11px;color:var(--text3)">${stockDetalleRows.length} corrales</div></div>
          <div style="font-size:18px;font-weight:700;color:var(--green)">${fm(stockValEng)}</div>
        </div>
        <div style="display:flex;justify-content:space-between;align-items:center;padding:10px;background:var(--green-bg);border-radius:8px;margin-top:4px">
          <div style="font-weight:700;font-size:14px">TOTAL INGRESOS</div>
          <div style="font-size:22px;font-weight:800;color:var(--green)">${fm(totalIngresos)}</div>
        </div>
      </div>
    </div>
    <!-- EGRESOS -->
    <div class="panel" style="margin-bottom:0">
      <div class="panel-title" style="color:var(--clay-text)">📉 Egresos — ${campSelec}${campoLabel}</div>
      <div style="display:flex;flex-direction:column;gap:8px">
        <div style="display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid var(--border)">
          <div><div style="font-weight:600">🐄 Stock inicial</div><div style="font-size:11px;color:var(--text3)">${saldosIni.length} rodeos × precio/cab</div></div>
          <div style="font-size:18px;font-weight:700;color:var(--clay)">${fm(totalSaldoIni)}</div>
        </div>
        <div style="display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid var(--border)">
          <div><div style="font-weight:600">🔄 Cesiones de Recría</div><div style="font-size:11px;color:var(--text3)">${cesionesRec.length + cesionesRecTrasla.length} cesiones desde Recría</div></div>
          <div style="font-size:18px;font-weight:700;color:var(--clay)">${fm(totalCesiones)}</div>
        </div>
        <div style="display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid var(--border)">
          <div><div style="font-weight:600">🛒 Compras de hacienda</div><div style="font-size:11px;color:var(--text3)">${comprasEng.length} compras campaña</div></div>
          <div style="font-size:18px;font-weight:700;color:var(--clay)">${fm(totalCompras)}</div>
        </div>
        <div style="display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid var(--border)">
          <div><div style="font-weight:600">🌾 Alimentación</div><div style="font-size:11px;color:var(--text3)">${consumos.length} registros de consumo</div></div>
          <div style="font-size:18px;font-weight:700;color:var(--clay)">${fm(totalAlim)}</div>
        </div>
        <div style="display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid var(--border)">
          <div><div style="font-weight:600">💉 Veterinaria</div></div>
          <div style="font-size:18px;font-weight:700;color:var(--clay)">${fm(totalVeter)}</div>
        </div>
        <div style="display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid var(--border)">
          <div><div style="font-weight:600">📦 Otros insumos</div></div>
          <div style="font-size:18px;font-weight:700;color:var(--clay)">${fm(totalOtros)}</div>
        </div>
        <div style="display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid var(--border)">
          <div><div style="font-weight:600">👤 Sueldos Engorde</div></div>
          <div style="font-size:18px;font-weight:700;color:var(--clay)">${fm(totalSueldosEng)}</div>
        </div>
        <div style="display:flex;justify-content:space-between;align-items:center;padding:10px;background:var(--clay-bg);border-radius:8px;margin-top:4px">
          <div style="font-weight:700;font-size:14px">TOTAL EGRESOS</div>
          <div style="font-size:22px;font-weight:800;color:var(--clay)">${fm(totalEgresos)}</div>
        </div>
      </div>
    </div>
  </div>`;

  // Margen
  h += `<div style="background:${margenBg};border-radius:10px;padding:16px 20px;display:flex;justify-content:space-between;align-items:center;margin-bottom:20px">
    <div>
      <div style="font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:${margenColor}">Margen Bruto — Terminación ${campSelec}${campoLabel}</div>
      <div style="font-size:11px;color:var(--text2);margin-top:3px">Ingresos − Egresos</div>
    </div>
    <div style="font-size:32px;font-weight:800;color:${margenColor}">${margen>=0?'':'-'}${fm(Math.abs(margen))}</div>
  </div>`;

  // ── EXISTENCIA INICIAL ─────────────────────────────────────────────
  const movs2 = S.cache.movimientos || [];
  const saldosEngIni = movs2.filter(m => m.tipo==='Saldo inicial' && rodeosEngIds.has(String(m.rodeo_destino_id)));
  if (saldosEngIni.length) {
    h += `<div class="panel">
      <div class="panel-title">📥 Existencia Inicial</div>
      <div class="tw"><table class="dt"><thead><tr>
        <th>Rodeo</th><th>Campo</th><th>Categoría</th>
        <th class="tc">Cabezas</th><th class="tr">$/cab</th><th class="tr">Valor</th>
      </tr></thead><tbody>`;
    let totCabIni=0, totValIni=0;
    saldosEngIni.forEach(m => {
      const rod = rodeos.find(r=>String(r.rodeo_id)===String(m.rodeo_destino_id));
      const cant = Number(m.cantidad)||0;
      const precio = Number(m.precio_cabeza)||0;
      const val = convertirAMoneda_(cant*precio, m.fecha, moneda);
      totCabIni += cant; totValIni += val;
      h += `<tr>
        <td>${rod?.nombre||'—'}</td>
        <td>${campoNombre(rod?.campo_id)}</td>
        <td>${rod?.categoria||'—'}</td>
        <td class="tc">${fn(cant)}</td>
        <td class="tr">${precio ? fm(precio) : '—'}</td>
        <td class="tr"><strong>${fm(val)}</strong></td>
      </tr>`;
    });
    h += `<tr class="total-row"><td colspan="3"><strong>Total</strong></td>
      <td class="tc"><strong>${fn(totCabIni)}</strong></td><td></td>
      <td class="tr"><strong>${fm(totValIni)}</strong></td></tr>`;
    h += '</tbody></table></div></div>';
  }

  // ── EXISTENCIA FINAL ───────────────────────────────────────────────
  if (stockDetalleRows.length) {
    h += `<div class="panel">
      <div class="panel-title">📦 Existencia Final — Stock valorizado actual</div>
      <div class="tw"><table class="dt"><thead><tr>
        <th>Rodeo</th><th>Campo</th><th>Categoría</th>
        <th class="tc">Stock</th><th class="tr">Peso prom.</th>
        <th class="tr">Método</th><th class="tr">Valor</th>
      </tr></thead><tbody>`;
    stockDetalleRows.forEach(row => {
      const cat = (row.rodeo.categoria||'').toLowerCase().trim();
      const metodo = CATS_POR_CABEZA_.includes(cat) ? 'por cabeza' : (row.pesoP ? 'por kg' : 'por cab. (sin pesada)');
      h += `<tr>
        <td><strong>${row.rodeo.nombre}</strong></td>
        <td>${campoNombre(row.rodeo.campo_id)}</td>
        <td>${row.rodeo.categoria||'—'}</td>
        <td class="tc">${fn(row.stock)}</td>
        <td class="tr">${row.pesoP ? fn(row.pesoP)+' kg' : '—'}</td>
        <td class="tr" style="font-size:11px;color:var(--text3)">${metodo}</td>
        <td class="tr"><strong>${fm(row.val)}</strong></td>
      </tr>`;
    });
    h += `<tr class="total-row"><td colspan="4"><strong>Total</strong></td>
      <td></td><td></td><td class="tr"><strong>${fm(stockValEng)}</strong></td></tr>`;
    h += '</tbody></table></div></div>';
  }

  // ── PRODUCTIVO ──────────────────────────────────────────────────────
  // KPIs productivos
  let totAn=0, totKgI=0, totKgV=0, totKgStk=0, totKgG=0;
  const gdps=[];
  rodeosEngFilt.forEach(r => {
    const rid = r.rodeo_id;
    totAn    += egStock_(rid);
    totKgI   += egKgIngresados_(rid);
    totKgV   += egKgVend_(rid);
    totKgStk += egKgStockEstimado_(rid);
    totKgG   += egKgGanadosHastaPesada_(rid);
    const gdp = egGanDiaria_(rid);
    if (gdp) gdps.push(gdp);
  });
  const gdpProm = gdps.length ? gdps.reduce((s,v)=>s+v,0)/gdps.length : null;

  h += `<div style="display:flex;gap:10px;flex-wrap:wrap;margin-bottom:16px">
    <div style="background:var(--bg2);border-radius:8px;padding:10px 16px">
      <div style="font-size:10px;font-weight:700;text-transform:uppercase;color:var(--text2);letter-spacing:.05em">Animales en stock</div>
      <div style="font-size:18px;font-weight:700">${fn(totAn)}</div>
    </div>
    <div style="background:var(--green-bg);border-radius:8px;padding:10px 16px">
      <div style="font-size:10px;font-weight:700;text-transform:uppercase;color:var(--green-text);letter-spacing:.05em">Kg ingresados</div>
      <div style="font-size:18px;font-weight:700;color:var(--green)">${fn(totKgI)}</div>
    </div>
    <div style="background:var(--gold-bg);border-radius:8px;padding:10px 16px">
      <div style="font-size:10px;font-weight:700;text-transform:uppercase;color:var(--gold-text);letter-spacing:.05em">Kg vendidos</div>
      <div style="font-size:18px;font-weight:700;color:var(--gold)">${fn(totKgV)}</div>
    </div>
    <div style="background:var(--clay-bg);border-radius:8px;padding:10px 16px">
      <div style="font-size:10px;font-weight:700;text-transform:uppercase;color:var(--clay-text);letter-spacing:.05em">Kg en stock</div>
      <div style="font-size:18px;font-weight:700;color:var(--clay)">${fn(totKgStk)}</div>
    </div>
    <div style="background:var(--blue-bg);border-radius:8px;padding:10px 16px">
      <div style="font-size:10px;font-weight:700;text-transform:uppercase;color:var(--blue-text);letter-spacing:.05em">Kg ganados</div>
      <div style="font-size:18px;font-weight:700;color:var(--blue)">${fn(totKgG)}</div>
    </div>
    <div style="background:var(--bg2);border-radius:8px;padding:10px 16px">
      <div style="font-size:10px;font-weight:700;text-transform:uppercase;color:var(--text2);letter-spacing:.05em">GDP promedio</div>
      <div style="font-size:18px;font-weight:700">${gdpProm ? fn(gdpProm,3)+' kg/día' : '—'}</div>
    </div>
  </div>`;

  // ── TARJETAS POR CORRAL ─────────────────────────────────────────────
  h += '<div class="section-label">Detalle por corral</div>';
  h += '<div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:16px;margin-bottom:20px">';
  rodeosEngFilt.forEach(r => {
    const rid = r.rodeo_id;
    const stock   = egStock_(rid);
    const kgI     = egKgIngresados_(rid);
    const kgV     = egKgVend_(rid);
    const kgStk   = egKgStockEstimado_(rid);
    const kgG     = egKgGanadosHastaPesada_(rid);
    const gdp     = egGanDiaria_(rid);
    const consumosRodeo = consumos.filter(c=>String(c.rodeo_id)===String(rid));
    let costoAlim=0, costoVet=0;
    consumosRodeo.forEach(c=>{
      const pid=String(c.producto_id);
      const cp=costoProm[pid]; const precioU=cp&&cp.cant>0?cp.costo/cp.cant:0;
      const imp=(Number(c.cantidad)||0)*precioU;
      const cat=(prodPorId[pid]?.categoria||'').toLowerCase().normalize('NFD').replace(/[̀-ͯ]/g,'');
      if(cat.includes('veterin')||cat.includes('sanid')) costoVet+=imp;
      else costoAlim+=imp;
    });
    const ingVentas = egIngVentas_(rid);
    const ivStk     = valorizarRodeo_(r, egStock_(rid), egPesadas_(rid).slice(-1)[0]?.peso_prom_kg||0);
    const resultado = ingVentas + ivStk - costoAlim - costoVet;
    const dias      = egDiasEngorde_(rid);
    const ultimaPes = egUltimaPesada_(rid);

    h += `<div style="background:var(--bg);border:1px solid var(--border2);border-radius:12px;padding:16px">
      <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:12px">
        <div>
          <div style="font-weight:700;font-size:15px">${r.nombre}</div>
          <div style="font-size:12px;color:var(--text3)">${campoNombre(r.campo_id)} · ${dias ? dias+' días' : 'sin entrada'}</div>
        </div>
        <div style="font-size:22px;font-weight:800;color:var(--blue);text-align:right">
          ${fn(stock)}
          <div style="font-size:10px;font-weight:400;color:var(--text3)">animales</div>
        </div>
      </div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:4px;font-size:12px">
        <div style="color:var(--text2);text-transform:uppercase;font-size:10px;font-weight:700;letter-spacing:.04em">Última pesada</div>
        <div style="text-align:right;font-weight:600">${ultimaPes ? fn(ultimaPes.peso)+' kg' : '—'}</div>
        <div style="color:var(--text2);text-transform:uppercase;font-size:10px;font-weight:700;letter-spacing:.04em">GDP</div>
        <div style="text-align:right;font-weight:600;color:var(--green)">${gdp ? fn(gdp,3)+' kg/día' : '—'}</div>
        <div style="color:var(--text2);text-transform:uppercase;font-size:10px;font-weight:700;letter-spacing:.04em">Kg ganados</div>
        <div style="text-align:right;font-weight:600">${fn(kgG)}</div>
        <div style="color:var(--text2);text-transform:uppercase;font-size:10px;font-weight:700;letter-spacing:.04em">Costo alim.</div>
        <div style="text-align:right;font-weight:600">${fm(costoAlim)}</div>
        <div style="color:var(--text2);text-transform:uppercase;font-size:10px;font-weight:700;letter-spacing:.04em">Costo vet.</div>
        <div style="text-align:right;font-weight:600;color:var(--blue)">${fm(costoVet)}</div>
        <div style="color:var(--text2);text-transform:uppercase;font-size:10px;font-weight:700;letter-spacing:.04em">Ingreso ventas</div>
        <div style="text-align:right;font-weight:600">${fm(ingVentas)}</div>
      </div>
      <div style="margin-top:10px;padding-top:10px;border-top:1px solid var(--border);display:flex;justify-content:space-between;align-items:center">
        <div style="font-size:10px;font-weight:700;text-transform:uppercase;color:var(--text2)">Resultado</div>
        <div style="font-size:16px;font-weight:800;color:${resultado>=0?'var(--green)':'var(--red)'}">${fm(resultado)}</div>
      </div>
      <div style="font-size:10px;color:var(--text3);margin-top:4px">
        Ingresados: ${fn(kgI+stock)} cab. &nbsp;·&nbsp; Kg ingr.: ${fn(kgI)} &nbsp;·&nbsp; Kg stock: ${fn(kgStk)}
      </div>
    </div>`;
  });
  h += '</div>';

  return h;
}

function buildEngordeCostos_(rodeoId, fm) {
  if (!rodeoId) {
    // Mostrar resumen de todos los corrales
    const rodeosEngAll = rodeosTodos().filter(r => r.actividad === 'Engorde');
    const campFiltro = S._engCampoFiltro || '';
    const rodeosEng = campFiltro ? rodeosEngAll.filter(r => String(r.campo_id) === String(campFiltro)) : rodeosEngAll;
    if (!rodeosEng.length) return `<div class="empty-state"><span class="ico">◌</span><div class="msg">No hay corrales de Engorde${campFiltro ? ' en este campo' : ''}.</div></div>`;
    let totalAlim=0,totalVeter=0;
    rodeosEng.forEach(r => {
      const cVet = egCostoAlim_(r.rodeo_id, null, 'Veterinaria');
      const cTot = egCostoAlim_(r.rodeo_id);
      totalVeter += cVet;
      totalAlim  += cTot - cVet;
    });
    // Calcular ingresos consolidados
    let totalVentas=0, totalStock=0;
    rodeosEng.forEach(r => {
      totalVentas += egIngVentas_(r.rodeo_id);
      const pes = egPesadas_(r.rodeo_id);
      const ultima = pes.length ? pes[pes.length-1] : null;
      const pesoP = ultima ? Number(ultima.peso_prom_kg)||0 : 0;
      totalStock += valorizarRodeo_(r, egStock_(r.rodeo_id), pesoP);
    });
    // Stock inicial y cesiones
    const movsTodos = S.cache.movimientos || [];
    const rodeosEngIds2 = new Set(rodeosEng.map(r=>String(r.rodeo_id)));
    const saldosIni2 = movsTodos.filter(m=>m.tipo==='Saldo inicial'&&rodeosEngIds2.has(String(m.rodeo_destino_id)));
    const totalSaldoIni = saldosIni2.reduce((s,m)=>s+convertirAMoneda_((Number(m.cantidad)||0)*(Number(m.precio_cabeza)||0), m.fecha, S.engordeMoneda||'ARS'),0);
    const rodeosTodosMap = Object.fromEntries(rodeosTodos().map(r=>[String(r.rodeo_id),r]));
    const cesiones2 = movsTodos.filter(m=>(m.tipo==='Traslado en bloque'||m.tipo==='Traslado individual')&&rodeosEngIds2.has(String(m.rodeo_destino_id)));
    const totalCesiones2 = cesiones2.reduce((s,m)=>{
      const rodeoO = rodeosTodosMap[String(m.rodeo_origen_id)];
      const cant = Number(m.cantidad)||0;
      const pesO = (S.cache.pesadas||[]).filter(p=>String(p.rodeo_id)===String(m.rodeo_origen_id)&&String(p.fecha)<=String(m.fecha)).sort((a,b)=>String(b.fecha).localeCompare(String(a.fecha)));
      const pesoO = pesO[0]?Number(pesO[0].peso_prom_kg)||0:0;
      return s+convertirAMoneda_(valorizarRodeo_(rodeoO||{categoria:'novillo'},cant,pesoO),m.fecha,S.engordeMoneda||'ARS');
    },0);

    const totalIngresos = totalVentas + totalStock;
    const totalEgresos  = totalSaldoIni + totalCesiones2 + totalAlim + totalVeter;
    const margen = totalIngresos - totalEgresos;
    const mc = margen>=0?'var(--green)':'var(--red)';
    const mb = margen>=0?'var(--green-bg)':'rgba(220,50,50,0.08)';

    let h = `<div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:16px">
      <div class="panel" style="margin-bottom:0">
