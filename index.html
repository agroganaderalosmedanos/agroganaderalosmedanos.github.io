async function egGuardarInactivo_(rodeoId, productoId, marcarInactivo, btn) {
  if (btn) {
    btn.disabled = true;
    btn.style.opacity = '0.4';
    btn.style.cursor = 'wait';
    btn.textContent = '⏳';
    await new Promise(r => setTimeout(r, 0)); // forzar repintado
  }
  // Siempre recargar desde Sheets para tener el rp_id actualizado
  await loadEntity('rodeo_productos', true);
  if (S.catalogs) S.catalogs.rodeo_productos = S.cache.rodeo_productos;
  const todos = S.cache.rodeo_productos || [];
  const reg = todos.find(x => String(x.rodeo_id) === String(rodeoId) && String(x.producto_id) === String(productoId));
  const fecha = document.getElementById('eg-pi-fecha-'+productoId)?.value || today();
  try {
    if (reg) {
      // Actualizar registro existente
      await apiCall('update', { body: {
        entity: 'rodeo_productos',
        id: reg.rp_id,
        data: { activo: marcarInactivo ? 'FALSE' : 'TRUE', fecha_baja: marcarInactivo ? fecha : '' }
      }});
    } else {
      // Crear nuevo registro
      await apiCall('create', { body: {
        entity: 'rodeo_productos',
        data: { rodeo_id: rodeoId, producto_id: productoId, activo: marcarInactivo ? 'FALSE' : 'TRUE', fecha_baja: marcarInactivo ? fecha : '' }
      }});
    }
    invalidateCache('rodeo_productos');
    if (S.catalogs) delete S.catalogs.rodeo_productos;
    await loadEntity('rodeo_productos', true);
    if (S.catalogs) S.catalogs.rodeo_productos = S.cache.rodeo_productos;
    toast(marcarInactivo ? 'Insumo marcado como inactivo' : 'Insumo reactivado', 'ok');
    render();
  } catch(err) {
    if (btn) { btn.disabled = false; btn.style.opacity = ''; btn.style.cursor = ''; }
    toast('Error: ' + err.message, 'err');
  }
}

function buildEngordeComparacion_(rodeosEng, fm) {
  if (!rodeosEng.length) return '<div class="empty-state"><span class="ico">◌</span><div class="msg">No hay corrales de Engorde.</div></div>';
  const rows = rodeosEng.map(r => {
    const rid = r.rodeo_id;
    const stk = egStock_(rid);
    const cantIng = egCantIngresada_(rid);
    const kgI = egKgIngresados_(rid);
    const kgV = egKgVend_(rid);
    const kgG = egKgGanadosHastaPesada_(rid);
    const kgStk = egKgStockEstimado_(rid);
    const ca = egCostoAlim_(rid);
    const cc = egCostoCompra_(rid);
    const iv = egIngVentas_(rid);
    const fi = egFechaIngreso_(rid);
    const pes = egPesadas_(rid);
    const ultima = pes.length ? pes[pes.length-1] : null;
    const gd = egGanDiaria_(rid);
    const kgIng = egKgIngreso_(rid);
    const caXkg = kgG > 0 ? egCostoAlim_(rid, ultima?.fecha) / kgG : null;
    const ccXkg = kgG > 0 ? cc / kgG : null;
    const pesoUltimaC = ultima ? Number(ultima.peso_prom_kg)||0 : 0;
    const ivStockARS2 = valorizarRodeo_(r, stk, pesoUltimaC);
    const ivStock = convertirAMoneda_(ivStockARS2, today(), S.engordeMoneda||'ARS');
    const util = iv + ivStock - ca - cc;
    const dias = fi ? Math.round((new Date()-new Date(fi))/86400000) : null;
    return { r, rid, stk, cantIng, kgI, kgV, kgG, kgStk, ca, cc, iv, ivStock, util, gd, caXkg, ccXkg, dias, kgIng, ultima };
  });

  const best = (fn, low=false) => { const vs=rows.map(fn).filter(v=>v!==null&&v>0); if(!vs.length)return null; return low?Math.min(...vs):Math.max(...vs); };
  const tag = (v, b, low=false) => (v!==null&&b!==null&&v===b)?` style="color:var(--green);font-weight:700"`:'' ;
  const bGd = best(r=>r.gd); const bKgG=best(r=>r.kgG); const bUtil=best(r=>r.util); const bCaXkg=best(r=>r.caXkg,true);

  let h = '<div class="tw"><table class="dt"><thead><tr><th>Indicador</th>' + rows.map(r=>`<th class="tc">${r.r.nombre}</th>`).join('') + '</tr></thead><tbody>';
  const row = (lbl, fn, fmt) => `<tr><td>${lbl}</td>${rows.map(r=>{const v=fn(r);return`<td class="tc">${v!==null&&v!==undefined?fmt(v):'—'}</td>`;}).join('')}</tr>`;
  const rowTag = (lbl, fn, fmt, best, low=false) => `<tr><td>${lbl}</td>${rows.map(r=>{const v=fn(r);return`<td class="tc"${tag(v,best,low)}>${v!==null&&v>0?fmt(v):'—'}</td>`;}).join('')}</tr>`;

  h += `<tr class="total-row"><td colspan="${rows.length+1}"><strong>📦 Stock y movimiento</strong></td></tr>`;
  h += row('Animales ingresados', r=>r.cantIng, v=>fn(v,0));
  h += row('Stock actual', r=>r.stk, v=>fn(v,0)+' cab.');
  h += row('Días en corral', r=>r.dias, v=>v+' días');
  h += row('Kg prom. entrada', r=>r.kgIng, v=>fn(v,0)+' kg');
  h += row('Kg prom. última pesada', r=>r.ultima?Number(r.ultima.peso_prom_kg):null, v=>fn(v,0)+' kg');
  h += `<tr class="total-row"><td colspan="${rows.length+1}"><strong>⚖️ Kilos</strong></td></tr>`;
  h += row('Kg ingresados', r=>r.kgI, v=>fn(v,0)+' kg');
  h += row('Kg vendidos', r=>r.kgV, v=>fn(v,0)+' kg');
  h += row('Kg en stock', r=>r.kgStk, v=>fn(v,0)+' kg');
  h += rowTag('Kg ganados', r=>r.kgG, v=>fn(v,0)+' kg', bKgG);
  h += rowTag('GDP', r=>r.gd, v=>fn(v,3)+' kg/día', bGd);
  h += `<tr class="total-row"><td colspan="${rows.length+1}"><strong>💲 Costos</strong></td></tr>`;
  h += row('Costo de compra', r=>r.cc, fm);
  h += row('Costo alimentación', r=>r.ca, fm);
  h += row('Costo total', r=>r.ca+r.cc, fm);
  h += rowTag('Alim. / kg ganado', r=>r.caXkg, fm, bCaXkg, true);
  h += rowTag('Compra / kg ganado', r=>r.ccXkg, fm, best(r=>r.ccXkg,true), true);
  h += `<tr class="total-row"><td colspan="${rows.length+1}"><strong>💰 Resultados</strong></td></tr>`;
  h += row('Ingreso ventas', r=>r.iv, fm);
  h += row('Stock valorizado', r=>r.ivStock>0?r.ivStock:null, fm);
  h += rowTag('Utilidad', r=>r.util, fm, bUtil);
  h += '</tbody></table></div>';
  h += `<div style="font-size:11px;color:var(--muted);margin-top:6px">Los valores en <span style="color:var(--green);font-weight:700">verde</span> indican el mejor resultado del indicador entre corrales.</div>`;
  return h;
}

function buildEngordeProyeccion_(rodeoId, fm) {
  const rodeosEng = rodeosTodos().filter(r => r.actividad === 'Engorde');
  let h = '';
  (rodeoId ? [rodeosTodos().find(r=>String(r.rodeo_id)===String(rodeoId))] : rodeosEng).filter(Boolean).forEach(r => {
    const rid = r.rodeo_id;
    const cfg = egConfig_(rid);
    const stk = egStock_(rid);
    const pes = egPesadas_(rid);
    const ultima = pes.length ? pes[pes.length-1] : null;
    const fi = egFechaIngreso_(rid);
    const dias = fi ? Math.round((new Date()-new Date(fi))/86400000) : null;
    const pesoObj = Number(cfg.pesoObjetivo || 520);
    const precioP = Number(cfg.precioProyectado || 0);
    const kgActual = ultima ? Number(ultima.peso_prom_kg) : null;
    const gd = egGanDiaria_(rid);
    const yaAlcanzo = kgActual !== null && kgActual >= pesoObj;
    const diasRest = !yaAlcanzo && gd && gd>0 && kgActual!==null ? Math.ceil((pesoObj-kgActual)/gd) : null;
    const fechaSalida = diasRest!==null&&ultima ? (() => { const d=new Date(ultima.fecha); d.setDate(d.getDate()+diasRest); return d.toISOString().slice(0,10); })() : null;
    const border = yaAlcanzo?'var(--green)':(fechaSalida?'var(--blue-text)':'var(--border)');

    h += `<div class="panel" style="border-left:4px solid ${border};margin-bottom:12px">
      <div style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px;margin-bottom:12px">
        <div><div style="font-weight:700;font-size:15px">${r.nombre}</div><div style="font-size:12px;color:var(--muted)">${fn(stk,0)} animales${dias!==null?' · '+dias+' días':''}</div></div>
        <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap;font-size:13px">
          <label>Peso objetivo (kg):</label>
          <input type="number" id="eg-proj-peso-${rid}" value="${pesoObj}" min="1" step="1" style="width:80px;padding:4px 8px;border:1px solid var(--border);border-radius:6px">
          <label>Precio estimado $/kg:</label>
          <input type="number" id="eg-proj-precio-${rid}" value="${precioP||''}" placeholder="$ / kg" min="0" step="1" style="width:100px;padding:4px 8px;border:1px solid var(--border);border-radius:6px">
          <button class="btn btn-secondary" id="eg-proj-save-${rid}" data-rodeo="${rid}" style="padding:4px 12px;font-size:12px">✓</button>
        </div>
      </div>`;
    if (!ultima) {
      h += `<div class="empty-state">Sin pesadas. Registrá al menos una para calcular la proyección.</div>`;
    } else if (yaAlcanzo) {
      h += `<div style="background:var(--green-bg);border-radius:8px;padding:12px;margin-bottom:10px"><div style="font-weight:700;color:var(--green-text)">✅ Peso objetivo alcanzado — ${fn(kgActual,1)} kg</div></div>
      <div class="kpi-grid">
        <div class="kpi"><div class="kpi-label">Kg totales a vender</div><div class="kpi-val">${fn(stk*kgActual,0)} kg</div><div class="kpi-sub">${fn(stk,0)} × ${fn(kgActual,1)} kg</div></div>
        ${precioP>0?`<div class="kpi"><div class="kpi-label">Ingreso proyectado</div><div class="kpi-val kpi-pos">${fm(stk*kgActual*precioP)}</div></div>`:''}
      </div>`;
    } else if (fechaSalida) {
      h += `<div class="kpi-grid">
        <div class="kpi"><div class="kpi-icon">📅</div><div class="kpi-label">Fecha estimada de salida</div><div class="kpi-val kpi-pos" style="font-size:18px">${fd(fechaSalida)}</div><div class="kpi-sub">en ${diasRest} días</div></div>
        <div class="kpi"><div class="kpi-icon">⚖️</div><div class="kpi-label">Peso actual → objetivo</div><div class="kpi-val">${fn(kgActual,1)} → ${fn(pesoObj,0)} kg</div><div class="kpi-sub">faltan ${fn(pesoObj-kgActual,1)} kg/animal</div></div>
        <div class="kpi"><div class="kpi-icon">📈</div><div class="kpi-label">GDP</div><div class="kpi-val">${fn(gd,3)} kg/día</div></div>
        <div class="kpi"><div class="kpi-icon">🐄</div><div class="kpi-label">Kg totales al vender</div><div class="kpi-val">${fn(stk*pesoObj,0)} kg</div></div>
        ${precioP>0?`<div class="kpi"><div class="kpi-icon">💵</div><div class="kpi-label">Ingreso proyectado</div><div class="kpi-val kpi-pos">${fm(stk*pesoObj*precioP)}</div></div>`:''}
      </div>`;
      // ── Insumos necesarios para llegar al peso objetivo ──
      h += buildProyeccionInsumos_(rid, diasRest, fm);
    } else {
      h += `<div class="empty-state">No se puede proyectar. Necesitás al menos una pesada y un GDP positivo.</div>`;
    }
    h += '</div>';
  });
  return h;
}

function buildProyeccionInsumos_(rodeoId, diasRestantes, fm) {
  const productos = (S.catalogs && S.catalogs.productos) || [];
  const consumosTodos = egConsumos_(rodeoId);
  if (!consumosTodos.length) return '';

  const hoy = today();
  const hace30 = new Date(hoy); hace30.setDate(hace30.getDate() - 30);
  const f30 = hace30.toISOString().slice(0,10);
  const cons30 = consumosTodos.filter(c => c.fecha >= f30);
  if (!cons30.length) return '';

  const prodIds = [...new Set(cons30.map(c => c.producto_id))];
  if (!prodIds.length) return '';

  let h = `<div class="section-label" style="margin-top:18px">🌿 Insumos necesarios para llegar al peso objetivo</div>`;
  h += `<div class="tw"><table class="dt"><thead><tr>
    <th>Alimento / Insumo</th>
    <th class="tc">Consumo diario<br><span style="font-weight:400;font-size:10px">(prom. 30 días)</span></th>
    <th class="tc">Cantidad necesaria<br><span style="font-weight:400;font-size:10px">${diasRestantes} días</span></th>
    <th class="tc">Costo unitario prom.</th>
    <th class="tc">Costo proyectado</th>
  </tr></thead><tbody>`;

  let totalCosto = 0;
  const resumen = [];

  prodIds.forEach(pid => {
    const prod = productos.find(p => String(p.producto_id) === String(pid));
    const nombre = prod?.nombre || ('Producto ' + pid);
    const unidad = prod?.unidad || '';
    const costoUnit = egCostoPromProducto_(pid);
    const cant30 = cons30.filter(c => String(c.producto_id) === String(pid)).reduce((s,c) => s + (Number(c.cantidad)||0), 0);
    const cantDiaria = cant30 / 30;
    const cantNecesaria = Math.round(cantDiaria * diasRestantes);
    const costoTotal = Math.round(cantNecesaria * costoUnit);
    totalCosto += costoTotal;
    resumen.push({ nombre, unidad, cantNecesaria, cantDiaria });

    h += `<tr>
      <td><span class="pill pill-green" style="font-size:11px">${nombre}</span></td>
      <td class="tc" style="color:var(--text2)">${fn(cantDiaria,1)} ${unidad}/día</td>
      <td class="tc"><strong style="color:var(--gold-text)">${fn(cantNecesaria)} ${unidad}</strong></td>
      <td class="tc" style="color:var(--text2)">${costoUnit > 0 ? fm(costoUnit) + '/' + unidad : '—'}</td>
      <td class="tc"><strong>${costoUnit > 0 ? fm(costoTotal) : '—'}</strong></td>
    </tr>`;
  });

  h += `<tr style="background:var(--bg2);font-weight:700">
    <td><strong>Total</strong></td>
    <td class="tc">—</td>
    <td class="tc">—</td>
    <td class="tc">—</td>
    <td class="tc"><strong style="color:var(--clay-text)">${fm(totalCosto)}</strong></td>
  </tr>`;
  h += '</tbody></table></div>';

  // Cartel resumen tipo "stock a acopiar"
  const items = resumen.filter(x => x.cantNecesaria > 0).map(x => `<strong>${fn(x.cantNecesaria)} ${x.unidad}</strong> de ${x.nombre}`).join(' &nbsp;·&nbsp; ');
  if (items) {
    h += `<div style="background:var(--gold-bg);border-radius:8px;padding:10px 16px;font-size:12.5px;color:var(--gold-text);margin-top:8px;line-height:1.7">
      📦 <strong>Stock a acopiar:</strong> ${items}
      <span style="margin-left:8px;color:var(--text3);font-size:11px">· basado en consumo de los últimos 30 días</span>
    </div>`;
  }

  return h;
}

function buildEngordeCierre_(rodeoId, fm) {
  const rodeosEng = rodeosTodos().filter(r => r.actividad === 'Engorde');
  const campFiltro = S._engCampoFiltro || '';
  const rodeosEngFilt = campFiltro ? rodeosEng.filter(r=>String(r.campo_id)===String(campFiltro)) : rodeosEng;
  const lista = rodeoId ? [rodeosTodos().find(r=>String(r.rodeo_id)===String(rodeoId))].filter(Boolean) : rodeosEngFilt;
  if (!lista.length) return '<div class="empty-state"><span class="ico">◌</span><div class="msg">No hay corrales de Engorde.</div></div>';
  let h = '';
  lista.forEach(r => {
    const rid = r.rodeo_id;
    const stk = egStock_(rid);
    const cfg = egConfig_(rid);
    const fi = egFechaIngreso_(rid);
    const pesoObj = Number(cfg.pesoObjetivo||520);
    const pes = egPesadas_(rid);
    const ultima = pes.length ? pes[pes.length-1] : null;
    const gd = egGanDiaria_(rid);
    const kgActual = ultima ? Number(ultima.peso_prom_kg) : null;
    // Fecha salida
    let fSalida = null;
    if (kgActual && gd && gd>0 && kgActual<pesoObj) {
      const diasR = Math.ceil((pesoObj-kgActual)/gd);
      const d = new Date(ultima.fecha); d.setDate(d.getDate()+diasR);
      fSalida = d.toISOString().slice(0,10);
    }
    const hoy = today();
    const diasHastaSalida = fSalida ? Math.max(0, Math.round((new Date(fSalida)-new Date(hoy))/86400000)) : null;
    const caAcum = egCostoAlim_(rid);
    const cc = egCostoCompra_(rid);
    const hace30 = new Date(hoy); hace30.setDate(hace30.getDate()-30);
    const f30 = hace30.toISOString().slice(0,10);
    const todosConsumos = egConsumos_(rid);
    const cons30 = todosConsumos.filter(c => c.fecha >= f30);
    const costo30 = cons30.reduce((s,c) => s+(Number(c.cantidad)||0)*egCostoPromProducto_(c.producto_id), 0);
    // costoDiario solo para mostrar en KPI (referencia)
    let costoDiario;
    if (costo30 > 0) {
      costoDiario = costo30 / 30;
    } else if (todosConsumos.length && fi) {
      const diasTotales = Math.max(1, Math.round((new Date(hoy)-new Date(fi))/86400000));
      costoDiario = caAcum / diasTotales;
    } else {
      costoDiario = 0;
    }
    // costoProyect y caAcumActivos calculados desde productos activos (misma lógica que la tabla → siempre coinciden)
    let costoProyect = null;
    let caAcumActivos = 0; // acumulado solo de productos activos (para que el KPI coincida con la tabla)
    if (diasHastaSalida !== null) {
      const prodIdsCalc = [...new Set(todosConsumos.map(c => c.producto_id))];
      let costoProyectSum = 0;
      prodIdsCalc.forEach(pid => {
        if (!egEsProductoActivo_(rid, pid, fSalida || hoy)) return;
        const costoUnit = egCostoPromProducto_(pid);
        const cantAcumP = todosConsumos.filter(c => String(c.producto_id)===String(pid)).reduce((s,c)=>s+(Number(c.cantidad)||0),0);
        caAcumActivos += cantAcumP * costoUnit;
        const inactivoReg = egRodeoProductosTodos_().find(x => String(x.rodeo_id)===String(rid) && String(x.producto_id)===String(pid));
        const fechaBajaRef = inactivoReg?.fecha_baja || hoy;
        const cons30p = cons30.filter(c => String(c.producto_id)===String(pid) && String(c.fecha)<fechaBajaRef);
        const cant30p = cons30p.reduce((s,c)=>s+(Number(c.cantidad)||0),0);
        let cantDiaria = cant30p > 0 ? cant30p/30 : (fi ? cantAcumP/Math.max(1,Math.round((new Date(hoy)-new Date(fi))/86400000)) : 0);
        if (diasHastaSalida > 0) costoProyectSum += Math.round(cantDiaria * diasHastaSalida) * costoUnit;
      });
      costoProyect = Math.round(costoProyectSum);
    }
    const costoTotalCierre = costoProyect !== null ? caAcumActivos + costoProyect : null;
    const costoFinal = costoTotalCierre !== null ? cc + costoTotalCierre : null;
    // caAcum sigue disponible para cálculos históricos completos si se necesita
    const stkP = Number(cfg.precioStock||0);
    const ivProyect = stkP>0 ? stk*pesoObj*stkP : null;
    const ivVentas = egIngVentas_(rid);
    const ivTotal = ivProyect!==null ? ivVentas+ivProyect : null;
    const utilProyect = ivTotal!==null&&costoFinal!==null ? ivTotal-costoFinal : null;
    const border = utilProyect!==null?(utilProyect>=0?'var(--green)':'var(--red)'):'var(--border)';

    h += `<div class="panel" style="border-left:4px solid ${border};margin-bottom:12px">
      <div style="font-weight:700;font-size:15px;margin-bottom:4px">${r.nombre}</div>
      <div style="font-size:12px;color:var(--muted);margin-bottom:12px">Salida proyectada: <strong>${fSalida?fd(fSalida):'sin datos'}</strong>${diasHastaSalida!==null?' ('+diasHastaSalida+' días)':''}</div>`;
    if (diasHastaSalida===null) {
      h += '<div class="empty-state">Sin proyección disponible. Necesitás pesadas registradas.</div>';
    } else {
      h += `<div class="kpi-grid" style="margin-bottom:8px">
        <div class="kpi"><div class="kpi-icon">🌿</div><div class="kpi-label">Alim. acumulada (ya gastado)</div><div class="kpi-val">${fm(caAcumActivos)}</div><div class="kpi-sub">hasta hoy</div></div>
        <div class="kpi"><div class="kpi-icon">📅</div><div class="kpi-label">Costo diario (últ. 30 días)</div><div class="kpi-val">${fm(costoDiario)}</div><div class="kpi-sub">${fm(costo30)} en 30 días</div></div>
        <div class="kpi"><div class="kpi-icon">🔮</div><div class="kpi-label">Alim. proyectada (resta)</div><div class="kpi-val">${fm(costoProyect)}</div><div class="kpi-sub">${diasHastaSalida} días × ${fm(costoDiario)}/día</div></div>
        <div class="kpi"><div class="kpi-icon">💲</div><div class="kpi-label">Total alim. al cierre</div><div class="kpi-val">${fm(costoTotalCierre)}</div><div class="kpi-sub">acumulado + proyectado</div></div>
        <div class="kpi"><div class="kpi-icon">🛒</div><div class="kpi-label">Costo de compra</div><div class="kpi-val">${fm(cc)}</div></div>
        <div class="kpi"><div class="kpi-icon">💲</div><div class="kpi-label">Costo total al cierre</div><div class="kpi-val">${fm(costoFinal)}</div><div class="kpi-sub">compra + alim. total</div></div>
        ${ivProyect!==null?`<div class="kpi"><div class="kpi-icon">💵</div><div class="kpi-label">Ingreso proyectado stock</div><div class="kpi-val">${fm(ivProyect)}</div><div class="kpi-sub">${fn(stk,0)} × ${fn(pesoObj,0)} kg × ${fm(stkP)}/kg</div></div>`:''}
        ${utilProyect!==null?`<div class="kpi"><div class="kpi-icon">${utilProyect>=0?'📈':'📉'}</div><div class="kpi-label">Utilidad proyectada al cierre</div><div class="kpi-val ${utilProyect>=0?'kpi-pos':'kpi-neg'}">${fm(utilProyect)}</div><div class="kpi-sub">ventas ya realizadas + stock</div></div>`:''}
      </div>`;

      // Desglose por alimento
      const productos = (S.catalogs && S.catalogs.productos) || [];
      const consumosTodos = egConsumos_(rid);
      const prodIds = [...new Set(consumosTodos.map(c => c.producto_id))];

      if (prodIds.length) {
        h += `<div class="section-label" style="margin-top:16px">Desglose por alimento — proyección al cierre</div>`;
        h += `<div class="tw"><table class="dt"><thead><tr>
          <th>Alimento</th>
          <th class="tc">Costo acumulado</th>
          <th class="tc">Cant. diaria (30d)</th>
          <th class="tc">Cant. proyectada</th>
          <th class="tc">Costo proyectado</th>
          <th class="tc">Total al cierre</th>
        </tr></thead><tbody>`;

        const stockNecesario = [];
        let totalAcum = 0, totalProyect = 0, totalCierre = 0;

        prodIds.forEach(pid => {
          // Saltar si producto marcado como inactivo para este corral a la fecha proyectada
          if (!egEsProductoActivo_(rid, pid, fSalida || hoy)) return;
          const prod = productos.find(p => String(p.producto_id) === String(pid));
          const costoUnit = egCostoPromProducto_(pid);
          // Acumulado
          const cantAcum = consumosTodos.filter(c => String(c.producto_id) === String(pid)).reduce((s,c) => s+(Number(c.cantidad)||0), 0);
          const costoAcum = cantAcum * costoUnit;
          // Diario últimos 30 días — solo desde fecha de baja hacia atrás si hay fecha
          const inactivoReg = egProductosInactivos_(rid).find(x => String(x.producto_id) === String(pid));
          const fechaBajaRef = inactivoReg?.fecha_baja || hoy;
          const cons30prod = cons30.filter(c => String(c.producto_id) === String(pid) && String(c.fecha) < fechaBajaRef);
          const cant30 = cons30prod.reduce((s,c) => s+(Number(c.cantidad)||0), 0);
          // Si no hay datos en 30 días, usar promedio histórico del producto
          let cantDiaria;
          if (cant30 > 0) {
            cantDiaria = cant30 / 30;
          } else if (fi) {
            const consumosAntsBaja = consumosTodos.filter(c => String(c.producto_id) === String(pid) && String(c.fecha) < fechaBajaRef);
            const cantAcumAnte = consumosAntsBaja.reduce((s,c) => s+(Number(c.cantidad)||0), 0);
            const diasTotales = Math.max(1, Math.round((new Date(hoy)-new Date(fi))/86400000));
            cantDiaria = cantAcumAnte / diasTotales;
          } else {
            cantDiaria = 0;
          }
          // Proyectado
          const cantProyect = Math.round(cantDiaria * diasHastaSalida);
          const costoP = Math.round(cantProyect * costoUnit);
          const total = costoAcum + costoP;

          totalAcum += costoAcum;
          totalProyect += costoP;
          totalCierre += total;

          if (cantProyect > 0) stockNecesario.push(`${fn(cantProyect)} ${prod?.unidad||''} de ${prod?.nombre||'Prod '+pid}`);

          h += `<tr>
            <td><span class="pill pill-green" style="font-size:11px">${prod?.nombre||'Producto '+pid}</span></td>
            <td class="tc">${fm(costoAcum)}</td>
            <td class="tc" style="color:var(--text2)">${fn(cantDiaria,1)} ${prod?.unidad||''}/día</td>
            <td class="tc" style="color:var(--gold-text);font-weight:600">${fn(cantProyect)} ${prod?.unidad||''}</td>
            <td class="tc" style="color:var(--gold-text);font-weight:600">${fm(costoP)}</td>
            <td class="tc"><strong>${fm(total)}</strong></td>
          </tr>`;
        });

        h += `<tr style="background:var(--bg2);font-weight:700">
          <td><strong>Total</strong></td>
          <td class="tc"><strong>${fm(totalAcum)}</strong></td>
          <td class="tc">—</td>
          <td class="tc">—</td>
          <td class="tc" style="color:var(--gold-text)"><strong>${fm(totalProyect)}</strong></td>
          <td class="tc"><strong>${fm(totalCierre)}</strong></td>
        </tr>`;
        h += '</tbody></table></div>';

        if (stockNecesario.length) {
          h += `<div style="background:var(--gold-bg);border-radius:8px;padding:10px 14px;font-size:12px;color:var(--gold-text);margin-top:8px">
            📦 <strong>Stock necesario para el cierre:</strong> ${stockNecesario.join(' · ')}
          </div>`;
        }
      }
    }
    h += '</div>';
  });

  // Resumen consolidado si hay más de un corral
  if (!rodeoId && lista.length > 1) {
    let totCaAcum=0, totCostoProyect=0, totCostoFinal=0, totIvProyect=0, totUtil=0, countUtil=0;
    // Mapa de insumos consolidado: pid -> { nombre, unidad, cantProyect, costoUnit }
    const insumosMap = {};
    const productos = (S.catalogs && S.catalogs.productos) || [];
    lista.forEach(r => {
      const rid = r.rodeo_id;
      const stk = egStock_(rid);
      const cfg = egConfig_(rid);
      const pesoObj = Number(cfg.pesoObjetivo||520);
      const pes = egPesadas_(rid);
      const ultima = pes.length ? pes[pes.length-1] : null;
      const gd = egGanDiaria_(rid);
      const kgActual = ultima ? Number(ultima.peso_prom_kg) : null;
      const fi2 = egFechaIngreso_(rid);
      let fSalida2 = null;
      if (kgActual && gd && gd>0 && kgActual<pesoObj) {
        const diasR = Math.ceil((pesoObj-kgActual)/gd);
        const d = new Date(ultima.fecha); d.setDate(d.getDate()+diasR);
        fSalida2 = d.toISOString().slice(0,10);
      }
      const diasHasta2 = fSalida2 ? Math.max(0,Math.round((new Date(fSalida2)-new Date(today()))/86400000)) : null;
      const caAcum2 = egCostoAlim_(rid);
      const cc2 = egCostoCompra_(rid);
      const todosC2 = egConsumos_(rid);
      const hace302 = new Date(today()); hace302.setDate(hace302.getDate()-30);
      const f302 = hace302.toISOString().slice(0,10);
      const cons302 = todosC2.filter(c=>c.fecha>=f302);
      const pesoUlt2 = ultima ? Number(ultima.peso_prom_kg)||0 : 0;
      const ivStk2 = valorizarRodeo_(r, stk, pesoObj>0?pesoObj:pesoUlt2);
      totCaAcum += caAcum2;

      // Calcular costoProyect2 sumando desde insumos (misma lógica que tabla → siempre coinciden)
      let costoProyect2 = null;
      if (diasHasta2 !== null && diasHasta2 > 0) {
        const prodIds2 = [...new Set(todosC2.map(c => c.producto_id))];
        let costoProyectCorral = 0;
        prodIds2.forEach(pid => {
          if (!egEsProductoActivo_(rid, pid, fSalida2 || today())) return;
          const prod = productos.find(p => String(p.producto_id) === String(pid));
          const costoUnit = egCostoPromProducto_(pid);
          const cantAcum2 = todosC2.filter(c => String(c.producto_id) === String(pid)).reduce((s,c) => s+(Number(c.cantidad)||0), 0);
          const cons30prod2 = cons302.filter(c => String(c.producto_id) === String(pid));
          const cant30p2 = cons30prod2.reduce((s,c) => s+(Number(c.cantidad)||0), 0);
          let cantDiaria2 = cant30p2 > 0 ? cant30p2/30 : (fi2 ? cantAcum2/Math.max(1,Math.round((new Date(today())-new Date(fi2))/86400000)) : 0);
          const cantProyect2 = Math.round(cantDiaria2 * diasHasta2);
          costoProyectCorral += cantProyect2 * costoUnit;
          if (cantProyect2 > 0) {
            const key = String(pid);
            if (!insumosMap[key]) insumosMap[key] = { nombre: prod?.nombre||'Producto '+pid, unidad: prod?.unidad||'', cantProyect: 0, costoUnit };
            insumosMap[key].cantProyect += cantProyect2;
          }
        });
        costoProyect2 = Math.round(costoProyectCorral);
      }
      if (costoProyect2!==null) totCostoProyect += costoProyect2;
      if (costoProyect2!==null) totCostoFinal += cc2 + caAcum2 + costoProyect2;
      totIvProyect += convertirAMoneda_(ivStk2, today(), S.engordeMoneda||'ARS');
      const util2 = egIngVentas_(rid) + convertirAMoneda_(ivStk2,today(),S.engordeMoneda||'ARS') - (cc2+caAcum2+(costoProyect2||0));
      totUtil += util2; countUtil++;
    });

    const mc = totUtil>=0?'var(--green)':'var(--red)';
    const mb = totUtil>=0?'var(--green-bg)':'rgba(220,50,50,0.08)';
    const insumosRows = Object.values(insumosMap).sort((a,b)=>b.cantProyect*b.costoUnit - a.cantProyect*a.costoUnit);
    let insumosHtml = '';
    if (insumosRows.length) {
      insumosHtml += `<div class="section-label" style="margin-top:16px;margin-bottom:8px">📦 Insumos necesarios para el cierre — todos los corrales</div>`;
      insumosHtml += `<div class="tw"><table class="dt"><thead><tr>
        <th>Producto</th>
        <th class="tc">Cantidad proyectada</th>
        <th class="tc">Costo unit. prom.</th>
        <th class="tc">Costo total</th>
      </tr></thead><tbody>`;
      let totCantCosto = 0;
      insumosRows.forEach(ins => {
        const costoTot = ins.cantProyect * ins.costoUnit;
        totCantCosto += costoTot;
        insumosHtml += `<tr>
          <td><span class="pill pill-green" style="font-size:11px">${ins.nombre}</span></td>
          <td class="tc" style="font-weight:700;font-size:14px;color:var(--gold)">${fn(ins.cantProyect)} ${ins.unidad}</td>
          <td class="tc" style="color:var(--text2)">${fm(ins.costoUnit)}/${ins.unidad}</td>
          <td class="tc"><strong>${fm(costoTot)}</strong></td>
        </tr>`;
      });
      insumosHtml += `<tr style="background:var(--bg2);font-weight:700">
        <td><strong>Total insumos</strong></td>
        <td class="tc">—</td>
        <td class="tc">—</td>
        <td class="tc"><strong>${fm(totCantCosto)}</strong></td>
      </tr>`;
      insumosHtml += '</tbody></table></div>';
    }

    h += `<div class="panel" style="border-top:2px solid var(--border2);margin-top:8px">
      <div class="panel-title">📊 Resumen consolidado — todos los corrales</div>
      <div style="display:flex;gap:10px;flex-wrap:wrap;margin-bottom:12px">
        <div style="background:var(--clay-bg);border-radius:8px;padding:10px 16px"><div style="font-size:10px;font-weight:700;text-transform:uppercase;color:var(--clay-text)">Alim. acumulada</div><div style="font-size:18px;font-weight:700;color:var(--clay)">${fm(totCaAcum)}</div></div>
        <div style="background:var(--gold-bg);border-radius:8px;padding:10px 16px"><div style="font-size:10px;font-weight:700;text-transform:uppercase;color:var(--gold-text)">Alim. proyectada</div><div style="font-size:18px;font-weight:700;color:var(--gold)">${fm(totCostoProyect)}</div></div>
        <div style="background:var(--bg2);border-radius:8px;padding:10px 16px"><div style="font-size:10px;font-weight:700;text-transform:uppercase;color:var(--text2)">Costo total al cierre</div><div style="font-size:18px;font-weight:700">${fm(totCostoFinal)}</div></div>
        <div style="background:var(--green-bg);border-radius:8px;padding:10px 16px"><div style="font-size:10px;font-weight:700;text-transform:uppercase;color:var(--green-text)">Stock valorizado proyectado</div><div style="font-size:18px;font-weight:700;color:var(--green)">${fm(totIvProyect)}</div></div>
      </div>
      <div style="background:${mb};border-radius:10px;padding:16px 20px;display:flex;justify-content:space-between;align-items:center;margin-bottom:${insumosRows.length?'16px':'0'}">
        <div style="font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:${mc}">Utilidad proyectada consolidada</div>
        <div style="font-size:28px;font-weight:800;color:${mc}">${totUtil>=0?'':'-'}${fm(Math.abs(totUtil))}</div>
      </div>
      ${insumosHtml}
    </div>`;
  }

  return h;
}

function buildEngordeHistorial_(rodeosEng, fm) {
  const lotes = egLotes_().sort((a, b) => String(b.fechaCierre).localeCompare(String(a.fechaCierre)));
  // Detectar corrales en 0 que no tienen lote cerrado hoy
  const cerrados = rodeosEng.filter(r => {
    const stk = egStock_(r.rodeo_id);
    const yaGuardado = lotes.some(l => l.rodeoId===String(r.rodeo_id) && l.fechaCierre===today());
    return stk===0 && egCantIngresada_(r.rodeo_id)>0 && !yaGuardado;
  });
  let h = '';
  cerrados.forEach(r => {
    h += `<div style="background:var(--blue-bg);border-radius:8px;padding:12px 16px;display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap;margin-bottom:12px">
      <div><div style="font-size:13px;font-weight:600;color:var(--blue-text)">${r.nombre} — lote completado</div>
      <div style="font-size:12px;color:var(--blue-text)">Stock en 0. Podés guardar este lote en el historial.</div></div>
      <button class="btn btn-primary" id="eg-cerrar-${r.rodeo_id}" data-rodeo="${r.rodeo_id}" style="font-size:12px;padding:6px 14px">📋 Guardar en historial</button>
    </div>`;
  });
  if (!lotes.length) {
    h += '<div class="empty-state"><span class="ico">📋</span><div class="msg">No hay lotes cerrados. Cuando un corral llegue a stock 0 podés guardarlo acá.</div></div>';
    return h;
  }
  h += '<div class="tw"><table class="dt"><thead><tr><th>Corral</th><th class="tc">Apertura</th><th class="tc">Cierre</th><th class="tc">Días</th><th class="tc">Animales</th><th class="tc">Kg ganados</th><th class="tc">GDP</th><th class="tc">Costo alim.</th><th class="tc">Ingreso</th><th class="tc">Utilidad</th><th></th></tr></thead><tbody>';
  lotes.forEach(l => {
    const dias = Math.round((new Date(l.fechaCierre)-new Date(l.fechaApertura))/86400000);
    const util = l.ingVentas - l.costoCompra - l.costoAlim;
    h += `<tr>
      <td><strong>${l.nombre}</strong></td>
      <td class="tc">${fd(l.fechaApertura)}</td>
      <td class="tc">${fd(l.fechaCierre)}</td>
      <td class="tc">${dias} días</td>
      <td class="tc">${fn(l.animales,0)} cab.</td>
      <td class="tc">${fn(l.kgGanados,0)} kg</td>
      <td class="tc">${l.ganDiaria?fn(l.ganDiaria,3)+' kg/día':'—'}</td>
      <td class="tc">${fm(l.costoAlim)}</td>
      <td class="tc">${fm(l.ingVentas)}</td>
      <td class="tc" style="font-weight:700;color:${util>=0?'var(--green-text)':'var(--clay-text)'}">${fm(util)}</td>
      <td><button class="btn-del" data-del-lote="${l.id}">🗑</button></td>
    </tr>`;
  });
  h += '</tbody></table></div>';
  if (lotes.length>1) {
    const promGD = lotes.filter(l=>l.ganDiaria).reduce((s,l)=>s+l.ganDiaria,0)/lotes.filter(l=>l.ganDiaria).length;
    const promUtil = lotes.reduce((s,l)=>s+(l.ingVentas-l.costoCompra-l.costoAlim),0)/lotes.length;
    h += `<div class="section-label" style="margin-top:16px">Promedios históricos (${lotes.length} lotes)</div>
    <div class="kpi-grid">
      <div class="kpi"><div class="kpi-icon">📈</div><div class="kpi-label">GDP prom.</div><div class="kpi-val">${fn(promGD,3)} kg/día</div></div>
      <div class="kpi"><div class="kpi-icon">${promUtil>=0?'📈':'📉'}</div><div class="kpi-label">Utilidad prom./lote</div><div class="kpi-val ${promUtil>=0?'kpi-pos':'kpi-neg'}">${fm(promUtil)}</div></div>
    </div>`;
  }
  return h;
}

window.egCambiarCorral = function(val) { S.engordeCorralId = val; render(); };
function attachEngordeEvents_old_() {
  // Pesada
  const peSave = document.getElementById('eg-pe-save');
  if (peSave) peSave.onclick = async () => {
    const fecha = document.getElementById('eg-pe-fecha').value;
    const rodeoId = document.getElementById('eg-pe-rodeo').value;
    const cantidad = Number(document.getElementById('eg-pe-cantidad').value)||0;
    const peso = Number(document.getElementById('eg-pe-peso').value)||0;
    if (!fecha||!rodeoId||!cantidad||!peso) { toast('Completá todos los campos.','err'); return; }
    const rodeo = rodeosTodos().find(r=>String(r.rodeo_id)===String(rodeoId));
    peSave.disabled = true;
    try {
      await apiCall('create', { body: { entity:'pesadas', data:{ fecha, rodeo_id:rodeoId, campo_id:rodeo?.campo_id||'', cantidad, peso_prom_kg:peso, observacion:document.getElementById('eg-pe-obs').value.trim() }}});
      invalidateCache('pesadas'); await loadEntity('pesadas',true);
      toast('Pesada registrada — '+fn(peso)+' kg prom.','ok'); render();
    } catch(err) { toast(err.message,'err'); } finally { peSave.disabled=false; }
  };

  // Config corral (Costos)
  const cfgSave = document.getElementById('eg-cfg-save');
  if (cfgSave) cfgSave.onclick = () => {
    const rid = cfgSave.dataset.rodeo;
    egSaveConfig_(rid, {
      kgIngreso: document.getElementById('eg-cfg-kg')?.value||'',
      precioCompra: document.getElementById('eg-cfg-precio')?.value||'',
      precioStock: document.getElementById('eg-cfg-stock')?.value||'',
    });
    toast('Configuración guardada','ok'); render();
  };

  // Proyección — guardar peso objetivo y precio
  document.querySelectorAll('[id^="eg-proj-save-"]').forEach(btn => {
    btn.onclick = () => {
      const rid = btn.dataset.rodeo;
      egSaveConfig_(rid, {
        pesoObjetivo: document.getElementById('eg-proj-peso-'+rid)?.value||'',
        precioProyectado: document.getElementById('eg-proj-precio-'+rid)?.value||'',
      });
      toast('Guardado','ok'); render();
    };
  });

  // Cerrar lote (historial)
  document.querySelectorAll('[id^="eg-cerrar-"]').forEach(btn => {
    btn.onclick = () => {
      const rid = btn.dataset.rodeo;
      const r = rodeosTodos().find(x=>String(x.rodeo_id)===String(rid));
      if (!r) return;
      const fi = egFechaIngreso_(rid);
      const pes = egPesadas_(rid);
      const kgG = egKgGanadosHastaPesada_(rid);
      const gd = egGanDiaria_(rid);
      const lote = {
        id: Date.now().toString(36), rodeoId: String(rid), nombre: r.nombre,
        fechaApertura: fi||today(), fechaCierre: today(),
        animales: egCantIngresada_(rid), kgGanados: kgG, ganDiaria: gd,
        costoAlim: egCostoAlim_(rid), costoCompra: egCostoCompra_(rid),
        ingVentas: egIngVentas_(rid),
      };
      const lotes = egLotes_(); lotes.push(lote); egSaveLotes_(lotes);
      toast('Lote guardado en historial','ok'); render();
    };
  });

  // Eliminar lote
  document.querySelectorAll('[data-del-lote]').forEach(btn => {
    btn.onclick = () => {
      const id = btn.dataset.delLote;
      if (!confirm('¿Eliminar este lote del historial?')) return;
      const lotes = egLotes_().filter(l=>l.id!==id); egSaveLotes_(lotes);
      toast('Lote eliminado','ok'); render();
    };
  });

  attachTableDeleteEvents('pesadas','pesada_id');
}

function actividadDeRodeo_(rodeoId) {

}

    ], 'ventas', 'venta_id', { ocultarBotones: true });
  }

  // Historial liquidadas
  h += `<div class="section-label">Historial de ventas</div>`;
  h += buildEntityTable(liquidadas, [
    { key: 'fecha_salida', label: 'Fecha', render: v => fd(v) },
    { key: 'campana', label: 'Campaña', render: v => v ? `<span class="pill pill-gold">${v}</span>` : '—' },
    { key: 'rodeo_id', label: 'Rodeo', render: v => `${rodeoNombre(v)} <span class="pill pill-gold" style="font-size:10px">${actividadDeRodeo_(v)}</span>` },
    { key: 'comprador', label: 'Comprador', render: v => v || '—' },
    { key: 'cant_animales', label: 'Cant.', render: v => fn(v) },
    { key: 'peso_campo_kg', label: 'Kg campo', render: v => v ? fn(v) : '—' },
    { key: 'kg_liquidados', label: 'Kg liq.', render: v => v ? fn(v) : '—' },
    { key: 'precio_liq', label: '$/kg liq.', render: v => v ? fn(v) : '—' },
    { key: 'importe_liq', label: 'Importe', render: v => v ? '$ ' + fn(v) : '—' },
  ], 'ventas', 'venta_id');

  // Modal de liquidación (oculto)
  h += `<div id="modal-liquidacion" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.45);z-index:1000;align-items:center;justify-content:center">
    <div style="background:var(--bg);border-radius:12px;padding:24px;max-width:520px;width:90%;box-shadow:0 8px 32px rgba(0,0,0,0.3)">
      <div style="font-weight:700;font-size:16px;margin-bottom:16px">💰 Completar liquidación</div>
      <div class="fgrid">
        <div class="fg"><label>Tipo</label>
          <select id="liq-tipo">
            <option value="frigorifico">Frigorífico (con rinde)</option>
            <option value="en_pie">En pie / directa</option>
          </select>
        </div>
        <div class="fg"><label>Kg liquidados</label><input type="number" id="liq-kg" placeholder="Ej: 16800" min="0" oninput="calcLiqPreview_()"></div>
        <div class="fg" id="liq-rinde-wrap"><label>Rinde %</label><input type="number" id="liq-rinde" placeholder="Ej: 56" min="0" max="100" step="0.1"></div>
        <div class="fg"><label>Precio $/kg liquidado</label><input type="number" id="liq-precio" placeholder="Ej: 4800" min="0" oninput="calcLiqPreview_()"></div>
        <div class="fg"><label>Importe total $</label><input type="number" id="liq-importe" placeholder="Se calcula solo"></div>
      </div>
      <div id="liq-preview" style="font-size:14px;font-weight:600;color:var(--green-text);margin:8px 0"></div>
      <div style="display:flex;gap:8px;justify-content:flex-end;margin-top:16px">
        <button class="btn btn-secondary" onclick="cerrarLiquidacion_()">Cancelar</button>
        <button class="btn btn-primary" id="liq-save">✓ Guardar liquidación</button>
      </div>
    </div>
  </div>`;

  return h;
}

function attachVentasEvents() {
  window.actualizarImporteVenta_ = function() {
    const peso = Number(document.getElementById('ve-peso')?.value) || 0;
    const precio = Number(document.getElementById('ve-precio')?.value) || 0;
    const wrap = document.getElementById('ve-importe-preview');
    const val = document.getElementById('ve-importe-val');
    if (!wrap || !val) return;
    if (peso && precio) { wrap.style.display = 'flex'; val.textContent = '$ ' + fn(peso * precio); }
    else wrap.style.display = 'none';
  };

  window.abrirLiquidacion_ = function(id) {
    S._liquidandoId = id;
    const modal = document.getElementById('modal-liquidacion');
    if (modal) modal.style.display = 'flex';
    document.getElementById('liq-tipo').onchange = () => {
      const esFrigo = document.getElementById('liq-tipo').value === 'frigorifico';
      document.getElementById('liq-rinde-wrap').style.display = esFrigo ? 'flex' : 'none';
    };
    calcLiqPreview_();
    document.getElementById('liq-save').onclick = guardarLiquidacion_;
  };

  window.cerrarLiquidacion_ = function() {
    const modal = document.getElementById('modal-liquidacion');
    if (modal) modal.style.display = 'none';
    S._liquidandoId = null;
  };

  window.calcLiqPreview_ = function() {
    const kg = Number(document.getElementById('liq-kg')?.value) || 0;
    const precio = Number(document.getElementById('liq-precio')?.value) || 0;
    const prev = document.getElementById('liq-preview');
    const impEl = document.getElementById('liq-importe');
    if (kg && precio) {
      const imp = Math.round(kg * precio);
      if (impEl && !impEl.value) impEl.value = imp;
      if (prev) prev.textContent = fn(kg) + ' kg × $ ' + fn(precio) + '/kg = $ ' + fn(imp);
    }
  };

  window.guardarLiquidacion_ = async function() {
    const id = S._liquidandoId;
    if (!id) return;
    const tipo = document.getElementById('liq-tipo').value;
    const kg = Number(document.getElementById('liq-kg').value) || 0;
    const rinde = Number(document.getElementById('liq-rinde')?.value) || 0;
    const precio = Number(document.getElementById('liq-precio').value) || 0;
    const importe = Number(document.getElementById('liq-importe').value) || (kg * precio);
    if (!kg || !precio) { toast('Completá kg y precio de liquidación.', 'err'); return; }
    const venta = (S.cache.ventas || []).find(v => String(v.venta_id) === String(id));
    if (!venta) { toast('Venta no encontrada.', 'err'); return; }
    const data = { ...venta, tipo_liquidacion: tipo, kg_liquidados: kg, rinde_pct: rinde, precio_liq: precio, importe_liq: importe, estado: 'liquidado' };
    try {
      document.getElementById('liq-save').disabled = true;
      await apiCall('update', { body: { entity: 'ventas', id, data } });
      invalidateCache('ventas'); S.margenBruto = null;
      await loadEntity('ventas', true);
      cerrarLiquidacion_();
      toast('Liquidación registrada — $ ' + fn(importe), 'ok');
      render();
    } catch (err) { toast(err.message, 'err'); document.getElementById('liq-save').disabled = false; }
  };

  const save = document.getElementById('ve-save');
  if (save) save.onclick = async () => {
    const peso = Number(document.getElementById('ve-peso').value) || '';
    const precio = Number(document.getElementById('ve-precio').value) || '';
    const data = {
      fecha_salida: document.getElementById('ve-fecha').value,
      rodeo_id: document.getElementById('ve-rodeo').value,
      campo_id: document.getElementById('ve-campo').value,
      comprador: document.getElementById('ve-comprador').value.trim(),
      tipo_venta: 'Venta real',
      cant_animales: Number(document.getElementById('ve-cantidad').value) || 0,
      peso_campo_kg: peso,
      precio_pactado: precio,
      observaciones: document.getElementById('ve-obs').value.trim(),
      campana: document.getElementById('ve-campana')?.value.trim() || '',
    };
    if (!data.fecha_salida || !data.rodeo_id || !data.cant_animales) { toast('Completá fecha, rodeo y cantidad.', 'err'); return; }
    if (!data.campana) { toast('Completá la campaña antes de registrar.', 'err'); return; }
    save.disabled = true;
    try {
      await apiCall('create', { body: { entity: 'ventas', data } });
      invalidateCache('ventas');
      S.stock = null; S.dashboard = null; S.margenBruto = null;
      toast('Venta registrada — ' + data.cant_animales + ' animales', 'ok');
      await loadEntity('ventas', true);
      render();
    } catch (err) { toast(err.message, 'err'); } finally { save.disabled = false; }
  };
  attachTableDeleteEvents('ventas', 'venta_id');
}

function productoOptionsHtml(productosList) {
  if (!productosList.length) return '<option value="">Sin productos cargados — creá uno con "+ nuevo producto"</option>';
  return productosList.map(p => `<option value="${p.producto_id}">${p.nombre} (${p.unidad || 'sin unidad'})</option>`).join('');

  return '<option value="">Todos los productos</option>' + productosList.map(p => `<option value="${p.producto_id}">${p.nombre}</option>`).join('');
}

function buildInsumosHistorial_(compras, consumos, productoFiltro, categoriaFiltro, desde, hasta) {
  const productosMap = {};
  ((S.catalogs && S.catalogs.productos) || []).forEach(p => { productosMap[p.producto_id] = p; });

  let comprasF = compras || [];
  let consumosF = consumos || [];
  if (productoFiltro) {
    comprasF = comprasF.filter(c => String(c.producto_id) === String(productoFiltro));
    consumosF = consumosF.filter(c => String(c.producto_id) === String(productoFiltro));
  }
  if (categoriaFiltro) {
    comprasF = comprasF.filter(c => (productosMap[c.producto_id] || {}).categoria === categoriaFiltro);
    consumosF = consumosF.filter(c => (productosMap[c.producto_id] || {}).categoria === categoriaFiltro);
  }
  if (desde) { comprasF = comprasF.filter(c => String(c.fecha || '') >= desde); consumosF = consumosF.filter(c => String(c.fecha || '') >= desde); }
  if (hasta) { comprasF = comprasF.filter(c => String(c.fecha || '') <= hasta); consumosF = consumosF.filter(c => String(c.fecha || '') <= hasta); }

  let filas = [
    ...comprasF.map(c => {
      const p = productosMap[c.producto_id] || {};
      const detalle = [c.costo_total ? 'Costo: ' + fn(c.costo_total) : '', c.proveedor ? 'Prov: ' + c.proveedor : '', c.observaciones || ''].filter(Boolean).join(' — ') || '—';
      return {
        fecha: c.fecha || '', tipoLabel: 'Compra', tipoClass: 'pill-green',
        producto: p.nombre || '(producto eliminado)', campo: '—', rodeo: '—',
        cantidad: Number(c.cantidad) || 0, unidad: p.unidad || '', detalle,
        entity: 'compras_insumos', idCol: 'compra_id', id: c.compra_id,
      };
    }),
    ...consumosF.map(c => {
      const p = productosMap[c.producto_id] || {};
      const detalle = (c.campana ? '<span class="pill pill-gold" style="margin-right:6px">' + c.campana + '</span>' : '') + (c.observaciones || (c.campana ? '' : '—'));
      return {
        fecha: c.fecha || '', tipoLabel: 'Consumo', tipoClass: 'pill-clay',
        producto: p.nombre || '(producto eliminado)',
        campo: c.campo_id ? campoNombre(c.campo_id) : '—', rodeo: c.rodeo_id ? rodeoNombre(c.rodeo_id) : '—',
        cantidad: Number(c.cantidad) || 0, unidad: p.unidad || '', detalle: detalle || '—',
        entity: 'consumos_insumos', idCol: 'consumo_id', id: c.consumo_id,
      };
    }),
  ];

  if (!filas.length) {
    return '<div class="empty-state"><span class="ico">◌</span><div class="msg">Todavía no hay registros. Cargá el primero arriba.</div></div>';
  }

  if (!S.sort) S.sort = {};
  const sortState = S.sort.historialInsumos || { key: 'fecha', dir: 'desc' };
  filas = [...filas].sort((a, b) => {
    let va = a[sortState.key], vb = b[sortState.key];
    if (va == null) va = ''; if (vb == null) vb = '';
    const na = Number(va), nb = Number(vb);
    const numeric = va !== '' && vb !== '' && !isNaN(na) && !isNaN(nb);
    const cmp = numeric ? (na - nb) : String(va).localeCompare(String(vb), 'es', { sensitivity: 'base' });
    return sortState.dir === 'asc' ? cmp : -cmp;
  });

  const cols = [
    { key: 'fecha', label: 'Fecha' }, { key: 'tipoLabel', label: 'Tipo' }, { key: 'producto', label: 'Producto' },
    { key: 'campo', label: 'Campo' }, { key: 'rodeo', label: 'Rodeo' }, { key: 'cantidad', label: 'Cantidad' }, { key: 'detalle', label: 'Detalle' },
  ];
  let h = `<div class="section-label">Historial <span class="count-badge" style="margin-left:6px">${filas.length}</span></div>
  <div class="tw"><table class="dt"><thead><tr>`;
  cols.forEach(c => {
    const activo = sortState.key === c.key;
    const flecha = activo ? (sortState.dir === 'asc' ? ' ▲' : ' ▼') : '';
    h += `<th class="sortable-th" onclick="sortHistorialInsumos('${c.key}')" style="cursor:pointer;user-select:none" title="Ordenar por ${c.label}">${c.label}${flecha}</th>`;
  });

  filas.forEach(f => {
    h += `<tr>
      <td>${fd(f.fecha)}</td>
      <td><span class="pill ${f.tipoClass}">${f.tipoLabel}</span></td>
      <td>${f.producto}</td>

      </div></td>

  });
  h += '</tbody></table></div>';
  return h;
}

function buildStockSeleccionado_(productoFiltro, campoFiltro) {
  if (!productoFiltro) return '';
  const row = (S.stockProductos || []).find(p => String(p.producto_id) === String(productoFiltro));
  if (!row) return '';
  const colores = row.categoria === 'Veterinaria' ? ['var(--blue-bg)', 'var(--blue-text)']
    : row.categoria === 'Reproducción' ? ['var(--gold-bg)', 'var(--gold-text)']
    : ['var(--green-bg)', 'var(--green-text)'];
  let stockLabel;
  if (esPorCampo_(row.por_campo)) {
    if (campoFiltro && row.stock_por_campo) {
      const cant = row.stock_por_campo[campoFiltro] || 0;
      stockLabel = `${fn(cant)} ${row.unidad || ''} en ${campoNombre(campoFiltro)}`;
    } else {
      // Mostrar todos los campos
      const partes = Object.entries(row.stock_por_campo || {}).map(([cid, cant]) => `${campoNombre(cid)}: ${fn(cant)}`).join(' · ');
      stockLabel = (partes || '0') + ' ' + (row.unidad || '');
    }
  } else {
    stockLabel = `${fn(row.stock)} ${row.unidad || ''}`;
  }
  return `<div style="background:${colores[0]};color:${colores[1]};border-radius:9px;padding:10px 16px;font-size:16px;font-weight:700;display:inline-block;margin-bottom:12px">Stock actual de ${row.nombre}: ${stockLabel}</div>`;
}
function buildInsumosKardex_(compras, consumos, productoId, desde, hasta, campoFiltro) {
  const p = ((S.catalogs && S.catalogs.productos) || []).find(x => String(x.producto_id) === String(productoId));
  if (!p) return '';
  const porCampo = esPorCampo_(p.por_campo);

  let comprasP = (compras || []).filter(c => String(c.producto_id) === String(productoId));
  let consumosP = (consumos || []).filter(c => String(c.producto_id) === String(productoId));

  // Si el producto es por campo y hay filtro de campo, restringir ambas listas
  if (porCampo && campoFiltro) {
    comprasP = comprasP.filter(c => String(c.campo_id) === String(campoFiltro));
    consumosP = consumosP.filter(c => String(c.campo_id) === String(campoFiltro));
  }

  // Saldo inicial: resultado de todo lo anterior a la fecha "Desde" (si no hay fecha "Desde", arranca en 0 desde el principio de todo)
  let saldoInicial = 0;
  if (desde) {
    comprasP.forEach(c => { if (String(c.fecha || '') < desde) saldoInicial += Number(c.cantidad) || 0; });
    consumosP.forEach(c => { if (String(c.fecha || '') < desde) saldoInicial -= Number(c.cantidad) || 0; });
  }

  let movs = [
    ...comprasP.map(c => ({
      fecha: c.fecha || '', tipoLabel: 'Compra', tipoClass: 'pill-green', entrada: Number(c.cantidad) || 0, salida: 0,
      detalle: [c.costo_total ? 'Costo: ' + fn(c.costo_total) : '', c.proveedor ? 'Prov: ' + c.proveedor : '', c.observaciones || ''].filter(Boolean).join(' — ') || '—',
      entity: 'compras_insumos', idCol: 'compra_id', id: c.compra_id,
    })),
    ...consumosP.map(c => ({
      fecha: c.fecha || '', tipoLabel: 'Consumo', tipoClass: 'pill-clay', entrada: 0, salida: Number(c.cantidad) || 0,
      detalle: [c.campo_id ? campoNombre(c.campo_id) : '', c.rodeo_id ? rodeoNombre(c.rodeo_id) : '', c.observaciones || ''].filter(Boolean).join(' — ') || '—',
      entity: 'consumos_insumos', idCol: 'consumo_id', id: c.consumo_id,
    })),
  ];
  if (desde) movs = movs.filter(m => String(m.fecha) >= desde);
  if (hasta) movs = movs.filter(m => String(m.fecha) <= hasta);
  movs.sort((a, b) => String(a.fecha).localeCompare(String(b.fecha))); // ascendente: el saldo corrido solo tiene sentido en orden cronológico

  let saldo = saldoInicial;
  const filas = movs.map(m => { saldo += m.entrada - m.salida; return { ...m, saldoCorrido: saldo }; });
  const saldoFinal = saldo;

  let h = `<div style="background:var(--bg2);border:1px solid var(--border);border-radius:9px;padding:10px 16px;font-size:14px;font-weight:600;margin-bottom:10px">
    Saldo inicial${desde ? ' al ' + fd(desde) : ''}: <strong>${fn(saldoInicial)} ${p.unidad || ''}</strong>
  </div>`;

  if (!filas.length) {
    h += '<div class="empty-state"><span class="ico">◌</span><div class="msg">No hay movimientos de este producto en el rango elegido.</div></div>';
    return h;
  }

  h += `<div class="tw"><table class="dt"><thead><tr>
    <th>Fecha</th><th>Tipo</th><th>Detalle</th><th class="tc">Entrada</th><th class="tc">Salida</th><th class="tc">Saldo</th><th></th>
  </tr></thead><tbody>`;
  filas.forEach(f => {
    h += `<tr>
      <td>${fd(f.fecha)}</td>
      <td><span class="pill ${f.tipoClass}">${f.tipoLabel}</span></td>
      <td>${f.detalle}</td>
      <td class="tc">${f.entrada ? fn(f.entrada) : '—'}</td>
      <td class="tc">${f.salida ? fn(f.salida) : '—'}</td>
      <td class="tc"><strong>${fn(f.saldoCorrido)}</strong></td>
      <td><div class="row-actions">
        <button class="icon-btn" data-edit="${f.id}" data-entity="${f.entity}" data-idcol="${f.idCol}" title="Editar">✎</button>
        <button class="icon-btn danger" data-del="${f.id}" data-entity="${f.entity}" data-idcol="${f.idCol}" title="Eliminar">✕</button>
      </div></td>
    </tr>`;
  });
  h += `</tbody></table></div>
  <div style="background:var(--bg2);border:1px solid var(--border);border-radius:9px;padding:10px 16px;font-size:14px;font-weight:600;margin-top:10px">
    Saldo final${hasta ? ' al ' + fd(hasta) : ''}: <strong>${fn(saldoFinal)} ${p.unidad || ''}</strong>
  </div>`;
  return h;
}

function periodoPreset_(preset) {
  const hoy = new Date();
  const y = hoy.getFullYear();
  const pad = n => String(n).padStart(2, '0');
  if (preset === 'mes') {
    return { desde: `${y}-${pad(hoy.getMonth() + 1)}-01`, hasta: today() };
  }
  if (preset === 'anio_pasado') {
    return { desde: `${y - 1}-01-01`, hasta: `${y - 1}-12-31` };
  }
  // 'anio' (default)
  return { desde: `${y}-01-01`, hasta: today() };
}

async function calcularMargenBruto_() {
  const { desde, hasta } = S.margenBrutoPeriodo;

}

// Convierte ventas e insumos a dólares usando la cotización BNA vigente en la fecha de CADA línea
// (la cesión por destete ya viene resuelta en dólares desde el backend, con el precio interno guardado en su momento).
function vistaUsdMargenBruto_(mb) {
  let ventasUsd = 0, ventasSinCotizacion = 0;
  const detalleVentas = (mb.ingresos.detalle_ventas || []).map(v => {
    const tc = tipoCambioVigente_(v.fecha);
    const importeUsd = tc ? v.importe / Number(tc.valor) : null;
    const precioUsd = tc && v.cant_animales ? v.precio_pactado / Number(tc.valor) : null;
    if (importeUsd == null) ventasSinCotizacion++; else ventasUsd += importeUsd;
    return Object.assign({}, v, { importe_usd: importeUsd, precio_pactado_usd: precioUsd });
  });

  let cesionUsd = 0;
  (mb.ingresos.detalle_destetes || []).forEach(d => { cesionUsd += d.valor_usd || 0; });

  let insumosUsd = 0, consumosSinCotizacion = 0;
  const porProductoUsd = {};
  (mb.egresos.detalle_consumos || []).forEach(c => {
    const tc = tipoCambioVigente_(c.fecha);
    if (tc) {
      const usd = c.costo_ars / Number(tc.valor);
      insumosUsd += usd;
      porProductoUsd[c.producto] = (porProductoUsd[c.producto] || 0) + usd;
    } else {
      consumosSinCotizacion++;
    }
  });

  const totalIngresosUsd = ventasUsd + cesionUsd;
  return {
    ventas: ventasUsd, ventasSinCotizacion,
    cesion: cesionUsd,
    total: totalIngresosUsd,
    insumos: insumosUsd, consumosSinCotizacion,
    detalle_por_producto: Object.keys(porProductoUsd).map(n => ({ producto: n, costo: porProductoUsd[n] })).sort((a, b) => b.costo - a.costo),
    detalle_ventas: detalleVentas,
    resultado: totalIngresosUsd - insumosUsd,
  };
}

function calcMargenCria_(campana, desde, hasta) {
  const movs      = S.cache.movimientos || [];
  const ventas    = S.cache.ventas || [];
  const consumos  = S.cache.consumos_insumos || [];
  const comprasH  = comprasHacGetAll_();
  const productos = (S.catalogs && S.catalogs.productos) || [];
  const rodeosAll = (S.catalogs && S.catalogs.rodeos) || [];
  const rodeosCria = rodeosAll.filter(r => r.actividad === 'Cría');
  const rodeosIds  = new Set(rodeosCria.map(r => String(r.rodeo_id)));
  const prodPorId  = Object.fromEntries(productos.map(p => [String(p.producto_id), p]));

  // Ventas del período
  const ventasFilt = ventas.filter(v =>
    rodeosIds.has(String(v.rodeo_id)) &&
    (!desde || String(v.fecha_salida) >= desde) &&
    (!hasta || String(v.fecha_salida) <= hasta)
  );
  const ingVentas = ventasFilt.reduce((s,v) =>
    s + (Number(v.importe_liq)||(Number(v.precio_pactado)*(Number(v.peso_campo_kg)||Number(v.cant_animales)))||0), 0);

  // Cesiones a Recría (traslados de Cría a Recría con precio/kg)
  const rodeosPorId = Object.fromEntries(rodeosAll.map(r=>[String(r.rodeo_id),r]));
  const cesiones = movs.filter(m => {
    if (m.tipo!=='Traslado en bloque'&&m.tipo!=='Traslado individual') return false;
    const or = rodeosPorId[String(m.rodeo_origen_id)];
    const de = rodeosPorId[String(m.rodeo_destino_id)];
    return or&&(or.actividad==='Cría'||or.actividad==='Cria')&&de&&de.actividad==='Recría' &&
      (!desde||String(m.fecha)>=desde) && (!hasta||String(m.fecha)<=hasta);
  });
  const pesadas = S.cache.pesadas||[];
  let ingCesiones = 0;
  cesiones.forEach(m => {
    const cant = Number(m.cantidad)||0;
    const precioKg = Number(m.precio_cabeza)||0;
    const pesoR = pesadas.filter(p=>String(p.rodeo_id)===String(m.rodeo_origen_id)).sort((a,b)=>String(b.fecha).localeCompare(String(a.fecha)));
    const peso = Number(m.peso_prom_kg)||Number(pesoR[0]?.peso_prom_kg)||0;
    ingCesiones += cant * peso * precioKg;
  });

  // EF — stock valorizado actual
  const stockTodos = S.stock || [];
  let ef = 0;
  rodeosCria.forEach(r => {
    const stk = stockTodos.find(s => String(s.rodeo_id) === String(r.rodeo_id));
    if (stk && stk.stock > 0) ef += valorizarRodeo_(r, stk.stock, 0);
  });

  const ing = ingVentas + ingCesiones + ef;

  // EI — saldos iniciales
  const ei = movs
    .filter(m => m.tipo==='Saldo inicial' && rodeosIds.has(String(m.rodeo_destino_id)))
    .reduce((s,m) => s+(Number(m.cantidad)||0)*(Number(m.precio_cabeza)||0), 0);

  // Compras campaña
  const compras = comprasH
    .filter(c => (!campana||c.campana===campana) &&
      (!desde||String(c.fecha)>=desde) && (!hasta||String(c.fecha)<=hasta))
    .reduce((s,c) => s+(Number(c.importe_total)||0), 0);

  // Consumos campaña
  const consumosFilt = consumos.filter(c =>
    rodeosIds.has(String(c.rodeo_id)) && (!campana||c.campana===campana)
  );
  let egAlim=0, egVet=0;
  consumosFilt.forEach(c => {
    const prod = prodPorId[String(c.producto_id)];
    const costo = (Number(c.cantidad)||0)*egCostoPromProducto_(c.producto_id);
    if (prod&&prod.categoria==='Veterinaria') egVet+=costo; else egAlim+=costo;
  });

  const egSueldos = sueldoTotalActividad_('cria');
  const eg = ei + compras + egAlim + egVet + egSueldos;
  const margen = ing - eg;

  return { ing, eg, margen, detalle: { ingVentas, ingCesiones, ef, ei, compras, egAlim, egVet, egSueldos, cantVentas: ventasFilt.length } };
}

function calcMargenRecria_(campana, desde, hasta) {
  const rodeosAll  = (S.catalogs&&S.catalogs.rodeos)||[];
  const rodeosRec  = (S.resumenRecria&&S.resumenRecria.rodeos)||[];
  const rodeosIds  = new Set(rodeosRec.map(r=>String(r.rodeo_id)));
  const productos  = (S.catalogs&&S.catalogs.productos)||[];
  const movs       = S.cache.movimientos||[];
  const ventas     = (S.cache.ventas||[]).filter(v=>rodeosIds.has(String(v.rodeo_id))&&(!desde||String(v.fecha_salida)>=desde)&&(!hasta||String(v.fecha_salida)<=hasta));
  const egresos    = (S.cache.egresos_recria||[]).filter(e=>rodeosIds.has(String(e.rodeo_id))&&e.destino==='Engorde'&&(!desde||String(e.fecha)>=desde)&&(!hasta||String(e.fecha)<=hasta));
  const consumos   = (S.cache.consumos_insumos||[]).filter(c=>rodeosIds.has(String(c.rodeo_id))&&(!campana||c.campana===campana));

  let ingVentas=0;
  ventas.forEach(v=>{ ingVentas+=Number(v.importe_liq)||(Number(v.precio_pactado)*(Number(v.peso_campo_kg)||Number(v.cant_animales)))||0; });

  // Cesiones a Terminación con precio $/kg
  let ingCesEng=0;
  egresos.forEach(e=>{
    const cant=Number(e.cant_animales)||0, peso=Number(e.peso_prom_kg)||0, precio=Number(e.precio_kg_cesion)||0;
    ingCesEng += cant*peso*precio;
  });

  // EF valorizado
  let ef=0;
  rodeosRec.forEach(r=>{ const stk=Math.max(0,r.stock||0); if(!stk)return; const pp=r.ultima_pesada?Number(r.ultima_pesada.peso_prom_kg)||0:0; ef+=valorizarRodeo_(rodeosAll.find(x=>String(x.rodeo_id)===String(r.rodeo_id))||{},stk,pp); });

  const ing = ingVentas + ingCesEng + ef;

  // EI — saldos iniciales de recría
  const ei = movs.filter(m=>m.tipo==='Saldo inicial'&&rodeosIds.has(String(m.rodeo_destino_id))).reduce((s,m)=>s+(Number(m.cantidad)||0)*(Number(m.precio_cabeza)||0),0);

  // Cesión recibida desde Cría (traslados con precio/kg)
  const rodeosPorId = Object.fromEntries(rodeosAll.map(r=>[String(r.rodeo_id),r]));
  const pesadas = S.cache.pesadas||[];
  let egCesionCria=0;
  movs.filter(m=>{
    if(m.tipo!=='Traslado en bloque'&&m.tipo!=='Traslado individual') return false;
    const or=rodeosPorId[String(m.rodeo_origen_id)];
    const de=rodeosPorId[String(m.rodeo_destino_id)];
    return or&&(or.actividad==='Cría'||or.actividad==='Cria')&&de&&de.actividad==='Recría'&&
      (!desde||String(m.fecha)>=desde)&&(!hasta||String(m.fecha)<=hasta);
  }).forEach(m=>{
    const cant=Number(m.cantidad)||0, precioKg=Number(m.precio_cabeza)||0;
    const pesoR=pesadas.filter(p=>String(p.rodeo_id)===String(m.rodeo_origen_id)).sort((a,b)=>String(b.fecha).localeCompare(String(a.fecha)));
    const peso=Number(m.peso_prom_kg)||Number(pesoR[0]?.peso_prom_kg)||0;
    egCesionCria+=cant*peso*precioKg;
  });

  let egCompraExt=0;
  movs.filter(m=>rodeosIds.has(String(m.rodeo_destino_id))&&m.tipo!=='Saldo inicial'&&m.tipo!=='Traslado en bloque'&&m.tipo!=='Traslado individual'&&(!desde||String(m.fecha)>=desde)&&(!hasta||String(m.fecha)<=hasta))
    .forEach(m=>{ egCompraExt+=(Number(m.cantidad)||0)*(Number(m.precio_cabeza)||0); });

  let egAlim=0, egVet=0;
  consumos.forEach(c=>{ const prod=productos.find(p=>String(p.producto_id)===String(c.producto_id)); const costo=(Number(c.cantidad)||0)*egCostoPromProducto_(c.producto_id); if(prod&&prod.categoria==='Veterinaria') egVet+=costo; else egAlim+=costo; });

  const egSueldos=sueldoTotalActividad_('recria');
  const eg=ei+egCesionCria+egCompraExt+egAlim+egVet+egSueldos;
  return { ing, eg, margen: ing-eg, detalle: { ingVentas, ingCesEng, ef, ei, egCesionCria, egCompraExt, egAlim, egVet, egSueldos } };
}

function calcMargenTerminacion_(campana, desde, hasta) {
  const rodeosEng = ((S.catalogs&&S.catalogs.rodeos)||[]).filter(r=>r.actividad==='Engorde'&&(r.activo===true||String(r.activo).toUpperCase()==='TRUE'));
  const rodeosIds = new Set(rodeosEng.map(r=>String(r.rodeo_id)));
  const movs      = S.cache.movimientos||[];
  const productos = (S.catalogs&&S.catalogs.productos)||[];
  const stockList = S.stock||[];
  const pesadas   = S.cache.pesadas||[];

  // Ventas con fallback precio_pactado
  let ingVentas=0;
  (S.cache.ventas||[]).filter(v=>rodeosIds.has(String(v.rodeo_id))).forEach(v=>{
    ingVentas+=Number(v.importe_liq)||(Number(v.precio_pactado)*(Number(v.peso_campo_kg)||Number(v.cant_animales)))||0;
  });

  // EF — valorizado igual que el dashboard individual (con peso de última pesada)
  let ef=0;
  rodeosEng.forEach(r=>{
    const stk = stockList.find(s=>String(s.rodeo_id)===String(r.rodeo_id));
    if (!stk||stk.stock<=0) return;
    const pesR = pesadas.filter(p=>String(p.rodeo_id)===String(r.rodeo_id)).sort((a,b)=>String(b.fecha).localeCompare(String(a.fecha)));
    const pesoP = pesR[0] ? Number(pesR[0].peso_prom_kg)||0 : 0;
    ef += valorizarRodeo_(r, stk.stock, pesoP);
  });

  const ing=ingVentas+ef;

  // EI — saldos iniciales × precio/cabeza
  const ei=movs.filter(m=>m.tipo==='Saldo inicial'&&rodeosIds.has(String(m.rodeo_destino_id)))
    .reduce((s,m)=>s+(Number(m.cantidad)||0)*(Number(m.precio_cabeza)||0),0);

  // Cesión recibida desde Recría
  let egCesionRec=0;
  (S.cache.egresos_recria||[]).filter(e=>e.destino==='Engorde'&&(!desde||String(e.fecha)>=desde)&&(!hasta||String(e.fecha)<=hasta)).forEach(e=>{
    egCesionRec+=(Number(e.cant_animales)||0)*(Number(e.peso_prom_kg)||0)*(Number(e.precio_kg_cesion)||0);
  });

  // Compras de hacienda — filtradas por campaña o fecha (excluyendo saldos iniciales)
  const comprasH = comprasHacGetAll_().filter(c =>
    rodeosIds.has(String(c.rodeo_id||'')) ||
    rodeosEng.some(r=>String(r.campo_id)===String(c.campo_id))
  );
  let egCompra = comprasH
    .filter(c=>(!campana||c.campana===campana)&&(!desde||String(c.fecha)>=desde)&&(!hasta||String(c.fecha)<=hasta))
    .reduce((s,c)=>s+(Number(c.importe_total)||0),0);
  // Si no hay compras con campaña, usar egCostoCompra_ (histórico) excluyendo EI
  if (egCompra===0) {
    rodeosEng.forEach(r=>{ egCompra+=egCostoCompra_(r.rodeo_id); });
    egCompra = Math.max(0, egCompra - ei); // evitar duplicar EI
  }

  // Consumos — sin filtro de campaña si no tienen campaña cargada
  const consumos = (S.cache.consumos_insumos||[]).filter(c=>
    rodeosIds.has(String(c.rodeo_id)) &&
    (!campana || !c.campana || c.campana===campana) // incluir consumos sin campaña
  );
  let egAlim=0, egVet=0;
  consumos.forEach(c=>{
    const prod=productos.find(p=>String(p.producto_id)===String(c.producto_id));
    const costo=(Number(c.cantidad)||0)*egCostoPromProducto_(c.producto_id);
    if(prod&&prod.categoria==='Veterinaria') egVet+=costo; else egAlim+=costo;
  });

  const egSueldos=sueldoTotalActividad_('engorde');
  const eg=ei+egCesionRec+egCompra+egAlim+egVet+egSueldos;
  return { ing, eg, margen: ing-eg, detalle: { ingVentas, ef, ei, egCesionRec, egCompra, egAlim, egVet, egSueldos } };
}

          ${mortCria>0?`<tr><td>🐄 Cría</td><td class="tc" style="color:var(--red);font-weight:700">${mortCria} animales</td></tr>`:''}
          ${mortRec>0?`<tr><td>🌱 Recría</td><td class="tc" style="color:var(--red);font-weight:700">${mortRec} animales</td></tr>`:''}
          ${mortEng>0?`<tr><td>🏭 Terminación</td><td class="tc" style="color:var(--red);font-weight:700">${mortEng} animales</td></tr>`:''}
          <tr style="background:rgba(200,50,50,0.1)"><td><strong>Total</strong></td><td class="tc" style="color:var(--red);font-weight:800;font-size:16px">${mortTot}</td></tr>
        </tbody></table></div>
        <div style="font-size:12px;color:var(--red);margin-top:8px">⚠ La mortandad no se contabiliza como egreso — su impacto está en el menor stock valorizado.</div>
      </div>`;
    }
  }

  if (tabMB === 'productivo') {
    const stockTodos = S.stock||[];
    function stockPorAct(actividad) {
      const rods = rodeosAll.filter(r=>r.actividad===actividad);
      const cats = {};
      rods.forEach(r=>{ const stk=stockTodos.find(s=>String(s.rodeo_id)===String(r.rodeo_id)); const cant=stk?stk.stock||0:0; if(cant===0)return; cats[r.categoria]=(cats[r.categoria]||0)+cant; });
      return cats;
    }
    function bloqueStock(titulo, cats) {
      const tot=Object.values(cats).reduce((s,v)=>s+v,0);
      let b=`<div><div style="font-weight:700;font-size:12px;text-transform:uppercase;color:var(--text2);margin-bottom:8px">${titulo}</div>`;
      Object.entries(cats).forEach(([cat,cant])=>{ b+=`<div style="display:flex;justify-content:space-between;padding:4px 0;border-bottom:1px solid var(--border)"><span style="color:var(--text2);font-size:13px">${cat}</span><strong>${fn(cant)}</strong></div>`; });
      b+=`<div style="display:flex;justify-content:space-between;padding:6px 0;margin-top:4px"><span style="font-weight:700">Total</span><strong style="font-size:16px;color:var(--gold-text)">${fn(tot)}</strong></div></div>`;
      return b;
    }

    h += `<div class="panel"><div class="panel-title">📦 Stock actual por actividad y categoría</div>
      <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:16px">
        ${bloqueStock('🐄 Cría', stockPorAct('Cría'))}
        ${bloqueStock('🌱 Recría', stockPorAct('Recría'))}
        ${bloqueStock('🏭 Terminación', stockPorAct('Engorde'))}
      </div></div>`;

    const rents = [
      { n:'🐄 Cría', mar:rCria.margen, eg:rCria.eg, stock:Object.values(stockPorAct('Cría')).reduce((s,v)=>s+v,0) },
      { n:'🌱 Recría', mar:rRec.margen, eg:rRec.eg, stock:Object.values(stockPorAct('Recría')).reduce((s,v)=>s+v,0) },
      { n:'🏭 Terminación', mar:rEng.margen, eg:rEng.eg, stock:Object.values(stockPorAct('Engorde')).reduce((s,v)=>s+v,0) },
    ].sort((a,b)=>b.mar-a.mar);

    h += `<div class="panel"><div class="panel-title">🏆 Ranking de rentabilidad</div>
      <div class="tw"><table class="dt"><thead><tr>
        <th>#</th><th>Actividad</th><th class="tc">Margen total</th><th class="tc">Margen/cabeza</th><th class="tc">ROI</th>
      </tr></thead><tbody>`;
    rents.forEach((a,i)=>{
      const marCab=a.stock>0?a.mar/a.stock:null, roi=a.eg>0?(a.mar/a.eg*100):null, cm=a.mar>=0?'var(--green)':'var(--red)';
      h+=`<tr><td style="font-size:20px">${['🥇','🥈','🥉'][i]}</td><td><strong>${a.n}</strong></td>
        <td class="tc" style="color:${cm};font-weight:700">${a.mar>=0?'':'-'}${fmMB(Math.abs(a.mar))}</td>
        <td class="tc">${marCab!==null?`<span style="color:${cm};font-weight:600">${a.mar>=0?'':'-'}${fmMB(Math.abs(marCab))}/cab</span>`:'—'}</td>
        <td class="tc">${roi!==null?`<span class="pill ${roi>=0?'pill-green':'pill-red'}">${roi.toFixed(1)}%</span>`:'—'}</td></tr>`;
    });
    const mejor=rents[0], peor=rents[rents.length-1];
    h+=`</tbody></table><div style="margin-top:12px;padding:12px;background:var(--bg2);border-radius:8px;font-size:13px;line-height:1.6">
      <strong>Análisis:</strong> La actividad más rentable fue <strong>${mejor.n}</strong> con ${fmMB(mejor.mar)}.
      ${peor.mar<0?`<strong>${peor.n}</strong> tuvo resultado negativo de ${fmMB(Math.abs(peor.mar))}.`:'Las tres actividades tuvieron resultado positivo.'}
      ${marTotal>=0?`Margen ganadero total positivo: <strong>${fmMB(marTotal)}</strong>.`:`Margen ganadero total negativo: <strong>-${fmMB(Math.abs(marTotal))}</strong>.`}
    </div></div>`;

    if (mortTot>0) {
      h+=`<div class="panel" style="border:2px solid var(--red);background:rgba(200,50,50,0.05)">
        <div class="panel-title" style="color:var(--red)">💀 Resumen de mortandad</div>
        <div class="tw"><table class="dt"><tbody>
          ${mortCria>0?`<tr><td>🐄 Cría</td><td class="tc" style="color:var(--red);font-weight:700">${mortCria} cabezas</td></tr>`:''}
          ${mortRec>0?`<tr><td>🌱 Recría</td><td class="tc" style="color:var(--red);font-weight:700">${mortRec} cabezas</td></tr>`:''}
          ${mortEng>0?`<tr><td>🏭 Terminación</td><td class="tc" style="color:var(--red);font-weight:700">${mortEng} cabezas</td></tr>`:''}
          <tr style="background:rgba(200,50,50,0.12)"><td><strong>Total</strong></td><td class="tc" style="color:var(--red);font-weight:800;font-size:18px">${mortTot} cabezas</td></tr>
        </tbody></table></div>
      </div>`;
    }

    // Índices reproductivos — de S.dashboard (datos del GS)
    const kpi = S.dashboard && S.dashboard.general;
    if (kpi) {
      function pctMB(v) { return v!==null&&v!==undefined ? `<strong>${v}%</strong>` : '<span style="color:var(--muted)">—</span>'; }
      h += `<div class="panel">
        <div class="panel-title">🐄 Índices reproductivos</div>
        <div class="tw"><table class="dt"><thead><tr>
          <th>Índice</th><th class="tc">Valor</th>
        </tr></thead><tbody>
          <tr><td>Preñez general</td><td class="tc">${pctMB(kpi.servicio?.indice_prenez)}</td></tr>
          <tr><td>Preñez IATF</td><td class="tc">${pctMB(kpi.servicio?.indice_prenez_iatf)}</td></tr>
          <tr><td>Preñez toro</td><td class="tc">${pctMB(kpi.servicio?.indice_prenez_toro)}</td></tr>
          <tr><td>Parición</td><td class="tc">${pctMB(kpi.paricion?.indice_paricion)}</td></tr>
          <tr><td>Destete</td><td class="tc">${pctMB(kpi.destete?.indice_destete)}</td></tr>
        </tbody></table></div>
        <div style="display:flex;gap:10px;flex-wrap:wrap;margin-top:12px">
          <div style="background:var(--bg2);border-radius:8px;padding:10px 16px;text-align:center">
            <div style="font-size:11px;color:var(--text2);text-transform:uppercase;margin-bottom:4px">Nacidos vivos</div>
            <div style="font-size:20px;font-weight:800">${fn(kpi.paricion?.nacidos_vivos||0)}</div>
          </div>
          <div style="background:var(--bg2);border-radius:8px;padding:10px 16px;text-align:center">
            <div style="font-size:11px;color:var(--text2);text-transform:uppercase;margin-bottom:4px">Destetados</div>
            <div style="font-size:20px;font-weight:800">${fn(kpi.destete?.total_destetados||0)}</div>
          </div>
          <div style="background:var(--bg2);border-radius:8px;padding:10px 16px;text-align:center">
            <div style="font-size:11px;color:var(--text2);text-transform:uppercase;margin-bottom:4px">Mort. terneros</div>
            <div style="font-size:20px;font-weight:800;color:${(kpi.destete?.mortandad_terneros||0)>0?'var(--red)':'inherit'}">${fn(kpi.destete?.mortandad_terneros||0)}</div>
          </div>
        </div>
      </div>`;
    }
  }

  return h;
}

function actualizarPreviewUsd_() {
  const preview = document.getElementById('pi-usd-preview');
  if (!preview) return;
  const fecha = document.getElementById('pi-fecha').value;
  const ars = Number(document.getElementById('pi-ars').value) || 0;
  if (!fecha || !ars) { preview.textContent = '—'; preview.style.color = 'var(--text2)'; return; }
  const tc = tipoCambioVigente_(fecha);
  if (!tc) {
    preview.textContent = 'Sin cotización en Corrales para esa fecha';
    preview.style.color = 'var(--clay-text)';
    return;
  }
  const usd = ars / Number(tc.valor);
  preview.innerHTML = `U$D ${fn(usd, 2)} <span style="font-size:11px;font-weight:400;color:var(--text3)">(cotización $${fn(tc.valor)} del ${fd(tc.fecha)})</span>`;
  preview.style.color = 'var(--text)';
}

function attachMargenBrutoEvents() {
  const save = document.getElementById('pi-save');
  if (save) save.onclick = async () => {
    const fecha = document.getElementById('pi-fecha').value;
    const ars = Number(document.getElementById('pi-ars').value) || 0;
    if (!fecha || !ars) { toast('Completá la fecha y el precio en pesos.', 'err'); return; }
    const tc = tipoCambioVigente_(fecha);
    let usd = '';
    if (tc) {
      usd = Math.round((ars / Number(tc.valor)) * 100) / 100;
    } else {
      toast('No hay cotización de dólar cargada en Corrales para esa fecha — se guarda solo en pesos.', 'err');
    }
    const data = {
      fecha_desde: fecha, precio_ars_kg: ars, precio_usd_kg: usd,
      observacion: document.getElementById('pi-obs').value.trim(),
    };
    save.disabled = true;
    try {
      await apiCall('create', { body: { entity: 'precios_internos', data } });
      invalidateCache('precios_internos');
      toast('Precio interno guardado', 'ok');
      await loadEntity('precios_internos', true);
      S.margenBruto = null;
      render();
    } catch (err) { toast(err.message, 'err'); } finally { save.disabled = false; }
  };
  attachTableDeleteEvents('precios_internos', 'precio_id');

  const presetSel = document.getElementById('mb-preset');
  if (presetSel) {
    const customMode = S.margenBrutoPeriodo && S.margenBrutoPeriodo.custom;
    presetSel.value = customMode ? 'custom' : (S.margenBrutoPeriodoPreset || 'anio');
    const toggleCustom = () => {
      const isCustom = presetSel.value === 'custom';
      document.getElementById('mb-desde-wrap').style.display = isCustom ? '' : 'none';
      document.getElementById('mb-hasta-wrap').style.display = isCustom ? '' : 'none';
    };
    toggleCustom();
    presetSel.onchange = toggleCustom;
  }
  const calcBtn = document.getElementById('mb-calcular');
  if (calcBtn) calcBtn.onclick = async () => {
    const preset = document.getElementById('mb-preset').value;
    if (preset === 'custom') {
      const desde = document.getElementById('mb-desde').value;
      const hasta = document.getElementById('mb-hasta').value;
      if (!desde || !hasta) { toast('Completá desde y hasta.', 'err'); return; }
      S.margenBrutoPeriodo = { desde, hasta, custom: true };
      S.margenBrutoPeriodoPreset = 'custom';
    } else {
      S.margenBrutoPeriodo = periodoPreset_(preset);
      S.margenBrutoPeriodoPreset = preset;
    }
    calcBtn.disabled = true;
    try { await calcularMargenBruto_(); render(); }
    catch (err) { toast(err.message, 'err'); }
    finally { calcBtn.disabled = false; }
  };

  document.querySelectorAll('#mb-moneda-group .radio-pill').forEach(p => p.onclick = () => {
    S.margenBrutoMoneda = p.dataset.moneda;
    render();
  });
}
