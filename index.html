<!DOCTYPE html>
<html lang="es"><head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Agroganadera Los Médanos — Sistema de Gestión</title>
<style>
:root {
  /* ── NUEVA PALETA DE MARCA ─────────────────────── */
  --bg: #F7F3E8; --bg2: #F0EAD8; --bg3: #3a5020;
  --text: #4A2E1A; --text2: #7a5c3a; --text3: #a8896a;
  --border: rgba(74,46,26,0.12); --border2: rgba(74,46,26,0.22);
  --green: #3F5A2A; --green-dark: #2d4020; --green-bg: #eaf0e2; --green-text: #2d4020;
  --clay: #D46A33; --clay-dark: #b5561f; --clay-bg: #f6ede4; --clay-text: #b5561f;
  --gold: #6A7F3F; --gold-dark: #4e6030; --gold-bg: #eaf0e2; --gold-text: #4e6030;
  --bordeaux: #631627; --bordeaux-dark: #4a1020;
  --sidebar-bg: #3a5020;
  --red: #8b1a1a; --blue: #1a3a8b; --blue-bg: #e8edf8; --blue-text: #1a3a8b;
  --navy: #1a2a5e; --navy-bg: #e8ecf6;
  --serif: 'Aptos', 'Calibri', 'Segoe UI', -apple-system, sans-serif;
  --sans: 'Aptos', 'Calibri', 'Segoe UI', -apple-system, sans-serif;
  --bg: #F7F3E8; --bg2: #F0EAD8; --bg3: #3a5020;
  --text: #4A2E1A; --text2: #7a5c3a; --text3: #a8896a;
  --border: rgba(74,46,26,0.12); --border2: rgba(74,46,26,0.22);
  --green: #3F5A2A; --green-dark: #2d4020; --green-bg: #eaf0e2; --green-text: #2d4020;
  --clay: #D46A33; --clay-dark: #b5561f; --clay-bg: #f6ede4; --clay-text: #b5561f;
  --gold: #6A7F3F; --gold-dark: #4e6030; --gold-bg: #eaf0e2; --gold-text: #4e6030;
  --bordeaux: #631627; --bordeaux-dark: #4a1020;
  --sidebar-bg: #3a5020;
  --radius: 10px; --radius-lg: 18px;
  --serif: 'Aptos', 'Calibri', 'Segoe UI', -apple-system, sans-serif;
  --sans: 'Aptos', 'Calibri', 'Segoe UI', -apple-system, sans-serif;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: var(--sans); background: var(--bg3); color: var(--text);
  min-height: 100vh; display: flex; align-items: center; justify-content: center;
  padding: 40px 20px;
}
.shell { max-width: 940px; width: 100%; }

.hero { text-align: center; margin-bottom: 56px; }
.hero-icon {
  width: 56px; height: 56px; margin: 0 auto 18px; border-radius: 14px;
  background: var(--green-dark); color: #fff; font-size: 26px;
  display: flex; align-items: center; justify-content: center;
}
.farm-name { font-family: var(--serif); font-size: 34px; font-weight: 700; letter-spacing: -0.5px; }
.subtitle { color: var(--text2); font-size: 14.5px; margin-top: 8px; }

.cycle { position: relative; display: flex; gap: 22px; align-items: stretch; max-width: 310px; margin: 0 auto; }
.cycle::before {
  content: ''; position: absolute; top: 34px; left: 64px; right: 64px; height: 0;
  border-top: 2px dashed var(--border2); z-index: 0;
}
.stage {
  position: relative; z-index: 1; flex: 1;
  background: var(--bg); border: 1px solid var(--border); border-radius: var(--radius-lg);
  padding: 20px 18px 18px; text-align: center; text-decoration: none; color: inherit;
  display: flex; flex-direction: column; align-items: center;
  opacity: 0; transform: translateY(10px);
  animation: rise .5s ease forwards;
  transition: transform .18s ease, box-shadow .18s ease, border-color .18s ease;
}
.stage:nth-child(1) { animation-delay: .05s; }
.stage:nth-child(3) { animation-delay: .15s; }
.stage:nth-child(5) { animation-delay: .25s; }
@keyframes rise { to { opacity: 1; transform: translateY(0); } }
@media (prefers-reduced-motion: reduce) {
  .stage { animation: none; opacity: 1; transform: none; }
}

a.stage:hover { transform: translateY(-4px); box-shadow: 0 10px 24px rgba(74,46,26,0.12); }
.s-cria { border-top: 3px solid var(--green); }
.s-engorde { border-top: 3px solid var(--gold); }
.s-recria { border-top: 3px solid var(--clay); }
a.stage:focus-visible { outline: 2px solid var(--green); outline-offset: 2px; }

.stage-icon {
  width: 58px; height: 58px; border-radius: 50%; background: var(--bg);
  display: flex; align-items: center; justify-content: center; font-size: 25px;
  margin-bottom: 11px; border: 3px solid var(--border2);
}
.s-cria .stage-icon { border-color: var(--green); background: var(--green-bg); }
.s-recria .stage-icon { border-color: var(--clay); background: var(--clay-bg); }
.s-engorde .stage-icon { border-color: var(--gold); background: var(--green-bg); }

.stage-age { font-size: 9px; text-transform: uppercase; letter-spacing: .05em; color: var(--text2); font-weight: 700; margin-bottom: 6px; }
.stage-name { font-family: var(--serif); font-size: 19px; font-weight: 700; color: var(--text); }
.stage-desc { font-size: 12px; color: var(--text2); line-height: 1.5; margin: 8px 0 14px; min-height: 34px; }

.stage-cta {
  font-size: 11px; font-weight: 600; padding: 5px 12px; border-radius: 20px;
  display: inline-flex; align-items: center; gap: 4px; margin-top: auto;
}
.s-cria .stage-cta { background: var(--bordeaux); color: #fff; }
.s-engorde .stage-cta { background: var(--bordeaux); color: #fff; }
a.stage:hover .stage-cta { filter: brightness(1.08); }

.s-recria { opacity: .62; cursor: default; }
.s-recria .stage-cta { background: var(--clay-bg); color: var(--clay-text); gap: 6px; }

.arrow { align-self: center; color: var(--text3); font-size: 18px; margin-top: 30px; z-index: 1; }

footer { text-align: center; margin-top: 44px; font-size: 11.5px; letter-spacing: .04em; color: var(--text3); }

@media (max-width: 720px) {
  .cycle { flex-direction: column; }
  .cycle::before { display: none; }
  .arrow { transform: rotate(90deg); margin: -4px 0; }
  .farm-name { font-size: 27px; }
}

/* ── LOGIN ──────────────────────────────────────────────────────── */
.login-overlay {
  position: fixed; inset: 0; background: var(--bg3);
  display: flex; align-items: center; justify-content: center;
  z-index: 9999; font-family: var(--sans);
}
.login-box {
  background: var(--bg); border: 1px solid var(--border2);
  border-radius: 18px; padding: 40px 36px; width: 100%; max-width: 380px;
  box-shadow: 0 8px 32px rgba(43,38,31,0.10);
}
.login-icon { font-size: 32px; margin-bottom: 10px; }
.login-title { font-family: var(--serif); font-size: 22px; font-weight: 700; margin-bottom: 4px; }
.login-sub { font-size: 13px; color: var(--text2); margin-bottom: 28px; }
.login-field { margin-bottom: 14px; }
.login-field label { display: block; font-size: 12px; font-weight: 600; color: var(--text2); margin-bottom: 5px; }
.login-field input {
  width: 100%; padding: 10px 13px; border: 1px solid var(--border2);
  border-radius: 9px; font-size: 14px; font-family: var(--sans);
  background: var(--bg2); color: var(--text); outline: none;
  transition: border-color .15s;
}
.login-field input:focus { border-color: var(--green); background: var(--bg); }
.login-btn {
  width: 100%; padding: 11px; background: var(--bordeaux); color: #fff;
  border: none; border-radius: 9px; font-size: 14px; font-weight: 700;
  font-family: var(--sans); cursor: pointer; margin-top: 6px;
  transition: background .15s;
}
.login-btn:hover { background: var(--bordeaux-dark); }
.login-btn:disabled { opacity: .6; cursor: default; }
.login-error { font-size: 12.5px; color: #b3261e; margin-top: 10px; text-align: center; min-height: 18px; }
.login-user-badge {
  display: inline-flex; align-items: center; gap: 6px;
  font-size: 12px; color: #a39a89; padding: 4px 10px;
  border: 1px solid rgba(255,255,255,0.2); border-radius: 20px;
  cursor: pointer; transition: all .15s; margin-top: 10px;
}
.login-user-badge:hover { color: #fff; border-color: rgba(255,255,255,0.5); }
</style>
</head>
<body>
<div class="shell" id="main-shell" style="display:none">

  <div class="hero">
    <img src="https://agroganaderalosmedanos.github.io/isologo.png" style="width:130px;display:block;margin:0 auto 14px">
    <div style="text-align:center;margin-bottom:6px">
      <div style="font-size:12px;font-weight:600;color:rgba(255,255,255,0.6);letter-spacing:.12em;text-transform:uppercase;margin-bottom:4px">Agroganadera</div>
      <div style="font-family:var(--serif);font-size:36px;font-weight:700;color:#fff;line-height:1.1;letter-spacing:-.5px">Los Médanos</div>
    </div>
    <p class="subtitle" style="text-align:center;font-size:13px;color:rgba(255,255,255,0.5);margin-top:8px">Sistema de gestión del ciclo completo</p>
  </div>

  <div class="cycle">
    <a class="stage s-cria" href="https://agroganaderalosmedanos.github.io/cria/">
      <div class="stage-icon">🐮</div>
      <div class="stage-age">Ciclo completo</div>
      <div class="stage-name">Gestión Ganadera</div>
      <p class="stage-desc">Cría, recría, engorde, insumos, ventas y rentabilidad.</p>
      <span class="stage-cta">Entrar →</span>
    </a>

    <!-- Recría y Engorde ocultos temporalmente — no eliminar -->
    <!--
    <div class="arrow">→</div>

    <div class="stage s-recria">
      <div class="stage-icon">🐂</div>
      <div class="stage-age">8 – 12 meses</div>
      <div class="stage-name">Recría</div>
      <p class="stage-desc">Seguimiento desde el destete hasta el ingreso a corral.</p>
      <span class="stage-cta">🔒 Próximamente</span>
    </div>

    <div class="arrow">→</div>

    <a class="stage s-engorde" href="https://agroganaderalosmedanos.github.io/corrales/">
      <div class="stage-icon">🌽</div>
      <div class="stage-age">12+ meses</div>
      <div class="stage-name">Engorde</div>
      <p class="stage-desc">Corrales, pesadas, alimentación, ventas y rentabilidad.</p>
      <span class="stage-cta">Entrar →</span>
    </a>
    -->
  </div>

  <footer>El Cencerro · El Misterio · El Clavo Chico</footer>

</div>

<script>

const LOGIN_API_URL = 'https://script.google.com/macros/s/AKfycbz-ahGdifI9FykD0r6hz47fjPZ6H5TwKWMOsCfW5f_M41oXneTffMk7CKz0svOgezSD_w/exec';
const LOGIN_TOKEN   = 'LosMedanos2026Cria';

function loginGetSession() {
  try { return JSON.parse(localStorage.getItem('lm_session') || 'null'); } catch(e) { return null; }
}
function loginSetSession(data) { localStorage.setItem('lm_session', JSON.stringify(data)); }
function loginClear() { localStorage.removeItem('lm_session'); location.reload(); }

function loginRequired(onSuccess) {
  const session = loginGetSession();
  if (session) { onSuccess(session); return; }
  showLoginScreen(onSuccess);
}

function showLoginScreen(onSuccess) {
  const overlay = document.createElement('div');
  overlay.className = 'login-overlay';
  overlay.innerHTML = `
    <div class="login-box">
      <div class="login-icon">🐄</div>
      <div class="login-title">Agroganadera Los Médanos</div>
      <div class="login-sub">Ingresá tus credenciales para continuar</div>
      <div class="login-field"><label>Usuario</label>
        <input type="text" id="li-user" placeholder="tu usuario" autocomplete="username">
      </div>
      <div class="login-field"><label>Contraseña</label>
        <input type="password" id="li-pass" placeholder="••••••••" autocomplete="current-password">
      </div>
      <button class="login-btn" id="li-btn">Ingresar</button>
      <div class="login-error" id="li-err"></div>
    </div>`;
  document.body.appendChild(overlay);
  const btn = document.getElementById('li-btn');
  const userEl = document.getElementById('li-user');
  const passEl = document.getElementById('li-pass');
  const errEl  = document.getElementById('li-err');
  async function doLogin() {
    const usuario = userEl.value.trim();
    const password = passEl.value;
    if (!usuario || !password) { errEl.textContent = 'Completá usuario y contraseña.'; return; }
    btn.disabled = true; btn.textContent = 'Verificando…'; errEl.textContent = '';
    try {
      const url = LOGIN_API_URL + '?action=login&token=' + encodeURIComponent(LOGIN_TOKEN);
      const res = await fetch(url, { method: 'POST',
        headers: { 'Content-Type': 'text/plain;charset=utf-8' },
        body: JSON.stringify({ usuario, password }) });
      const json = await res.json();
      if (!json.ok) throw new Error(json.error || 'Error al conectar');
      loginSetSession(json.data);
      overlay.remove();
      onSuccess(json.data);
    } catch(err) {
      errEl.textContent = err.message;
      btn.disabled = false; btn.textContent = 'Ingresar';
    }
  }
  btn.onclick = doLogin;
  passEl.onkeydown = e => { if (e.key === 'Enter') doLogin(); };
  userEl.onkeydown = e => { if (e.key === 'Enter') passEl.focus(); };
  setTimeout(() => userEl.focus(), 100);
}
window.addEventListener('DOMContentLoaded', () => {
  loginRequired(session => {
    window.__lmSession = session;
    const shell = document.getElementById('main-shell');
    if (shell) shell.style.display = '';
    // Badge de usuario en el footer
    const footer = document.querySelector('footer');
    if (footer && !footer.querySelector('.login-user-badge')) {
      footer.insertAdjacentHTML('beforeend',
        '<div style="margin-top:10px"><span class="login-user-badge" onclick="loginClear()">👤 ' + session.nombre + ' &nbsp;·&nbsp; Cerrar sesión</span></div>');
    }
  });
});
</script>
</body>
</html>
