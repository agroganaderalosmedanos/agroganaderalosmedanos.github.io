<!DOCTYPE html>
<html lang="es"><head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cría — Agroganadera Los Médanos</title>
<style>
:root {
  --bg: #F7F3E8; --bg2: #F0EAD8; --bg3: #E8DCC2;
  --text: #4A2E1A; --text2: #7a5c3a; --text3: #a8896a;
  --border: rgba(74,46,26,0.12); --border2: rgba(74,46,26,0.22);
  --green: #3F5A2A; --green-dark: #2d4020; --green-bg: #eaf0e2; --green-text: #2d4020;
  --clay: #D46A33; --clay-dark: #b5561f; --clay-bg: #f6ede4; --clay-text: #b5561f;
  --gold: #6A7F3F; --gold-dark: #4e6030; --gold-bg: #eaf0e2; --gold-text: #4e6030;
  --bordeaux: #631627; --bordeaux-dark: #4a1020;
  --sidebar-bg: #3a5020;
  --red: #8b1a1a; --blue: #1a3a8b; --blue-bg: #e8edf8; --blue-text: #1a3a8b;
  --navy: #1a2a5e; --navy-bg: #e8ecf6;
  --serif: 'Aptos', 'Calibri', 'Segoe UI', -apple-system, sans-serif;
  --sans: 'Aptos', 'Calibri', 'Segoe UI', -apple-system, sans-serif;
  --bg: #faf8f4; --bg2: #f3efe6; --bg3: #ece5d6;
  --text: #2b261f; --text2: #6b6357; --text3: #a39a89;
  --border: rgba(43,38,31,0.1); --border2: rgba(43,38,31,0.18);
  --green: #2f6b3f; --green-dark: #1f4d2b; --green-bg: #e6efe3; --green-text: #1f4d2b;
  --clay: #a8512f; --clay-bg: #f6e8e0; --clay-text: #7a3a20;
  --gold: #b8860b; --gold-bg: #f5edd8; --gold-text: #8a6508;
  --red: #b3261e; --red-bg: #fbeae8; --red-text: #8c1d17;
  --radius: 10px; --radius-lg: 16px;
  --shadow: 0 1px 3px rgba(43,38,31,0.08), 0 1px 2px rgba(43,38,31,0.06);
  --shadow-md: 0 4px 12px rgba(43,38,31,0.08);
  --serif: 'Aptos', 'Calibri', 'Segoe UI', -apple-system, sans-serif;
  --sans: 'Aptos', 'Calibri', 'Segoe UI', -apple-system, sans-serif;
  --mono: 'IBM Plex Mono', 'SF Mono', monospace;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { background: var(--bg); color: var(--text); font-family: var(--sans); font-size: 14px; line-height: 1.5; -webkit-font-smoothing: antialiased; }
body { min-height: 100vh; }
::selection { background: var(--gold-bg); }

#root { min-height: 100vh; }
.app-shell { display: flex; min-height: 100vh; }

.sidebar {
  width: 240px; flex-shrink: 0; background: var(--sidebar-bg); color: #e8e4dc;
  display: flex; flex-direction: column; position: sticky; top: 0; height: 100vh;
}
.sidebar-brand { padding: 22px 20px 18px; border-bottom: 1px solid rgba(255,255,255,0.08); }
.sidebar-brand .farm-icon { font-size: 22px; margin-bottom: 6px; display: block; }
.sidebar-brand .farm-name { font-family: var(--serif); font-size: 17px; font-weight: 600; color: #fff; letter-spacing: -0.01em; line-height: 1.25; }
.sidebar-brand .farm-sub { font-size: 11px; color: #a39a89; margin-top: 2px; }
.btn-inicio-sidebar { display: inline-block; margin-top: 14px; font-size: 13px; font-weight: 700; color: #fff; text-decoration: none; background: var(--bordeaux); border: none; border-radius: 20px; padding: 8px 18px; transition: all .15s; letter-spacing: .01em; }
.btn-inicio-sidebar:hover { background: var(--bordeaux-dark); }
.btn-logout-sidebar { display: block; margin-top: 8px; font-size: 12px; font-weight: 600; color: #a39a89; text-decoration: none; border: none; background: none; cursor: pointer; font-family: inherit; padding: 0; transition: color .15s; }
.btn-logout-sidebar:hover { color: #fff; }

.sidebar-nav { flex: 1; padding: 14px 10px; overflow-y: auto; }
.nav-section-btn { display:flex;align-items:center;gap:9px;width:100%;padding:9px 14px;background:none;border:none;cursor:pointer;color:#d4b65f;font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;text-align:left;border-top:1px solid rgba(212,182,95,.2);margin-top:6px; }
.nav-section-btn:first-child { border-top:none;margin-top:0; }
.nav-section-btn:hover { background:rgba(255,255,255,.06);color:#e8cc7a; }
.nav-section-btn.active-sec { color:#f0d878; }
.nav-section-btn i:first-child { font-size:15px;width:18px;text-align:center;flex-shrink:0; }
.nav-item {
  display: flex; align-items: center; gap: 10px; padding: 9px 10px; border-radius: 8px;
  color: #cfc9bd; font-size: 13.5px; font-weight: 500; cursor: pointer; transition: background 0.15s, color 0.15s;
  margin-bottom: 1px; border: none; background: none; width: 100%; text-align: left;
}
.nav-item:hover { background: rgba(255,255,255,0.06); color: #fff; }
.nav-item.active { background: var(--bordeaux); color: #fff; }
.nav-item .nav-icon { font-size: 15px; width: 18px; text-align: center; flex-shrink: 0; display:inline-flex;align-items:center;justify-content:center; }

.sidebar-footer { padding: 12px 16px; border-top: 1px solid rgba(255,255,255,0.08); font-size: 11px; color: #8a8174; }
.sidebar-footer .sync-dot { display: inline-block; width: 6px; height: 6px; border-radius: 50%; margin-right: 5px; }
.sync-dot.ok { background: #5fb87a; } .sync-dot.bad { background: #d97757; } .sync-dot.busy { background: #d4b65f; animation: pulse 1.2s infinite; }
@keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.4; } }

.main { flex: 1; min-width: 0; }
.topbar {
  display: flex; align-items: center; justify-content: space-between; padding: 16px 28px;
  border-bottom: 1px solid var(--border); background: var(--bg); position: sticky; top: 0; z-index: 5;
}
.topbar h1 { font-family: var(--serif); font-size: 21px; font-weight: 600; letter-spacing: -0.01em; }
.topbar .topbar-sub { font-size: 12.5px; color: var(--text2); margin-top: 1px; }
.content { padding: 24px 28px 60px; max-width: 1280px; }

.btn {
  display: inline-flex; align-items: center; gap: 6px; padding: 8px 16px; border-radius: 8px;
  font-size: 13px; font-weight: 600; border: 1px solid transparent; cursor: pointer; transition: all 0.15s;
  font-family: var(--sans); white-space: nowrap;
}
.btn-primary { background: var(--green); color: #fff; }
.btn-primary:hover { background: var(--green-dark); }
.btn-secondary { background: var(--bg2); color: var(--text); border-color: var(--border2); }
.btn-secondary:hover { background: var(--bg3); }
.btn-danger { background: var(--red-bg); color: var(--red-text); }
.btn-danger:hover { background: #f5d6d3; }
.btn-ghost { background: transparent; color: var(--text2); padding: 6px 10px; }
.btn-ghost:hover { background: var(--bg2); color: var(--text); }
.btn-sm { padding: 5px 11px; font-size: 12px; }
.btn:disabled { opacity: 0.5; cursor: not-allowed; }

.panel { background: #fff; border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 20px; margin-bottom: 18px; box-shadow: var(--shadow); }
.panel-title { font-size: 15px; font-weight: 600; margin-bottom: 14px; display: flex; align-items: center; gap: 8px; }
.panel-title .count-badge { font-size: 11px; font-weight: 600; background: var(--bg2); color: var(--text2); padding: 1px 8px; border-radius: 100px; }

.kpi-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 0; border: 1.5px solid #888; border-radius: var(--radius-lg); overflow: hidden; margin-bottom: 14px; }
.kpi { background: var(--bg); padding: 14px 16px; border-right: 1px solid #bbb; border-bottom: 1px solid #bbb; }
.kpi-icon { font-size: 18px; margin-bottom: 5px; }
.kpi-label { font-size: 10.5px; color: var(--text2); font-weight: 700; text-transform: uppercase; letter-spacing: .7px; margin-bottom: 4px; }
.kpi-val { font-size: 20px; font-weight: 700; letter-spacing: -.3px; line-height: 1.1; color: var(--text); }
.kpi-sub { font-size: 11px; color: var(--text3); margin-top: 4px; }
.kpi-pos { color: var(--green); }
.kpi-neg { color: var(--red); }
.section-label { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em; color: var(--text3); margin: 26px 0 10px; }
.section-label:first-child { margin-top: 0; }

.fgrid { display: flex; flex-wrap: wrap; gap: 14px; margin-bottom: 4px; }
.fg { display: flex; flex-direction: column; gap: 5px; min-width: 160px; flex: 1; }
.fg label { font-size: 11.5px; font-weight: 600; color: var(--text2); }
.fg label .opt { font-weight: 400; color: var(--text3); }
.fg input, .fg select, .fg textarea {
  border: 1px solid var(--border2); border-radius: 8px; padding: 8px 11px; font-size: 13.5px;
  font-family: var(--sans); background: var(--bg); color: var(--text); transition: border-color 0.15s, background 0.15s;
}
.fg input:focus, .fg select:focus, .fg textarea:focus { outline: none; border-color: var(--green); background: #fff; }
.fg input::placeholder { color: var(--text3); }

.radio-group { display: flex; gap: 8px; flex-wrap: wrap; }
.radio-pill {
  padding: 7px 14px; border-radius: 100px; border: 1.5px solid var(--border2); font-size: 12.5px; font-weight: 600;
  cursor: pointer; color: var(--text2); background: var(--bg); transition: all 0.15s; user-select: none;
}
.radio-pill.selected { background: var(--green); border-color: var(--green); color: #fff; }
.radio-pill:hover:not(.selected) { border-color: var(--text3); }

.helper-text { font-size: 11.5px; color: var(--text3); margin-top: 6px; line-height: 1.5; }
.live-calc { font-size: 13px; font-weight: 600; margin-top: 8px; padding: 9px 13px; border-radius: 8px; }
.live-calc.green { background: var(--green-bg); color: var(--green-text); }
.live-calc.red { background: var(--red-bg); color: var(--red-text); }

.tw { overflow-x: auto; border: 1px solid var(--border); border-radius: var(--radius); }
table.dt { width: 100%; border-collapse: collapse; font-size: 13px; }
table.dt th { text-align: left; padding: 10px 14px; background: var(--bg2); font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.04em; color: var(--text2); border-bottom: 1px solid var(--border); white-space: nowrap; }
table.dt th.tc, table.dt td.tc { text-align: center; }
table.dt td { padding: 10px 14px; border-bottom: 1px solid var(--border); white-space: nowrap; }
table.dt tbody tr:hover { background: var(--bg2); }
table.dt tbody tr:last-child td { border-bottom: none; }
.row-actions { display: flex; gap: 4px; justify-content: flex-end; }
.icon-btn { background: none; border: none; cursor: pointer; font-size: 13px; padding: 4px 6px; border-radius: 5px; color: var(--text3); }
.icon-btn:hover { background: var(--bg3); color: var(--text); }
.icon-btn.danger:hover { background: var(--red-bg); color: var(--red-text); }

.empty-state { text-align: center; padding: 48px 20px; color: var(--text3); }
.empty-state .ico { font-size: 32px; display: block; margin-bottom: 10px; opacity: 0.6; }
.empty-state .msg { font-size: 13.5px; }

.pill { display: inline-flex; align-items: center; gap: 4px; padding: 3px 10px; border-radius: 100px; font-size: 11.5px; font-weight: 600; }
.pill-green { background: var(--green-bg); color: var(--green-text); }
.pill-clay { background: var(--clay-bg); color: var(--clay-text); }
.pill-gold { background: var(--gold-bg); color: var(--gold-text); }
.pill-red { background: var(--red-bg); color: var(--red-text); }
.pill-gray { background: var(--bg3); color: var(--text2); }

.kpi-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(170px, 1fr)); gap: 12px; margin-bottom: 20px; }
.kpi-card { background: #fff; border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 16px 18px; box-shadow: var(--shadow); position: relative; overflow: hidden; }
.kpi-card .kpi-icon { font-size: 17px; margin-bottom: 8px; }
.kpi-card .kpi-label { font-size: 11.5px; color: var(--text2); font-weight: 600; margin-bottom: 4px; }
.kpi-card .kpi-value { font-family: var(--serif); font-size: 26px; font-weight: 600; letter-spacing: -0.01em; }
.kpi-card .kpi-sub { font-size: 11px; color: var(--text3); margin-top: 3px; }
.kpi-card.accent-green { border-top: 3px solid var(--green); }
.kpi-card.accent-clay { border-top: 3px solid var(--clay); }
.kpi-card.accent-gold { border-top: 3px solid var(--gold); }
.kpi-card.accent-red { border-top: 3px solid var(--red); }
.kpi-card.compact { padding: 10px 14px; }
.kpi-card.compact .kpi-icon { font-size: 13px; margin-bottom: 4px; }
.kpi-card.compact .kpi-label { font-size: 10.5px; margin-bottom: 2px; }
.kpi-card.compact .kpi-value { font-size: 18px; }

.rodeo-strip { display: flex; gap: 8px; overflow-x: auto; padding-bottom: 6px; margin-bottom: 20px; }
.rodeo-chip {
  flex-shrink: 0; padding: 10px 16px; border-radius: 12px; border: 1.5px solid var(--border2);
  background: #fff; cursor: pointer; transition: all 0.15s; min-width: 130px;
}
.rodeo-chip:hover { border-color: var(--green); }
.rodeo-chip.active { border-color: var(--green); background: var(--green-bg); }
.rodeo-chip .rc-name { font-size: 12.5px; font-weight: 700; color: var(--text); }
.rodeo-chip .rc-meta { font-size: 10.5px; color: var(--text3); margin-top: 2px; }
.rodeo-chip.active .rc-name { color: var(--green-dark); }

.modal-overlay { position: fixed; inset: 0; background: rgba(43,38,31,0.45); display: flex; align-items: center; justify-content: center; z-index: 100; padding: 20px; }
.modal { background: #fff; border-radius: var(--radius-lg); width: 100%; max-width: 560px; max-height: 88vh; overflow-y: auto; box-shadow: var(--shadow-md); }
.modal-header { display: flex; justify-content: space-between; align-items: center; padding: 18px 22px; border-bottom: 1px solid var(--border); }
.modal-header h3 { font-family: var(--serif); font-size: 17px; font-weight: 600; }
.modal-close { background: none; border: none; font-size: 18px; cursor: pointer; color: var(--text3); padding: 4px; }
.modal-body { padding: 20px 22px; }
.modal-footer { display: flex; justify-content: flex-end; gap: 8px; padding: 16px 22px; border-top: 1px solid var(--border); }

#toast-zone { position: fixed; bottom: 22px; right: 22px; z-index: 200; display: flex; flex-direction: column; gap: 8px; }
.toast { padding: 12px 18px; border-radius: 10px; font-size: 13px; font-weight: 600; box-shadow: var(--shadow-md); animation: slideIn 0.25s ease-out; max-width: 360px; }
.toast.ok { background: var(--green); color: #fff; }
.toast.err { background: var(--red); color: #fff; }
@keyframes slideIn { from { transform: translateX(20px); opacity: 0; } to { transform: translateX(0); opacity: 1; } }

.loader { display: flex; align-items: center; justify-content: center; gap: 10px; padding: 60px 20px; color: var(--text3); font-size: 13px; }
.spinner { width: 16px; height: 16px; border: 2px solid var(--border2); border-top-color: var(--green); border-radius: 50%; animation: spin 0.7s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }

.setup-wrap { max-width: 520px; margin: 80px auto; padding: 0 20px; }
.setup-wrap .panel { padding: 32px; }

@media (max-width: 860px) {
  .sidebar { position: fixed; left: -240px; z-index: 50; transition: left 0.2s; box-shadow: var(--shadow-md); }
  .sidebar.open { left: 0; }
  .mobile-menu-btn { display: flex !important; }
  .content { padding: 18px 16px 60px; }
  .topbar { padding: 14px 16px; }
  .kpi-row { grid-template-columns: repeat(2, 1fr); }
}
.mobile-menu-btn { display: none; background: none; border: none; font-size: 20px; cursor: pointer; padding: 4px 8px; }

@media print {
  .sidebar, .topbar, .btn { display: none !important; }
}
</style>

<body>
<div id="root"></div>
<div id="toast-zone"></div>
<script>
window.S = {
  apiUrl: localStorage.getItem('cria_api_url') || 'https://script.google.com/macros/s/AKfycbz-ahGdifI9FykD0r6hz47fjPZ6H5TwKWMOsCfW5f_M41oXneTffMk7CKz0svOgezSD_w/exec',
  apiToken: localStorage.getItem('cria_api_token') || 'LosMedanos2026Cria',
  page: 'home',
  sidebarOpen: false,
  loading: false,
  syncStatus: 'idle',
  catalogs: null,
  selectedRodeoId: null,
  selectedCampoId: null,
  dashboard: null,
  stock: null,
  corralesStock: undefined,
  cache: {},
  modal: null,
};
const S = window.S;

function save() {
  localStorage.setItem('cria_api_url', S.apiUrl);
  localStorage.setItem('cria_api_token', S.apiToken);
}

function apiConfigured() { return !!(S.apiUrl && S.apiToken); }

async function apiCall(action, opts = {}) {
  if (!apiConfigured()) throw new Error('API no configurada');
  S.syncStatus = 'busy';
  renderSyncDot();
  try {
    let url = S.apiUrl + '?action=' + action + '&token=' + encodeURIComponent(S.apiToken);
    if (opts.params) {
      Object.entries(opts.params).forEach(([k, v]) => { url += '&' + k + '=' + encodeURIComponent(v); });
    }
    const fetchOpts = { method: opts.body ? 'POST' : 'GET' };
    if (opts.body) {
      // Inyectar usuario de sesión automáticamente en todos los POST
      const session = window.__lmSession || {};
      const bodyConUsuario = { ...opts.body, usuario: session.usuario || 'sistema' };
      fetchOpts.body = JSON.stringify(bodyConUsuario);
      fetchOpts.headers = { 'Content-Type': 'text/plain;charset=utf-8' };
    }
    const res = await fetch(url, fetchOpts);
    const json = await res.json();
    if (!json.ok) throw new Error(json.error || 'Error desconocido');
    S.syncStatus = 'ok';
    renderSyncDot();
    return json.data;
  } catch (err) {
    S.syncStatus = 'bad';
    renderSyncDot();
    throw err;
  }
}

function renderSyncDot() {
  const el = document.getElementById('sync-dot');
  if (!el) return;
  el.className = 'sync-dot ' + (S.syncStatus === 'busy' ? 'busy' : S.syncStatus === 'bad' ? 'bad' : 'ok');
}

function toast(msg, type) {
  type = type || 'ok';
  const zone = document.getElementById('toast-zone');
  const el = document.createElement('div');
  el.className = 'toast ' + type;
  el.textContent = msg;
  zone.appendChild(el);
  setTimeout(() => el.remove(), 3800);
}

function today() { return new Date().toISOString().slice(0, 10); }
// Compara por_campo de forma robusta: acepta true, "true", "TRUE", "True", 1, "1"
function esPorCampo_(v) {
  if (v === true || v === 1) return true;
  if (typeof v === 'string') return v.toLowerCase() === 'true' || v === '1';
  return false;
}

function fd(dateStr) {
  if (!dateStr) return '—';
  const parts = String(dateStr).split('-');
  if (parts.length === 3) return parts[2] + '/' + parts[1] + '/' + parts[0];
  return dateStr;
}
function fn(n, dec) {
  dec = dec || 0;
  if (n === null || n === undefined || isNaN(n)) return '—';
  return Number(n).toLocaleString('es-AR', { maximumFractionDigits: dec, minimumFractionDigits: dec });
}
function pct(n) { return n === null || n === undefined ? '—' : fn(n, 1) + '%'; }
function gid() { return 'tmp_' + Date.now().toString(36) + Math.random().toString(36).slice(2, 6); }

function rodeoNombre(rodeoId) {
  const r = (S.catalogs && S.catalogs.rodeos || []).find(x => String(x.rodeo_id) === String(rodeoId));
  return r ? r.nombre : '—';
}
function campoNombre(campoId) {
  const c = (S.catalogs && S.catalogs.campos || []).find(x => String(x.campo_id) === String(campoId));
  return c ? c.nombre : '—';
}
function rodeosCriaActivos() {
  return (S.catalogs && S.catalogs.rodeos || []).filter(r => (r.categoria === 'vaca' || r.categoria === 'vaquillona'));
}
function rodeosConServicio() {
  const servicios = S.cache.servicios || [];
  const idsConServicio = new Set(servicios.map(s => String(s.rodeo_id)));
  return rodeosCriaActivos().filter(r => idsConServicio.has(String(r.rodeo_id)));
}

function rodeosCriaPorCampo(campoId) {
  return rodeosCriaActivos().filter(r => String(r.campo_id) === String(campoId));
}

function rodeosConServicioPorCampo(campoId) {
  return rodeosConServicio().filter(r => String(r.campo_id) === String(campoId));
}

function rodeosConPrenadas() {
  const tactos = S.cache.tactos || [];
  const idsConPrenadas = new Set(tactos.filter(t => Number(t.prenadas) > 0).map(t => String(t.rodeo_id)));
  return rodeosCriaActivos().filter(r => idsConPrenadas.has(String(r.rodeo_id)));
}

function rodeosConPrenadasPorCampo(campoId) {
  return rodeosConPrenadas().filter(r => String(r.campo_id) === String(campoId));
}
function rodeosTodos() {
  return (S.catalogs && S.catalogs.rodeos || []);
}
function rodeosPorCampo(campoId) {
  return rodeosTodos().filter(r => String(r.campo_id) === String(campoId));
}
function rodeoOptionsHtml(rodeosList) {
  if (!rodeosList.length) return '<option value="">Sin rodeos en este campo</option>';
  return rodeosList.map(r => `<option value="${r.rodeo_id}">${r.nombre}</option>`).join('');
}
// Un rodeo se muestra en el buscador de Movimientos solo si tiene stock actual O algún movimiento/venta registrado.
// Si no tiene NINGUNA de las dos cosas, se oculta (las dos condiciones tienen que faltar juntas).
function rodeoTieneActividad_(rodeoId) {
  const stockRow = (S.stock || []).find(r => String(r.rodeo_id) === String(rodeoId));
  if (stockRow && Number(stockRow.stock) !== 0) return true;
  const tieneMov = (S.cache.movimientos || []).some(m => String(m.rodeo_origen_id) === String(rodeoId) || String(m.rodeo_destino_id) === String(rodeoId));
  if (tieneMov) return true;
  return (S.cache.ventas || []).some(v => String(v.rodeo_id) === String(rodeoId));
}
function rodeosTodosConActividad_() {
  return rodeosTodos().filter(r => rodeoTieneActividad_(r.rodeo_id));
}
function rodeosConActividadPorCampo_(campoId) {
  return rodeosPorCampo(campoId).filter(r => rodeoTieneActividad_(r.rodeo_id));
}
// Para registrar consumo de insumos: solo rodeos con animales AHORA (no tiene sentido cargar consumo en un rodeo vacío)
function rodeosConStockPorCampo_(campoId) {
  return rodeosPorCampo(campoId).filter(r => {
    const row = (S.stock || []).find(s => String(s.rodeo_id) === String(r.rodeo_id));
    return row && Number(row.stock) > 0;
  });
}

async function loadCatalogs() {
  S.catalogs = await apiCall('catalog');
}
async function loadEntity(entity, force) {
  if (!force && S.cache[entity]) return S.cache[entity];
  const data = await apiCall('list', { params: { entity } });
  S.cache[entity] = data;
  return data;
}
async function loadDashboard() {
  S.dashboard = await apiCall('dashboard');
}
function invalidateCache(entity) { delete S.cache[entity]; if (['servicios','tactos','pariciones','destetes','abortos','mortandad'].includes(entity)) { S.indicesData = null; } }

async function autofetchCotizacion_() {
  // Buscar automáticamente si no tenemos cotización de hoy
  try {
    const hoy = today();
    const yaHoy = (S.catalogs && S.catalogs.tipo_cambio || []).find(t => t.fecha === hoy);
    if (!yaHoy) {
      const res = await fetch('https://dolarapi.com/v1/dolares/oficial', { cache: 'no-store' });
      if (!res.ok) return;
      const data = await res.json();
      const valor = data.venta || data.promedio || null;
      if (!valor) return;
      await apiCall('create', { body: { entity: 'tipo_cambio', data: { fecha: hoy, valor: Number(valor), fuente: 'BNA' } } });
      await loadCatalogs();
      toast('Cotización del día actualizada: $ ' + fn(valor, 2) + ' / U$S', 'ok');
      render();
    }
  } catch(e) { /* silencioso — no interrumpir el inicio */ }
}

async function init() {
  if (!apiConfigured()) { S.page = 'setup'; render(); return; }
  S._loading = true; S._loadingMsg = 'Conectando con la planilla…';
  render();
  try {
    S._loadingMsg = 'Cargando catálogos…';
    render();
    await loadCatalogs();
    S._loading = false;
    if (!S.page || S.page === 'setup') S.page = 'home';
    render(); // app navegable de inmediato
    autofetchCotizacion_();
    // Precargar datos en paralelo sin bloquear la UI
    Promise.all([
      loadDashboard().catch(()=>{}),
      loadStock().catch(()=>{}),
      loadEntity('movimientos').catch(()=>{}),
      loadEntity('ventas').catch(()=>{}),
      loadEntity('consumos_insumos').catch(()=>{}),
      loadEntity('compras_insumos').catch(()=>{}),
      loadEntity('pesadas').catch(()=>{}),
      loadEntity('sueldos').catch(()=>{}),
      loadEntity('mortandad').catch(()=>{}),
      loadEntity('destetes').catch(()=>{}),
      loadEntity('pariciones').catch(()=>{}),
      loadEntity('egresos_recria').catch(()=>{}),
      loadEntity('precios_internos').catch(()=>{}),
      loadEntity('campanas').catch(()=>{}),
      loadEntity('rodeo_productos').catch(()=>{}),
      apiCall('resumenRecria').then(d=>{ S.resumenRecria=d; }).catch(()=>{}),
      loadCorralesStock().catch(()=>{}),
    ]).then(()=>{ render(); });
  } catch (err) {
    S._loading = false;
    toast('Error al conectar: ' + err.message, 'err');
  }
}

async function goto(page) {
  S.page = page;
  S.sidebarOpen = false;
  render(); // render inmediato para que el ítem del menú se ponga activo
  const entityMap = { servicios: 'servicios', tactos: 'tactos', abortos: 'abortos', pariciones: 'pariciones', mortandad: 'mortandad', destetes: 'destetes', movimientos: 'movimientos', ventas: 'ventas', insumos: 'consumos_insumos', sueldos: 'sueldos', compras_hacienda: 'compras_hacienda' };
  if (entityMap[page] && !S.cache[entityMap[page]]) {
    S.loading = true; render();
    try { await loadEntity(entityMap[page]); } catch (err) { toast(err.message, 'err'); }
    S.loading = false;
  }
  // Tactos, Abortos y Pariciones necesitan la caché de Servicios para filtrar rodeos con servicio registrado
  if ((page === 'tactos' || page === 'abortos' || page === 'pariciones') && !S.cache.servicios) {
    try { await loadEntity('servicios'); } catch (err) { /* silencioso */ }
  }
  // Destetes necesita la caché de Tactos para filtrar rodeos con vacas preñadas confirmadas
  if (page === 'destetes' && !S.cache.tactos) {
    try { await loadEntity('tactos'); } catch (err) { /* silencioso */ }
  }
  // Si el Resumen fue invalidado por un registro reciente (Pariciones/Destetes/Mortandad/Abortos),
  // se recarga automáticamente al volver a visitarlo.
  if (page === 'dashboard') {
    const t = setTimeout(() => { if (!S.dashboard) { S.dashboardError = 'La conexión tardó demasiado.'; render(); } }, 15000);
    const loads = [];
    if (!S.cache.movimientos)      loads.push(loadEntity('movimientos').catch(()=>{}));
    if (!S.cache.ventas)           loads.push(loadEntity('ventas').catch(()=>{}));
    if (!S.cache.consumos_insumos) loads.push(loadEntity('consumos_insumos').catch(()=>{}));
    if (!S.cache.compras_hacienda) loads.push(loadEntity('compras_hacienda').catch(()=>{}));
    if (!S.cache.sueldos)          loads.push(loadEntity('sueldos').catch(()=>{}));
    if (!S.cache.pesadas)          loads.push(loadEntity('pesadas').catch(()=>{}));
    if (!S.cache.rodeo_productos)  loads.push(loadEntity('rodeo_productos').catch(()=>{}));
    if (!S.cache.productos)        loads.push(loadEntity('productos').catch(()=>{}));
    Promise.all(loads).then(() => { clearTimeout(t); render(); }).catch(err => { clearTimeout(t); render(); });
  }
  if (page === 'indices_reproduccion' && !S.indicesData && !S._indicesLoading) {
    S._indicesLoading = true;
    apiCall('dashboard').then(data => { S.indicesData = data; S._indicesLoading = false; render(); }).catch(() => { S._indicesLoading = false; render(); });
  }
  if (page === 'movimientos') {
    // Cargar todo en paralelo para evitar múltiples re-renders
    const movPromises = [];
    if (!S.stock) movPromises.push(loadStock().catch(() => {}));
    if (!S.cache.ventas) movPromises.push(loadEntity('ventas').catch(() => {}));
    if (S.corralesStock === undefined) movPromises.push(loadCorralesStock().catch(() => {}));
    if (movPromises.length) await Promise.all(movPromises);
  }
  if ((page === 'stock_hacienda' || page === 'insumos') && !S.stock) {
    try {
      await loadStock();
      // Re-renderizar stock actual una vez cargado
      if (page === 'stock_hacienda') {
        const el = document.getElementById('sh-stock-actual');
        if (el) el.innerHTML = buildStockTable_(S.stock || [], '', '');
        // Repoblar categorías en los selects
        const catSel = document.getElementById('sh-stock-cat');
        if (catSel && (S.stock||[]).length) {
          const cats = [...new Set((S.stock||[]).map(s=>s.categoria).filter(Boolean))].sort((a,b)=>a.localeCompare(b,'es'));
          catSel.innerHTML = '<option value="">Todas las categorías</option>' + cats.map(c=>`<option value="${c}">${c}</option>`).join('');
        }
      }
    } catch (err) { /* silencioso */ }
  }
  if (page === 'insumos' && !S.cache.compras_insumos) {
    try { await loadEntity('compras_insumos'); } catch (err) { /* silencioso */ }
  }
  if (page === 'insumos' && !S.cache.productos) {
    try { await loadEntity('productos'); } catch (err) { /* silencioso */ }
  }
  if (page === 'insumos') {
    // Siempre refrescar catálogo al entrar a Insumos para que por_campo esté actualizado
    try { await loadCatalogs(); } catch (err) { /* silencioso */ }
  }
  if (page === 'insumos' && !S.stockProductos) {
    try { await loadStockProductos(); } catch (err) { toast(err.message, 'err'); }
  }
  if (page.startsWith('engorde')) {
    // Cargar todo en paralelo
    const engPromises = [];
    if (!S.stock)                    engPromises.push(loadStock().catch(()=>{}));
    if (!S.cache.pesadas)            engPromises.push(loadEntity('pesadas').catch(()=>{}));
    if (!S.cache.ventas)             engPromises.push(loadEntity('ventas').catch(()=>{}));
    if (!S.cache.consumos_insumos)   engPromises.push(loadEntity('consumos_insumos').catch(()=>{}));
    if (!S.cache.compras_insumos)    engPromises.push(loadEntity('compras_insumos').catch(()=>{}));
    if (!S.cache.movimientos)        engPromises.push(loadEntity('movimientos').catch(()=>{}));
    if (!S.cache.sueldos)            engPromises.push(loadEntity('sueldos').catch(()=>{}));
    if (engPromises.length) await Promise.all(engPromises);
    // Intentar cargar cotización desde localStorage si no vino de la API
    if (!S.corralesTipoCambio || !S.corralesTipoCambio.length) {
      try {
        const cached = JSON.parse(localStorage.getItem('lm_tipo_cambio') || 'null');
        if (cached && cached.length) S.corralesTipoCambio = cached;
      } catch(e) {}
    }
    if (S.corralesTipoCambio === undefined) { try { await loadCorralesStock(); } catch (err) { /* silencioso */ } }
    // Inicializar corral seleccionado con el primero de Engorde que tenga animales
    if (!egGetCorralId()) {
      const rEng = rodeosTodos().filter(r => r.actividad === 'Engorde');
      if (rEng.length) egSetCorralId(String(rEng[0].rodeo_id));
    }
  }
  if (page === 'cesiones_cria' || page === 'cesiones_recria') {
    if (!S.cache.movimientos)     { try { await loadEntity('movimientos'); } catch(e){} }
    if (!S.cache.egresos_recria)  { try { await loadEntity('egresos_recria'); } catch(e){} }
    if (!S.cache.pesadas)         { try { await loadEntity('pesadas'); } catch(e){} }
    if (!S.resumenRecria)         { try { S.resumenRecria = await apiCall('resumenRecria'); } catch(e){} }
  }
  if (page === 'recria_dashboard') {
    const recLoads = [];
    if (!S.resumenRecria)           recLoads.push(apiCall('resumenRecria').then(d=>{ S.resumenRecria=d; }).catch(()=>{}));
    if (!S.cache.pesadas)           recLoads.push(loadEntity('pesadas').catch(()=>{}));
    if (!S.cache.ventas)            recLoads.push(loadEntity('ventas').catch(()=>{}));
    if (!S.cache.egresos_recria)    recLoads.push(loadEntity('egresos_recria').catch(()=>{}));
    if (!S.cache.consumos_insumos)  recLoads.push(loadEntity('consumos_insumos').catch(()=>{}));
    if (!S.cache.destetes)          recLoads.push(loadEntity('destetes').catch(()=>{}));
    if (!S.cache.movimientos)       recLoads.push(loadEntity('movimientos').catch(()=>{}));
    if (!S.cache.mortandad)         recLoads.push(loadEntity('mortandad').catch(()=>{}));
    if (!S.cache.sueldos)           recLoads.push(loadEntity('sueldos').catch(()=>{}));
    if (!S.cache.precios_internos)  recLoads.push(loadEntity('precios_internos').catch(()=>{}));
    if (recLoads.length) await Promise.all(recLoads);
  }
  if (page === 'margenbruto') {
    if (!S.cache.precios_internos)   { try { await loadEntity('precios_internos'); } catch (err) { /* silencioso */ } }
    if (!S.cache.campanas)           { try { await loadEntity('campanas'); } catch (err) { /* silencioso */ } }
    if (!S.resumenRecria)            { try { S.resumenRecria = await apiCall('resumenRecria'); } catch (err) { /* silencioso */ } }
    if (!S.cache.ventas)             { try { await loadEntity('ventas'); } catch (err) { /* silencioso */ } }
    if (!S.cache.egresos_recria)     { try { await loadEntity('egresos_recria'); } catch (err) { /* silencioso */ } }
    if (!S.cache.consumos_insumos)   { try { await loadEntity('consumos_insumos'); } catch (err) { /* silencioso */ } }
    if (!S.cache.destetes)           { try { await loadEntity('destetes'); } catch (err) { /* silencioso */ } }
    if (!S.cache.movimientos)        { try { await loadEntity('movimientos'); } catch (err) { /* silencioso */ } }
    if (!S.cache.sueldos)            { try { await loadEntity('sueldos'); } catch (err) { /* silencioso */ } }
    if (!S.cache.mortandad)          { try { await loadEntity('mortandad'); } catch (err) { /* silencioso */ } }
    if (!S.cache.pesadas)            { try { await loadEntity('pesadas'); } catch (err) { /* silencioso */ } }
    if (!S.stock)                    { try { await loadStock(); } catch (err) { /* silencioso */ } }
    if (!S.dashboard)                { try { await loadDashboard(); } catch (err) { /* silencioso */ } }
    if (S.corralesTipoCambio === undefined) {
      try { await loadCorralesStock(); } catch (err) { /* silencioso */ }
    }
    if (!S.margenBruto) {
      if (!S.margenBrutoPeriodo) S.margenBrutoPeriodo = periodoPreset_('anio');
      try { await calcularMargenBruto_(); } catch (err) { toast(err.message, 'err'); }
    }
  }
  render();
}

function buildShell() {
  // Determinar sección activa
  const activeSection = NAV.find(sec => sec.items.some(it => it.k === S.page));
  // Secciones expandidas: la activa + las que el usuario haya expandido manualmente
  if (!S._expandedSections) S._expandedSections = {};
  if (!S.hasOwnProperty('_manuallyClosed')) S._manuallyClosed = null;
  // Auto-expandir la sección activa solo si ninguna está abierta Y el usuario no la cerró
  const anyOpen = Object.values(S._expandedSections).some(Boolean);
  if (activeSection && !anyOpen && S._manuallyClosed !== activeSection.section) {
    S._expandedSections = { [activeSection.section]: true };
  }

  const navHtml = NAV.map(sec => {
    const isActive   = sec === activeSection;
    const isExpanded = !!S._expandedSections[sec.section];
    return `
    <button class="nav-section-btn${isActive ? ' active-sec' : ''}"
      onclick="
        const wasOpen = !!(window.S._expandedSections || {})['${sec.section}'];
        window.S._expandedSections = {};
        if (wasOpen) {
          window.S._manuallyClosed = '${sec.section}';
          render();
        } else {
          window.S._manuallyClosed = null;
          window.S._expandedSections['${sec.section}'] = true;
          goto('${sec.defaultPage}');

      <i class="ti ${isExpanded ? 'ti-chevron-down' : 'ti-chevron-right'}" style="margin-left:auto;font-size:12px;opacity:.6" aria-hidden="true"></i>
    </button>
    ${isExpanded ? sec.items.map(it => `
      <button class="nav-item ${S.page === it.k ? 'active' : ''}" data-nav="${it.k}" style="padding-left:32px;font-size:12.5px;color:rgba(255,255,255,.75)">
        <i class="ti ${it.icon} nav-icon" style="font-size:13px;opacity:.7" aria-hidden="true"></i>${it.label}
      </button>
    `).join('') : ''}
  `;}).join('');

  return `
  <div class="app-shell">
    <div class="sidebar ${S.sidebarOpen ? 'open' : ''}">
      <div class="sidebar-brand">
        <div style="display:flex;align-items:center;gap:10px;margin-bottom:10px">

          <div>

        <div class="farm-sub" style="font-size:10.5px;color:rgba(255,255,255,0.45);margin-bottom:10px">Gestión de cría</div>
        <a href="https://agroganaderalosmedanos.github.io/" class="btn-inicio-sidebar" title="Volver al inicio">← Inicio</a>
        <br><button class="btn-logout-sidebar" onclick="loginClear()">⎋ Cerrar sesión</button>
      </div>
      <div class="sidebar-nav">${navHtml}</div>
      <div class="sidebar-footer">
        <span class="sync-dot ${S.syncStatus === 'busy' ? 'busy' : S.syncStatus === 'bad' ? 'bad' : 'ok'}" id="sync-dot"></span>
        ${S.syncStatus === 'bad' ? 'Sin conexión' : 'Conectado a Sheets'}
      </div>
    </div>
    <div class="main">
      <div class="topbar">
        <div style="display:flex;align-items:center;gap:10px">
          <button class="mobile-menu-btn" id="btn-menu">☰</button>

      </div>
      <div class="content" id="content">${buildPage(S.page)}</div>

function aggregateKpis_(rodeosArr) {
  let totServ = 0, prenIatf = 0, prenToro = 0, totPren = 0;
  let totTacteadasIatf = 0, totTacteadasToro = 0;
  let nacVivos = 0, nacMuertos = 0, abortos = 0, totDest = 0, mortTerneros = 0;
  rodeosArr.forEach(r => {
    const k = r.kpis;
    totServ += k.servicio.total_serviciadas || 0;
    prenIatf += k.servicio.prenadas_iatf || 0;
    prenToro += k.servicio.prenadas_toro || 0;
    totPren += k.servicio.total_prenadas || 0;
    totTacteadasIatf += k.servicio.total_tacteadas_iatf || 0;
    totTacteadasToro += k.servicio.total_tacteadas_toro || 0;
    nacVivos += k.paricion.nacidos_vivos || 0;
    nacMuertos += k.paricion.nacidos_muertos || 0;
    abortos += k.gestacion.abortos || 0;
    totDest += k.destete.total_destetados || 0;
    mortTerneros += k.destete.mortandad_terneros || 0;
  });
  const totTacteadas = totTacteadasIatf + totTacteadasToro;
  const basePreñez = totServ || totTacteadas; // usar tacteadas si no hay servicios registrados
  return {
    servicio: {
      total_serviciadas: totServ, prenadas_iatf: prenIatf, prenadas_toro: prenToro, total_prenadas: totPren,
      total_tacteadas_iatf: totTacteadasIatf, total_tacteadas_toro: totTacteadasToro,
      total_tacteadas: totTacteadas,
      indice_prenez: basePreñez > 0 ? round1_(totPren / basePreñez * 100) : null,
      indice_prenez_iatf: totTacteadasIatf > 0 ? round1_(prenIatf / totTacteadasIatf * 100) : null,
      indice_prenez_toro: totTacteadasToro > 0 ? round1_(prenToro / totTacteadasToro * 100) : null,
    },
    gestacion: { abortos },
    paricion: { nacidos_vivos: nacVivos, nacidos_muertos: nacMuertos, indice_paricion: totPren > 0 ? round1_(nacVivos / totPren * 100) : null },
    destete: { total_destetados: totDest, mortandad_terneros: mortTerneros, indice_destete: nacVivos > 0 ? round1_(totDest / nacVivos * 100) : null },
  };
}
function round1_(n) { return n === null || n === undefined || isNaN(n) ? null : Math.round(n * 10) / 10; }

function buildKpiRow(k) {
  return `<div class="kpi-row">
    <div class="kpi-card accent-green">
      <div class="kpi-icon">⚭</div><div class="kpi-label">Índice de preñez</div>
      <div class="kpi-value">${pct(k.servicio.indice_prenez)}</div>
      <div class="kpi-sub">${fn(k.servicio.total_prenadas)} de ${fn(k.servicio.total_serviciadas||k.servicio.total_tacteadas)} tacteadas</div>
    </div>
    <div class="kpi-card accent-gold">
      <div class="kpi-icon">◔</div><div class="kpi-label">Preñez IATF</div>
      <div class="kpi-value">${pct(k.servicio.indice_prenez_iatf)}</div>
      <div class="kpi-sub">${fn(k.servicio.prenadas_iatf)} de ${fn(k.servicio.total_tacteadas_iatf)} vacas (IATF)</div>
    </div>
    <div class="kpi-card accent-clay">
      <div class="kpi-icon">✦</div><div class="kpi-label">Índice de parición</div>
      <div class="kpi-value">${pct(k.paricion.indice_paricion)}</div>
      <div class="kpi-sub">${fn(k.paricion.nacidos_vivos)} de ${fn(k.servicio.total_prenadas)} vacas parieron</div>
    </div>
    <div class="kpi-card accent-green">
      <div class="kpi-icon">⊞</div><div class="kpi-label">Índice de destete</div>
      <div class="kpi-value">${pct(k.destete.indice_destete)}</div>
      <div class="kpi-sub">${fn(k.destete.total_destetados)} de ${fn(k.paricion.nacidos_vivos)} terneros destetados</div>
    </div>
  </div>`;
}

function buildIndicesReproduccion() {
  if (!S.indicesData && !S._indicesLoading) {
    S._indicesLoading = true;
    apiCall('dashboard').then(data => {
      S.indicesData = data;
      S._indicesLoading = false;
      render();
    }).catch(() => { S._indicesLoading = false; render(); });
  }
  if (!S.indicesData) return '<div class="loader"><div class="spinner"></div>Calculando índices reproductivos…</div>';

  const g          = S.indicesData.general;
  const rodeosList = S.indicesData.rodeos || [];
  const campos     = (S.catalogs && S.catalogs.campos) || [];
  const criaTabs2 = [
    { k: 'dashboard',            icon: '◈',  label: 'Dashboard' },
    { k: 'indices_reproduccion', icon: '📈', label: 'Índices de Reproducción' },
    { k: 'servicios',            icon: '⚭',  label: 'Servicios' },
    { k: 'tactos',               icon: '◔',  label: 'Tactos' },
    { k: 'abortos',              icon: '⊘',  label: 'Abortos' },
    { k: 'pariciones',           icon: '✦',  label: 'Pariciones' },
    { k: 'destetes',             icon: '⊞',  label: 'Destetes' },
  ];
  let h = `<div class="page-header">
    <div class="page-title">Cría</div>
    <div style="display:flex;gap:8px;margin-top:8px;flex-wrap:wrap">
      ${criaTabs2.map(t => `<button class="radio-pill${S.page===t.k?' selected':''}" onclick="goto('${t.k}')">${t.icon} ${t.label}</button>`).join('')}
    </div>
  </div>`;

  h += '<div class="section-label">Establecimiento — índices generales</div>';
  h += buildKpiRow(g);

  h += '<div class="section-label">Filtrar por campo</div>';
  h += '<div class="rodeo-strip">';
  h += `<div class="rodeo-chip ${!S.selectedCampoId ? 'active' : ''}" data-campo=""><div class="rc-name">Todos los campos</div></div>`;
  campos.forEach(c => {
    h += `<div class="rodeo-chip ${String(S.selectedCampoId) === String(c.campo_id) ? 'active' : ''}" data-campo="${c.campo_id}"><div class="rc-name">${c.nombre}</div></div>`;
  });
  h += '</div>';

  const rodeosFiltrados = (S.selectedCampoId
    ? rodeosList.filter(r => String(r.rodeo.campo_id) === String(S.selectedCampoId))
    : rodeosList
  ).slice().sort((a, b) => {
    const cmp = campoNombre(a.rodeo.campo_id).localeCompare(campoNombre(b.rodeo.campo_id), 'es', { sensitivity: 'base' });
    return cmp !== 0 ? cmp : a.rodeo.nombre.localeCompare(b.rodeo.nombre, 'es', { sensitivity: 'base' });
  });

  if (S.selectedCampoId) {
    const campoSel = campos.find(c => String(c.campo_id) === String(S.selectedCampoId));
    h += `<div class="panel"><div class="panel-title">${campoSel ? campoSel.nombre : ''} <span class="pill pill-gray">${rodeosFiltrados.length} rodeo${rodeosFiltrados.length===1?'':'s'}</span></div>${buildKpiRow(aggregateKpis_(rodeosFiltrados))}</div>`;
  }

  h += '<div class="section-label">Por rodeo</div>';
  h += '<div class="rodeo-strip">';
  h += `<div class="rodeo-chip ${!S.selectedRodeoId ? 'active' : ''}" data-rodeo=""><div class="rc-name">Todos</div><div class="rc-meta">vista general</div></div>`;
  rodeosFiltrados.forEach(r => {
    h += `<div class="rodeo-chip ${String(S.selectedRodeoId) === String(r.rodeo.rodeo_id) ? 'active' : ''}" data-rodeo="${r.rodeo.rodeo_id}"><div class="rc-name">${r.rodeo.nombre}</div><div class="rc-meta">${campoNombre(r.rodeo.campo_id)}</div></div>`;
  });
  h += '</div>';

  if (S.selectedRodeoId) {
    const sel = rodeosFiltrados.find(r => String(r.rodeo.rodeo_id) === String(S.selectedRodeoId));
    if (sel) h += `<div class="panel"><div class="panel-title">${sel.rodeo.nombre} <span class="pill pill-gray">${campoNombre(sel.rodeo.campo_id)}</span></div>${buildKpiRow(sel.kpis)}</div>`;
  } else {
    h += `<div class="tw"><table class="dt"><thead><tr>
      <th>Rodeo</th><th>Campo</th>
      <th class="tc">Preñez</th><th class="tc">Parición</th><th class="tc">Destete</th>
      <th class="tc">Nacidos vivos</th><th class="tc">Destetados</th>
    </tr></thead><tbody>`;
    rodeosFiltrados.forEach(r => {
      const k = r.kpis;
      h += `<tr>
        <td><strong>${r.rodeo.nombre}</strong></td>
        <td>${campoNombre(r.rodeo.campo_id)}</td>
        <td class="tc">${pct(k.servicio.indice_prenez)}</td>
        <td class="tc">${pct(k.paricion.indice_paricion)}</td>
        <td class="tc">${pct(k.destete.indice_destete)}</td>
        <td class="tc">${fn(k.paricion.nacidos_vivos)}</td>
        <td class="tc">${fn(k.destete.total_destetados)}</td>
      </tr>`;
    });
    h += '</tbody></table></div>';
  }
  return h;
}

function comprasHacGetAll_() {
  return S.cache.compras_hacienda || [];
}

function buildComprasHacienda() {
  const compras  = comprasHacGetAll_().sort((a,b) => String(b.fecha).localeCompare(String(a.fecha)));
  const campos   = (S.catalogs && S.catalogs.campos) || [];
  const rodeos   = (S.catalogs && S.catalogs.rodeos) || [];
  const campanas = [...new Set([
    ...compras.map(c => c.campana),
    ...((S.cache.ventas||[]).map(v => v.campana))
  ].filter(Boolean))].sort((a,b) => b.localeCompare(a));
  const categorias = [...new Set([
    ...compras.map(c => c.categoria).filter(Boolean),
    'Vaca','Toro','Torito','Ternero','Ternera','Vaquillona','Novillito','Novillo','Vaca venta'
  ])].sort();

  const totalCabezas = compras.reduce((s,c)=>s+(Number(c.cantidad)||0),0);
  const totalImporte = compras.reduce((s,c)=>s+(Number(c.importe_total)||0),0);

  let h = `<div class="page-header">
    <div class="page-title">🛒 Compras de Hacienda</div>
    <div class="page-sub">Incorporación de animales al establecimiento</div>
  </div>`;

  // KPIs por categoría
  const porCat = {};
  compras.forEach(c => {
    const cat = (c.categoria||'Sin categoría');
    if (!porCat[cat]) porCat[cat] = { cabezas: 0, importe: 0 };
    porCat[cat].cabezas  += Number(c.cantidad) || 0;
    porCat[cat].importe  += Number(c.importe_total) || 0;
  });
  const bgsCat = ['var(--green-bg)','var(--gold-bg)','var(--clay-bg)','var(--blue-bg)','var(--bg2)'];
  const txtCat = ['var(--green-text)','var(--gold-text)','var(--clay-text)','var(--blue-text)','var(--text2)'];

  h += `<div style="display:flex;gap:10px;flex-wrap:wrap;margin-bottom:20px">
    <div style="background:var(--bg2);border-radius:8px;padding:10px 16px">
      <div style="font-size:10px;font-weight:700;text-transform:uppercase;color:var(--text2);letter-spacing:.05em">Total compras</div>
      <div style="font-size:18px;font-weight:700">$ ${fn(totalImporte)}</div>
      <div style="font-size:10px;color:var(--text3);margin-top:2px">${fn(totalCabezas)} cabezas · ${compras.length} registros</div>
    </div>
    ${Object.entries(porCat).sort((a,b)=>b[1].cabezas-a[1].cabezas).map(([cat,v],i)=>`
    <div style="background:${bgsCat[i%bgsCat.length]};border-radius:8px;padding:10px 16px">
      <div style="font-size:10px;font-weight:700;text-transform:uppercase;color:${txtCat[i%txtCat.length]};letter-spacing:.05em">${cat}</div>
      <div style="font-size:18px;font-weight:700;color:${txtCat[i%txtCat.length]}">$ ${fn(v.importe)}</div>
      <div style="font-size:10px;color:var(--text3);margin-top:2px">${fn(v.cabezas)} cabezas</div>
    </div>`).join('')}
  </div>`;

  // ── Formulario ──
  const editando = S._compraEditando || null;
  h += `<div class="panel" id="ch-form-panel">
    <div class="panel-title">${editando ? '✏️ Editar compra' : '➕ Registrar compra'}</div>
    <div class="fgrid">
      <div class="fg">
        <label>Fecha</label>
        <input type="date" id="ch-fecha" value="${editando ? (editando.fecha||today()) : today()}">
      </div>
      <div class="fg">
        <label>Campaña</label>
        <input type="text" id="ch-campana" placeholder="Ej: 2025/2026" list="ch-campana-list" value="${editando ? (editando.campana||'') : ''}">
        <datalist id="ch-campana-list">${campanas.map(c=>`<option value="${c}">`).join('')}</datalist>
      </div>
      <div class="fg">
        <label>Campo</label>
        <select id="ch-campo" onchange="window.chActualizarRodeos_()">
          ${campos.map(c=>`<option value="${c.campo_id}" ${editando && String(c.campo_id)===String(editando.campo_id)?'selected':''}>${c.nombre}</option>`).join('')}
        </select>
      </div>
      <div class="fg">
        <label>Categoría</label>
        <select id="ch-categoria-sel" onchange="window.chCatChange_()">
          <option value="">— Seleccioná —</option>
          ${categorias.map(c=>`<option value="${c}" ${editando && editando.categoria===c?'selected':''}>${c}</option>`).join('')}
          <option value="__otro__">Otra categoría…</option>
        </select>
        <input type="text" id="ch-categoria-txt" placeholder="Escribí la categoría" style="display:none;margin-top:6px" value="${editando ? (editando.categoria||'') : ''}">
        <input type="hidden" id="ch-categoria" value="${editando ? (editando.categoria||'') : ''}">
      </div>
      <div class="fg">
        <label>Rodeo destino <span class="opt">(opcional)</span></label>
        <select id="ch-rodeo" onchange="window.chActualizarRodeos_()">
          <option value="">— Sin asignar —</option>
          ${rodeos.filter(r=>String(r.campo_id)===String(editando ? editando.campo_id : campos[0]?.campo_id)).map(r=>`<option value="${r.rodeo_id}" ${editando && String(r.rodeo_id)===String(editando.rodeo_id)?'selected':''}>${r.nombre}</option>`).join('')}
          <option value="__nuevo__">➕ Crear rodeo nuevo…</option>
        </select>
      </div>
      <div class="fg">
        <label>Cantidad (cabezas)</label>
        <input type="number" id="ch-cantidad" placeholder="Ej: 50" min="1" value="${editando ? (editando.cantidad||'') : ''}" oninput="window.chCalcImporte_()">
      </div>
      <div class="fg">
        <label>Precio por cabeza ($)</label>
        <input type="number" id="ch-precio" placeholder="Ej: 850000" min="0" step="1000" value="${editando ? (editando.precio_cabeza||'') : ''}" oninput="window.chCalcImporte_()">
      </div>
      <div class="fg">
        <label>Importe total</label>
        <div id="ch-importe-preview" style="font-size:18px;font-weight:700;padding:8px 0;color:var(--green-text)">${editando && editando.importe_total ? '$ '+fn(editando.importe_total) : '—'}</div>
      </div>
      <div class="fg">
        <label>Vendedor / Procedencia</label>
        <input type="text" id="ch-vendedor" placeholder="Nombre del vendedor" value="${editando ? (editando.vendedor||'') : ''}">
      </div>
      <div class="fg" style="flex:2">
        <label>Observación</label>
        <input type="text" id="ch-obs" placeholder="Raza, condición corporal, preñez, etc." value="${editando ? (editando.observacion||'') : ''}">
      </div>
    </div>
    <!-- Nuevo rodeo -->
    <div id="ch-nuevo-rodeo-wrap" style="display:none;background:var(--bg2);border-radius:8px;padding:12px;margin-top:8px">
      <div style="font-size:13px;font-weight:600;margin-bottom:8px">Nuevo rodeo destino</div>
      <div class="fgrid">
        <div class="fg"><label>Nombre</label><input type="text" id="ch-nr-nombre" placeholder="Ej: Vacas 2026"></div>
        <div class="fg"><label>Categoría del rodeo</label>
          <select id="ch-nr-categoria">
            ${[...new Set(rodeos.map(r=>r.categoria).filter(Boolean))].sort().map(c=>`<option value="${c}">${c}</option>`).join('')}
          </select>
        </div>
        <div class="fg"><label>Actividad</label>
          <select id="ch-nr-actividad">
            <option value="Cría">Cría</option>
            <option value="Recría">Recría</option>
            <option value="Engorde">Engorde</option>
          </select>
        </div>
      </div>
    </div>
    <div style="margin-top:12px;display:flex;gap:8px;align-items:center;flex-wrap:wrap">
      <button class="btn btn-primary" id="ch-guardar-btn" onclick="this.disabled=true;this.textContent='⏳ Guardando…';window.compraHacGuardar_()">
        ${editando ? '✏️ Guardar cambios' : '💾 Registrar compra'}
      </button>
      ${editando ? `<button class="btn btn-secondary" onclick="S._compraEditando=null;render()">Cancelar</button>` : ''}
      <span id="ch-msg" style="font-size:13px;color:var(--green)"></span>
    </div>
  </div>`;

  // ── Historial ──
  h += `<div class="panel">
    <div class="panel-title">📋 Historial de compras</div>`;

  if (!compras.length) {
    h += '<div class="empty-state"><span class="ico">🛒</span><div class="msg">No hay compras registradas aún.</div></div>';
  } else {
    const porCampana = {};
    compras.forEach(c => {
      const k = c.campana || 'Sin campaña';
      if (!porCampana[k]) porCampana[k] = [];
      porCampana[k].push(c);
    });
    Object.entries(porCampana).sort((a,b)=>b[0].localeCompare(a[0])).forEach(([camp, items]) => {
      const totCamp = items.reduce((s,c)=>s+(Number(c.importe_total)||0),0);
      h += `<div style="margin-bottom:6px;font-size:12px;font-weight:700;color:var(--text2);text-transform:uppercase;letter-spacing:.04em;display:flex;justify-content:space-between;align-items:center;padding:8px 4px 4px">
        <span>📅 Campaña ${camp}</span>
        <span style="color:var(--clay-text)">$ ${fn(totCamp)}</span>
      </div>`;
      h += `<div class="tw" style="margin-bottom:16px"><table class="dt"><thead><tr>
        <th>Fecha</th><th>Categoría</th><th>Campo</th><th>Rodeo destino</th>
        <th class="tc">Cant.</th><th class="tr">Precio/cab.</th><th class="tr">Total</th>
        <th>Vendedor</th><th>Obs.</th><th></th>
      </tr></thead><tbody>`;
      items.forEach(c => {
        const rodeoNom = c.rodeo_id ? (rodeos.find(r=>String(r.rodeo_id)===String(c.rodeo_id))?.nombre || '—') : '—';
        h += `<tr>
          <td>${fd(c.fecha)}</td>
          <td><span class="pill pill-green">${c.categoria||'—'}</span></td>
          <td>${campos.find(f=>String(f.campo_id)===String(c.campo_id))?.nombre||'—'}</td>
          <td>${rodeoNom}</td>
          <td class="tc"><strong>${fn(c.cantidad)}</strong></td>
          <td class="tr">$ ${fn(c.precio_cabeza)}</td>
          <td class="tr"><strong>$ ${fn(c.importe_total)}</strong></td>
          <td>${c.vendedor||'—'}</td>
          <td style="font-size:12px;color:var(--text3)">${c.observacion||'—'}</td>
          <td style="display:flex;gap:4px">
            <button class="btn btn-secondary btn-sm" onclick="window.compraHacEditar_('${c.compra_id}')" title="Editar">✎</button>
            <button class="btn btn-danger btn-sm" onclick="window.compraHacEliminar_('${c.compra_id}')" title="Eliminar">🗑</button>
          </td>
        </tr>`;
      });
      h += '</tbody></table></div>';
    });
  }
  h += '</div>';
  return h;
}

function attachComprasHaciendaEvents() {

  window.chCatChange_ = function() {
    const sel = document.getElementById('ch-categoria-sel');
    const txt = document.getElementById('ch-categoria-txt');
    const hid = document.getElementById('ch-categoria');
    if (!sel) return;
    if (sel.value === '__otro__') {
      if (txt) txt.style.display = 'block';
      if (txt) txt.oninput = () => { if(hid) hid.value = txt.value; };
      if (hid) hid.value = '';
    } else {
      if (txt) txt.style.display = 'none';
      if (hid) hid.value = sel.value;
    }
  };
  // Init on load
  setTimeout(() => window.chCatChange_ && window.chCatChange_(), 50);

  window.chCalcImporte_ = function() {
    const cant   = Number(document.getElementById('ch-cantidad')?.value) || 0;
    const precio = Number(document.getElementById('ch-precio')?.value) || 0;
    const el = document.getElementById('ch-importe-preview');
    if (el) el.textContent = (cant && precio) ? '$ ' + fn(cant * precio) : '—';
  };

  window.chActualizarRodeos_ = function() {
    const campo_id = document.getElementById('ch-campo')?.value || '';
    const rSelect  = document.getElementById('ch-rodeo');
    const wrap     = document.getElementById('ch-nuevo-rodeo-wrap');

    // Re-poblar rodeos filtrados por campo
    if (rSelect) {
      const rodeos = (S.catalogs && S.catalogs.rodeos) || [];
      const filtrados = rodeos.filter(r => String(r.campo_id) === String(campo_id));
      const prevVal = rSelect.value;
      rSelect.innerHTML =
        '<option value="">— Sin asignar —</option>' +
        filtrados.map(r => `<option value="${r.rodeo_id}" ${String(r.rodeo_id)===prevVal?'selected':''}>${r.nombre}</option>`).join('') +
        '<option value="__nuevo__">➕ Crear rodeo nuevo…</option>';
    }

    // Mostrar/ocultar form nuevo rodeo
    const val = document.getElementById('ch-rodeo')?.value;
    if (wrap) wrap.style.display = val === '__nuevo__' ? 'flex' : 'none';
  };

  window.compraHacGuardar_ = async function() {
    const fecha     = document.getElementById('ch-fecha')?.value || '';
    const campana   = document.getElementById('ch-campana')?.value.trim() || '';
    const campo_id  = document.getElementById('ch-campo')?.value || '';
    const categoria = (document.getElementById('ch-categoria')?.value || '').trim();
    const cantidad  = Number(document.getElementById('ch-cantidad')?.value) || 0;
    const precio    = Number(document.getElementById('ch-precio')?.value) || 0;
    const vendedor  = document.getElementById('ch-vendedor')?.value.trim() || '';
    const obs       = document.getElementById('ch-obs')?.value.trim() || '';
    const msg       = document.getElementById('ch-msg');
    const btn       = document.getElementById('ch-guardar-btn');

    const resetBtn = () => { if(btn) { btn.disabled=false; btn.textContent = S._compraEditando ? '✏️ Guardar cambios' : '💾 Registrar compra'; } };

    if (!fecha)     { resetBtn(); if(msg) msg.textContent='⚠ Ingresá la fecha.'; return; }
    if (!campana)   { resetBtn(); if(msg) msg.textContent='⚠ Ingresá la campaña.'; return; }
    if (!categoria) { resetBtn(); if(msg) msg.textContent='⚠ Ingresá la categoría.'; return; }
    if (!cantidad)  { resetBtn(); if(msg) msg.textContent='⚠ Ingresá la cantidad.'; return; }
    if (!precio)    { resetBtn(); if(msg) msg.textContent='⚠ Ingresá el precio por cabeza.'; return; }

    // Crear rodeo nuevo si corresponde
    let rodeo_id = document.getElementById('ch-rodeo')?.value || '';
    if (rodeo_id === '__nuevo__') {
      const nombre   = document.getElementById('ch-nr-nombre')?.value.trim() || '';
      const catRodeo = document.getElementById('ch-nr-categoria')?.value || '';
      const activ    = document.getElementById('ch-nr-actividad')?.value || 'Cría';
      if (!nombre) { resetBtn(); toast('Ingresá el nombre del rodeo nuevo.', 'err'); return; }
      try {
        await apiCall('create', { body: { entity: 'rodeos', data: { nombre, campo_id, categoria: catRodeo, activo: true, actividad: activ } } });
        await loadCatalogs();
        const nuevos = (S.catalogs && S.catalogs.rodeos) || [];
        const creado = nuevos.find(r => r.nombre === nombre && String(r.campo_id) === String(campo_id));
        rodeo_id = creado ? String(creado.rodeo_id) : '';
        toast('Rodeo "' + nombre + '" creado.', 'ok');
      } catch(err) { resetBtn(); toast('Error al crear rodeo: ' + err.message, 'err'); return; }
    }

    const data = {
      fecha, campana, campo_id, categoria, rodeo_id,
      cantidad, precio_cabeza: precio,
      importe_total: cantidad * precio,
      vendedor, observacion: obs, fecha_carga: today(),
    };

    try {
      const editando = S._compraEditando;
      if (editando) {
        await apiCall('update', { body: { entity: 'compras_hacienda', id: editando.compra_id, data: { ...editando, ...data } } });
        S._compraEditando = null;
        toast('Compra actualizada', 'ok');
      } else {
        await apiCall('create', { body: { entity: 'compras_hacienda', data } });
        toast('Compra registrada — ' + fn(cantidad) + ' ' + categoria + ' · $ ' + fn(cantidad*precio), 'ok');
      }
      invalidateCache('compras_hacienda');
      await loadEntity('compras_hacienda', true);
      if(msg) { msg.textContent='✅ Guardado'; setTimeout(()=>{ if(msg) msg.textContent=''; }, 2500); }
      render();
    } catch(err) {
      resetBtn();
      toast('Error: '+err.message, 'err');
    }
  };

  window.compraHacEditar_ = function(compra_id) {
    const c = comprasHacGetAll_().find(x => String(x.compra_id) === String(compra_id));
    if (!c) { toast('No se encontró el registro.', 'err'); return; }
    S._compraEditando = c;
    render();
    setTimeout(() => {
      const panel = document.getElementById('ch-form-panel');
      if (panel) panel.scrollIntoView({ behavior: 'smooth', block: 'start' });
      document.getElementById('ch-cantidad')?.focus();
    }, 100);
  };

  window.compraHacEliminar_ = async function(compra_id) {
    if (!confirm('¿Eliminar esta compra?')) return;
    try {
      await apiCall('delete', { body: { entity: 'compras_hacienda', id: compra_id } });
      invalidateCache('compras_hacienda');
      await loadEntity('compras_hacienda', true);
      toast('Registro eliminado', 'ok');
      render();
    } catch(err) { toast('Error: '+err.message, 'err'); }
  };
}

// ── Helper: KPI de sueldos para cada actividad ────────────────────────
// actividad: 'cria' | 'recria' | 'engorde'
function buildSueldoKpiPanel_(actividad) {
  const sueldos = sueldosGetAll_();
  const mesActual = today().slice(0, 7);
  const anio = today().slice(0, 4);

  const importeMes = sueldoTotalActividad_(actividad, s => String(s.periodo).slice(0,7) === mesActual);
  const sueldosAnio = sueldos.filter(s => String(s.periodo).slice(0,4) === anio);
  const totalAnio = sueldoTotalActividad_(actividad, s => String(s.periodo).slice(0,4) === anio);
  const pctMes = null; // ya no hay un único % — es por campo

  const labels = { cria: '🐄 Cría', recria: '🐃 Recría', engorde: '🥩 Engorde' };
  const colors = { cria: 'var(--green)', recria: 'var(--gold)', engorde: 'var(--clay)' };
  const bgColors = { cria: 'var(--green-bg)', recria: 'var(--gold-bg)', engorde: 'var(--clay-bg)' };

  const color = colors[actividad];
  const bg    = bgColors[actividad];
  const label = labels[actividad];

  return `<div style="display:flex;gap:10px;flex-wrap:wrap;margin-bottom:16px">
    <div style="background:${bg};border-radius:10px;padding:12px 20px;display:flex;align-items:center;gap:16px;flex:1;min-width:240px">
      <div style="font-size:28px">👤</div>
      <div>
        <div style="font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:${color};margin-bottom:2px">Sueldos imputados — ${label}</div>
        <div style="display:flex;align-items:baseline;gap:14px;flex-wrap:wrap">
          <div>
            <div style="font-size:10px;color:var(--text2)">Mes actual (${mesActual})</div>
            <div style="font-size:20px;font-weight:800;color:${color}">${importeMes ? '$ ' + fn(importeMes) : '—'}</div>
            ${pctMes !== null ? `<div style="font-size:11px;color:var(--text3)">${pctMes}% del total</div>` : ''}
          </div>
          <div style="width:1px;background:var(--border);align-self:stretch;margin:2px 0"></div>
          <div>
            <div style="font-size:10px;color:var(--text2)">Acumulado ${anio}</div>
            <div style="font-size:20px;font-weight:800;color:${color}">${totalAnio ? '$ ' + fn(totalAnio) : '—'}</div>
            <div style="font-size:11px;color:var(--text3)">${sueldosAnio.length} ${sueldosAnio.length === 1 ? 'mes' : 'meses'}</div>
          </div>
        </div>
      </div>
      <div style="margin-left:auto">
        <button class="btn btn-sm btn-ghost" onclick="goto('sueldos')" style="font-size:11px;white-space:nowrap">Ver detalle →</button>
      </div>
    </div>
  </div>`;
}

function buildIndicesReproduccion() {
  if (!S.indicesData && !S._indicesLoading) {
    S._indicesLoading = true;
    apiCall('dashboard').then(data => {
      S.indicesData = data;
      S._indicesLoading = false;
      render();
    }).catch(() => { S._indicesLoading = false; render(); });
  }
  if (!S.indicesData) return '<div class="loader"><div class="spinner"></div>Calculando índices reproductivos…</div>';

  const g          = S.indicesData.general;
  const rodeosList = S.indicesData.rodeos || [];
  const campos     = (S.catalogs && S.catalogs.campos) || [];
  const criaTabs2 = [
    { k: 'dashboard',            icon: '◈',  label: 'Dashboard' },
    { k: 'indices_reproduccion', icon: '📈', label: 'Índices de Reproducción' },
    { k: 'servicios',            icon: '⚭',  label: 'Servicios' },
    { k: 'tactos',               icon: '◔',  label: 'Tactos' },
    { k: 'abortos',              icon: '⊘',  label: 'Abortos' },
    { k: 'pariciones',           icon: '✦',  label: 'Pariciones' },
    { k: 'destetes',             icon: '⊞',  label: 'Destetes' },
  ];
  let h = `<div class="page-header">
    <div class="page-title">Cría</div>
    <div style="display:flex;gap:8px;margin-top:8px;flex-wrap:wrap">
      ${criaTabs2.map(t => `<button class="radio-pill${S.page===t.k?' selected':''}" onclick="goto('${t.k}')">${t.icon} ${t.label}</button>`).join('')}
    </div>
  </div>`;

  h += '<div class="section-label">Establecimiento — índices generales</div>';
  h += buildKpiRow(g);

  h += '<div class="section-label">Filtrar por campo</div>';
  h += '<div class="rodeo-strip">';
  h += `<div class="rodeo-chip ${!S.selectedCampoId ? 'active' : ''}" data-campo=""><div class="rc-name">Todos los campos</div></div>`;
  campos.forEach(c => {
    h += `<div class="rodeo-chip ${String(S.selectedCampoId) === String(c.campo_id) ? 'active' : ''}" data-campo="${c.campo_id}"><div class="rc-name">${c.nombre}</div></div>`;
  });
  h += '</div>';

  const rodeosFiltrados = (S.selectedCampoId
    ? rodeosList.filter(r => String(r.rodeo.campo_id) === String(S.selectedCampoId))
    : rodeosList
  ).slice().sort((a, b) => {
    const cmp = campoNombre(a.rodeo.campo_id).localeCompare(campoNombre(b.rodeo.campo_id), 'es', { sensitivity: 'base' });
    return cmp !== 0 ? cmp : a.rodeo.nombre.localeCompare(b.rodeo.nombre, 'es', { sensitivity: 'base' });
  });

  if (S.selectedCampoId) {
    const campoSel = campos.find(c => String(c.campo_id) === String(S.selectedCampoId));
    h += `<div class="panel"><div class="panel-title">${campoSel ? campoSel.nombre : ''} <span class="pill pill-gray">${rodeosFiltrados.length} rodeo${rodeosFiltrados.length===1?'':'s'}</span></div>${buildKpiRow(aggregateKpis_(rodeosFiltrados))}</div>`;
  }

  h += '<div class="section-label">Por rodeo</div>';
  h += '<div class="rodeo-strip">';
  h += `<div class="rodeo-chip ${!S.selectedRodeoId ? 'active' : ''}" data-rodeo=""><div class="rc-name">Todos</div><div class="rc-meta">vista general</div></div>`;
  rodeosFiltrados.forEach(r => {
    h += `<div class="rodeo-chip ${String(S.selectedRodeoId) === String(r.rodeo.rodeo_id) ? 'active' : ''}" data-rodeo="${r.rodeo.rodeo_id}"><div class="rc-name">${r.rodeo.nombre}</div><div class="rc-meta">${campoNombre(r.rodeo.campo_id)}</div></div>`;
  });
  h += '</div>';

  if (S.selectedRodeoId) {
    const sel = rodeosFiltrados.find(r => String(r.rodeo.rodeo_id) === String(S.selectedRodeoId));
    if (sel) h += `<div class="panel"><div class="panel-title">${sel.rodeo.nombre} <span class="pill pill-gray">${campoNombre(sel.rodeo.campo_id)}</span></div>${buildKpiRow(sel.kpis)}</div>`;
  } else {
    h += `<div class="tw"><table class="dt"><thead><tr>
      <th>Rodeo</th><th>Campo</th>
      <th class="tc">Preñez</th><th class="tc">Parición</th><th class="tc">Destete</th>
      <th class="tc">Nacidos vivos</th><th class="tc">Destetados</th>
    </tr></thead><tbody>`;
    rodeosFiltrados.forEach(r => {
      const k = r.kpis;
      h += `<tr>
        <td><strong>${r.rodeo.nombre}</strong></td>
        <td>${campoNombre(r.rodeo.campo_id)}</td>
        <td class="tc">${pct(k.servicio.indice_prenez)}</td>
        <td class="tc">${pct(k.paricion.indice_paricion)}</td>
        <td class="tc">${pct(k.destete.indice_destete)}</td>
        <td class="tc">${fn(k.paricion.nacidos_vivos)}</td>
        <td class="tc">${fn(k.destete.total_destetados)}</td>
      </tr>`;
    });
    h += '</tbody></table></div>';
  }
  return h;
}

function comprasHacGetAll_() {
  return S.cache.compras_hacienda || [];
}

function buildComprasHacienda() {
  const compras  = comprasHacGetAll_().sort((a,b) => String(b.fecha).localeCompare(String(a.fecha)));
  const campos   = (S.catalogs && S.catalogs.campos) || [];
  const rodeos   = (S.catalogs && S.catalogs.rodeos) || [];
  const campanas = [...new Set([
    ...compras.map(c => c.campana),
    ...((S.cache.ventas||[]).map(v => v.campana))
  ].filter(Boolean))].sort((a,b) => b.localeCompare(a));
  const categorias = [...new Set([
    ...compras.map(c => c.categoria).filter(Boolean),
    'Vaca','Toro','Torito','Ternero','Ternera','Vaquillona','Novillito','Novillo','Vaca venta'
  ])].sort();

  const totalCabezas = compras.reduce((s,c)=>s+(Number(c.cantidad)||0),0);
  const totalImporte = compras.reduce((s,c)=>s+(Number(c.importe_total)||0),0);

  let h = `<div class="page-header">
    <div class="page-title">🛒 Compras de Hacienda</div>
    <div class="page-sub">Incorporación de animales al establecimiento</div>
  </div>`;

  // KPIs por categoría
  const porCat = {};
  compras.forEach(c => {
    const cat = (c.categoria||'Sin categoría');
    if (!porCat[cat]) porCat[cat] = { cabezas: 0, importe: 0 };
    porCat[cat].cabezas  += Number(c.cantidad) || 0;

      <div style="font-size:18px;font-weight:700;color:${txtCat[i%txtCat.length]}">$ ${fn(v.importe)}</div>
      <div style="font-size:10px;color:var(--text3);margin-top:2px">${fn(v.cabezas)} cabezas</div>
    </div>`).join('')}

  // ── Formulario ──
  const editando = S._compraEditando || null;
  h += `<div class="panel" id="ch-form-panel">

      <div class="fg">
        <label>Campo</label>

      </div>
      <div class="fg">
        <label>Categoría</label>
        <select id="ch-categoria-sel" onchange="window.chCatChange_()">
          <option value="">— Seleccioná —</option>

        </select>
        <input type="text" id="ch-categoria-txt" placeholder="Escribí la categoría" style="display:none;margin-top:6px" value="${editando ? (editando.categoria||'') : ''}">
        <input type="hidden" id="ch-categoria" value="${editando ? (editando.categoria||'') : ''}">
      </div>
      <div class="fg">
        <label>Rodeo destino <span class="opt">(opcional)</span></label>
        <select id="ch-rodeo" onchange="window.chActualizarRodeos_()">
          <option value="">— Sin asignar —</option>
          ${rodeos.filter(r=>String(r.campo_id)===String(editando ? editando.campo_id : campos[0]?.campo_id)).map(r=>`<option value="${r.rodeo_id}" ${editando && String(r.rodeo_id)===String(editando.rodeo_id)?'selected':''}>${r.nombre}</option>`).join('')}
          <option value="__nuevo__">➕ Crear rodeo nuevo…</option>
        </select>
      </div>
      <div class="fg">
        <label>Cantidad (cabezas)</label>
        <input type="number" id="ch-cantidad" placeholder="Ej: 50" min="1" value="${editando ? (editando.cantidad||'') : ''}" oninput="window.chCalcImporte_()">
      </div>
      <div class="fg">
        <label>Precio por cabeza ($)</label>
        <input type="number" id="ch-precio" placeholder="Ej: 850000" min="0" step="1000" value="${editando ? (editando.precio_cabeza||'') : ''}" oninput="window.chCalcImporte_()">
      </div>
      <div class="fg">
        <label>Importe total</label>
        <div id="ch-importe-preview" style="font-size:18px;font-weight:700;padding:8px 0;color:var(--green-text)">${editando && editando.importe_total ? '$ '+fn(editando.importe_total) : '—'}</div>
      </div>
      <div class="fg">

        <th>Vendedor</th><th>Obs.</th><th></th>
      </tr></thead><tbody>`;

        const rodeoNom = c.rodeo_id ? (rodeos.find(r=>String(r.rodeo_id)===String(c.rodeo_id))?.nombre || '—') : '—';

          <td>${fd(c.fecha)}</td>
          <td><span class="pill pill-green">${c.categoria||'—'}</span></td>
          <td>${campos.find(f=>String(f.campo_id)===String(c.campo_id))?.nombre||'—'}</td>

          <td style="display:flex;gap:4px">

          </td>
        </tr>`;
      });
      h += '</tbody></table></div>';
    });
  }
  h += '</div>';
  return h;
}

function attachComprasHaciendaEvents() {

  window.chCatChange_ = function() {
    const sel = document.getElementById('ch-categoria-sel');
    const txt = document.getElementById('ch-categoria-txt');
    const hid = document.getElementById('ch-categoria');
    if (!sel) return;
    if (sel.value === '__otro__') {
      if (txt) txt.style.display = 'block';
      if (txt) txt.oninput = () => { if(hid) hid.value = txt.value; };
      if (hid) hid.value = '';
    } else {
      if (txt) txt.style.display = 'none';
      if (hid) hid.value = sel.value;
    }
  };
  // Init on load
  setTimeout(() => window.chCatChange_ && window.chCatChange_(), 50);

  window.chCalcImporte_ = function() {
    const cant   = Number(document.getElementById('ch-cantidad')?.value) || 0;
    const precio = Number(document.getElementById('ch-precio')?.value) || 0;
    const el = document.getElementById('ch-importe-preview');
    if (el) el.textContent = (cant && precio) ? '$ ' + fn(cant * precio) : '—';
  };

  window.chActualizarRodeos_ = function() {
    const campo_id = document.getElementById('ch-campo')?.value || '';
    const rSelect  = document.getElementById('ch-rodeo');
    const wrap     = document.getElementById('ch-nuevo-rodeo-wrap');

    // Re-poblar rodeos filtrados por campo
    if (rSelect) {
      const rodeos = (S.catalogs && S.catalogs.rodeos) || [];
      const filtrados = rodeos.filter(r => String(r.campo_id) === String(campo_id));
      const prevVal = rSelect.value;
      rSelect.innerHTML =
        '<option value="">— Sin asignar —</option>' +
        filtrados.map(r => `<option value="${r.rodeo_id}" ${String(r.rodeo_id)===prevVal?'selected':''}>${r.nombre}</option>`).join('') +
        '<option value="__nuevo__">➕ Crear rodeo nuevo…</option>';
    }

    // Mostrar/ocultar form nuevo rodeo
    const val = document.getElementById('ch-rodeo')?.value;
    if (wrap) wrap.style.display = val === '__nuevo__' ? 'flex' : 'none';
  };

  window.compraHacGuardar_ = async function() {
    const fecha     = document.getElementById('ch-fecha')?.value || '';
    const campana   = document.getElementById('ch-campana')?.value.trim() || '';
    const campo_id  = document.getElementById('ch-campo')?.value || '';
    const categoria = (document.getElementById('ch-categoria')?.value || '').trim();
    const cantidad  = Number(document.getElementById('ch-cantidad')?.value) || 0;
    const precio    = Number(document.getElementById('ch-precio')?.value) || 0;
    const vendedor  = document.getElementById('ch-vendedor')?.value.trim() || '';
    const obs       = document.getElementById('ch-obs')?.value.trim() || '';
    const msg       = document.getElementById('ch-msg');
    const btn       = document.getElementById('ch-guardar-btn');

    const resetBtn = () => { if(btn) { btn.disabled=false; btn.textContent = S._compraEditando ? '✏️ Guardar cambios' : '💾 Registrar compra'; } };

    if (!fecha)     { resetBtn(); if(msg) msg.textContent='⚠ Ingresá la fecha.'; return; }
    if (!campana)   { resetBtn(); if(msg) msg.textContent='⚠ Ingresá la campaña.'; return; }
    if (!categoria) { resetBtn(); if(msg) msg.textContent='⚠ Ingresá la categoría.'; return; }
    if (!cantidad)  { resetBtn(); if(msg) msg.textContent='⚠ Ingresá la cantidad.'; return; }
    if (!precio)    { resetBtn(); if(msg) msg.textContent='⚠ Ingresá el precio por cabeza.'; return; }

    // Crear rodeo nuevo si corresponde
    let rodeo_id = document.getElementById('ch-rodeo')?.value || '';
    if (rodeo_id === '__nuevo__') {
      const nombre   = document.getElementById('ch-nr-nombre')?.value.trim() || '';
      const catRodeo = document.getElementById('ch-nr-categoria')?.value || '';
      const activ    = document.getElementById('ch-nr-actividad')?.value || 'Cría';
      if (!nombre) { resetBtn(); toast('Ingresá el nombre del rodeo nuevo.', 'err'); return; }
      try {
        await apiCall('create', { body: { entity: 'rodeos', data: { nombre, campo_id, categoria: catRodeo, activo: true, actividad: activ } } });
        await loadCatalogs();
        const nuevos = (S.catalogs && S.catalogs.rodeos) || [];
        const creado = nuevos.find(r => r.nombre === nombre && String(r.campo_id) === String(campo_id));
        rodeo_id = creado ? String(creado.rodeo_id) : '';
        toast('Rodeo "' + nombre + '" creado.', 'ok');
      } catch(err) { resetBtn(); toast('Error al crear rodeo: ' + err.message, 'err'); return; }
    }

    const data = {
      fecha, campana, campo_id, categoria, rodeo_id,
      cantidad, precio_cabeza: precio,
      importe_total: cantidad * precio,
      vendedor, observacion: obs, fecha_carga: today(),
    };

    try {
      const editando = S._compraEditando;
      if (editando) {
        await apiCall('update', { body: { entity: 'compras_hacienda', id: editando.compra_id, data: { ...editando, ...data } } });
        S._compraEditando = null;
        toast('Compra actualizada', 'ok');
      } else {
        await apiCall('create', { body: { entity: 'compras_hacienda', data } });
        toast('Compra registrada — ' + fn(cantidad) + ' ' + categoria + ' · $ ' + fn(cantidad*precio), 'ok');
      }
      invalidateCache('compras_hacienda');
      await loadEntity('compras_hacienda', true);
      if(msg) { msg.textContent='✅ Guardado'; setTimeout(()=>{ if(msg) msg.textContent=''; }, 2500); }
      render();
    } catch(err) {
      resetBtn();
      toast('Error: '+err.message, 'err');
    }
  };

  window.compraHacEditar_ = function(compra_id) {
    const c = comprasHacGetAll_().find(x => String(x.compra_id) === String(compra_id));
    if (!c) { toast('No se encontró el registro.', 'err'); return; }
    S._compraEditando = c;
    render();
    setTimeout(() => {
      const panel = document.getElementById('ch-form-panel');
      if (panel) panel.scrollIntoView({ behavior: 'smooth', block: 'start' });
      document.getElementById('ch-cantidad')?.focus();
    }, 100);
  };

  window.compraHacEliminar_ = async function(compra_id) {
    if (!confirm('¿Eliminar esta compra?')) return;
    try {
      await apiCall('delete', { body: { entity: 'compras_hacienda', id: compra_id } });
      invalidateCache('compras_hacienda');
      await loadEntity('compras_hacienda', true);
      toast('Registro eliminado', 'ok');
      render();
    } catch(err) { toast('Error: '+err.message, 'err'); }
  };
}

// Convierte un importe en ARS a la moneda seleccionada usando cotización de esa fecha
function convertirAMoneda_(importe, fecha, moneda) {
  if (!importe || moneda !== 'USD') return Number(importe) || 0;
  const tc = tipoCambioVigente_(fecha);
  const val = tc ? Number(tc.valor || tc) : null;
  if (!val || val <= 0) return Number(importe) || 0; // sin cotización, devuelve pesos
  return (Number(importe) || 0) / val;
}
// Formatea un valor ya convertido
function fmConv_(importe, fecha, moneda) {
  const val = convertirAMoneda_(importe, fecha, moneda);
  return (moneda === 'USD' ? 'U$S ' : '$ ') + fn(Math.round(val), 0);
}
